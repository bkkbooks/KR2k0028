body:
  text: 無錫縣志卷一邑里第一古者封建諸侯錫以爵土分布九州秦漢縣邑天下古法遂廢唐置十道宋設十五路元併為十一省縣統於路路統於省無錫為邑厯世雖久文獻尚存而所損益猶可考見故厯叙縣邑廢置地里廣狹城池髙深作邑里第一古今郡縣表一之一按史漢書無錫禹貢揚州之北境在天官星紀為斗牛女之分而無錫實當女之辰於古為荒服自周太王長子太伯以其弟季厯賢而有聖子昌因知太王欲立季歷以及昌於是太伯與仲雍奔荆蠻文身斷髮以避季厯季厯立是為王季昌繼立是為文王於是太伯處荆蠻自號句吳荆蠻義之從者千餘家立為吳太伯太伯遭殷之末中國侯王數用兵恐及於荆蠻起城周三里二百步外郭三百餘里在吳之西北隅名曰故吳墟即今無錫梅里之太伯城是也周武王克商求太伯仲雍之後得周章周章已君吳因而封之至春秋魯成公七年晉使行人于吳吳于是始大通吳于上國自襄公時㑹中國之諸侯矣周敬王六年闔閭用伍子胥之謀伐楚入郢師還始城姑蘇而遷都焉魯哀公二十年越滅吳無錫自是歸于越周顯王三十五年楚滅越則無錫隨以屬楚楚考烈王元年以黃歇為相封為春申君賜淮北路十二縣後十五嵗黃歇言之楚王曰淮北地邊齊其事急請以為郡便因併獻淮北十二縣請封于江東考烈王許之春申君因城故吳墟以自為都邑秦併天下置三十六郡以其地屬㑹稽郡前漢因之陸羽惠山寺記云惠山當秦時大産鉛錫至漢興錫方殫故創無錫縣是無錫為縣自前漢始王莽世錫復出改曰有錫縣漢中興錫止仍復舊名東漢光武時始升無錫為侯國至順帝時分㑹稽置吳郡縣仍𨽻焉武帝時置刺史部十三州以揚州領㑹稽郡晋明帝太康初平吳分天下為十九州既又分吳郡置毗陵其地仍為揚州之封域厥後以避東海王世子諱改毗陵為晋陵或治於丹徒或治於京口又僑置南蘭陵郡於武進郡雖遷革不一而縣邑如故陳後主禎明二年又改無錫縣為吳州隋高祖罷天下郡為州以統縣煬帝復置郡罷州而縣如故最後於常熟置州遂名常州尋復故縣𨽻毗陵郡唐太宗貞觀初分天下為十道尋增改為十五道縣無所更易代宗大厯中升無錫為望縣至僖宗朝竊據不常郡縣每陷於僭逆宋太祖平五代之亂至太宗初分天下為十五路而常𨽻兩浙路縣因屬焉元一海宇縣歸版圗置十一省以常屬江浙省元貞間升天下大縣為州而無錫以民齒之夥遂得為中州云風俗一之二無錫為浙右名邑之冠當南北之衝㑹土地沃衍有湖山之勝泉水之秀商賈之繁集冠蓋之駢臻其民多聞習事故其習尚夸美然自三代以來承太伯之髙蹤踵季子之遐躅其後才賢輩出孝義迭見猶足有可觀采其平原曠野盡為良田川澤足以資灌溉之利魚米足以益富羡之饒男耕女織生業是勤嵗産之盛實登侯封是以衣食足而禮義備民生敏於習文疏於用武蓋其性然耳凡風俗之可見者如此云戶口一之三按地志無錫縣户口之數自晉宋至唐率統郡以計不得其詳舊稱縣之主客戶共一萬六千九百有一而主戶嘗二倍於客紹興初無錫之户口始以縣計可考實二萬三千三百一十四户一十萬五千六百二十一口南渡後復加以三分之一為户三萬四千三百一十合口一十三萬五千八百二十有七淳祐間詔計天下民數無錫得三萬七千九百一十六户二十三萬五百六十八口元兵南下殘虜之餘十去其四既又大減於疫存者僅十分而五厥後平治既久生聚日繁至元二十七年天下郡縣上版籍無錫得户七萬二百四十二上之其數蓋已三倍於古常所統縣五户口之羡皆有不逮矣不既庶矣乎貢賦一之四禹别九州任土作貢其來尚矣無錫本為吳地在揚州之域田之下下厥賦下上上錯載在夏書驗之於今猶可徵也至其貢則未見焉舊云當周秦時錫山常産錫豈亦在揚貢惟金之內歟今錫則殫矣而貢亦隨泯焉厥草則圖經稱有蕷藥之貢而今亦無矣考之唐書地里志止言常州之貢而無錫以貢名者不知果何物惟粳秫菽麥土地所宜自唐立二稅之法而無錫之賦至今不能變焉蓋夏以稅輸者二麥總一萬七百九十四石秋以糧入者一十九萬二千二百一十石有奇以歲之豐凶羡餘不足而髙下其數焉然大率不甚相逺也總以一縣之土計之得一萬五千八百六十頃三十八畝有奇而田居十分之九山水共得其一故貢賦之出莫不尚於勤農以為邦本雖易世不能變其他若瓜果桑麻蔬菜花卉因人而培植者不繫乎土産若夫禽蟲鳥獸魚蝦蚌鱉山林川澤之利在乎逐末者一時之所趨又不足以紀方物兹特著其産於土者為賦之常而著為貢賦云爾州境一之五公侯之國皆方百里古之制也按後漢書地里志無錫侯國則知舊邑乃循古制自漢迄唐雖廢置不同而是邑封域之廣蓋未嘗變按今州在常州東南九十里外州之境內東西一百一十五里南北一百二十七里是為提封之境四正之境東六十五里入平江路常熟州宛山西四十七里入晉陵縣五牧橋南七十七里入平江路吳縣烏山北五十里入江陰州陳溝四隅之境東南四十三里入平江路長洲縣烏角溪西南五十一里入晉陵縣白石塘東北七十四里入江陰州嶺村西北五十里入晉陵縣五湖口境內道路出州南門迤邐望東南行過新安鎮主望亭烏角溪口通吳橋與平江路長洲縣界驛道接從此徑平江城為州之向南驛道出州北門過髙橋轉石塘灣迤邐望西北由洛社市至五牧橋與晉陵縣界驛道接從此徑本路城為州之向北驛道出州北門望北行經五步塘過張塘橋厯長堽至陳溝上馬鎮小橋與江隂州界路接為徑江陰之驛道出州西門從五里街西行經惠山前循山而北至胡山下稍望西南過閭江橋至孤村與晉陵縣界