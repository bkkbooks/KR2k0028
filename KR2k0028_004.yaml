body:
  text: 無錫縣志卷四上辭章第四天下之勝本乎山川人物如箕山因許由而獲稱峴山因羊祜而見拔無錫雖古名邑亦由山水之佳勝才賢之鍾聚較之他邑莫能尚焉大夫士之往來是邑徘徊周覽登髙為賦者衆矣不存而記後將何徵于文輙為次第如左作辭章第四詠歌四之一傳曰言之不足故嗟嘆之嗟嘆之不足故詠歌之余竊有取焉庶可以備觀者所采南北朝過厯山湛長史草堂劉鑠茲岳藴靈詭馮覽趣亦贍九峯相接連五渚逆縈浸層阿疲且引絶巖暢方禁泉溜夏更寒林交晝常䕃伊余久緇湼復得味恬惔願隨安期生於焉愜髙枕過厯山草堂應教湛茂之閉户守𤣥漠無復車馬跡衰廢歸邱樊嵗寒見松栢身慚雎陽老名忝梁園客習隠非市朝追賞在山澤離離揷天樹磊磊間雲石持此怡一生傷哉駒度隙無錫厯山江淹愁生白露日思起秋風年切悲杜衡莫覽涕弔空山落葉下楚水别鶴噪吳田嶂氣陰不極日色半虧天酒至情蕭瑟慿樽還復然一聞清琴奏歌泣方流漣况乃客子念直至絲竹間唐恵山寺宋司徒右長史湛茂之舊居誌并詩邱丹無錫縣西郊七里有恵山寺即宋司徒右長史湛茂之之别墅也舊名厯山故南平王劉鑠有過湛長史厯山草堂詩湛有酬和其文野而典特以松石自怡逍遥沈寂終見止足之意可謂當時髙賢矣至齊竟陵王友江淹亦有繼作余登兹山以覩三篇列于石壁仰覽遺韻若穆清風遽訪湛氏胄裔山下猶有一二十族得十三代孫略執其譜書牋墨塵蠧年世雖邈塋壠尚存余披宋史略不見其人心每惕嘆悲夫斯人也而史闕書然其有一篇則為不朽矣因復追緝六韻以次三賢之末時有釋若冰者蹤跡兹山修念之餘鑿嵌注壑釃入諸界無非金碧鉢帽之資悉償工費是以道友邑僚諷翫嘉賞嗚呼得非茂之之縁果而陰隲于上人不然者何竭慮之至耶余聖唐山令臣也屏居臨平山墅亦有年矣嘗諷茂之篇句云衰廢歸林樊嵗寒見松栢不覺禪意超散若在廬霍之間矣異時同歸猶茂之之不忘也嗟乎湛君用刋巖石徯俟後之知我者得不繼之乎貞元六年嵗在庚午詩曰身退謝名累道存嘉止足設醴䧏華轓掛冠守空谷偶尋墅中寺仰慕賢者躅不見昔簪裾猶有舊松竹烟霞雖異世風韻如在矚余仰江海人歸轍青山曲奉同邱院長題恵山寺湛茂之舊居韋夏卿道勝物能齊累輕身易退茍安一邱上何必三山外雲霞長若綺松石常如黛徒有昔主過竟遺青史載詩因埜寺詠酒向山椒酹異時逢爾知兹辰駐余斾李益昔䧏英王顧屏身幽巖曲靈波結繁笳爽籟赴鳴玉運淮春華至嵗來山草緑青松掩落暉白雲竟空谷伊人撫遺躅惻惻芳艸縟云誰斆美香分毫寄明牧于頔蕭條厯山下水木無氛滓王門結長裾巖扄怡暮齒昔賢枕髙躅今彥仰知止依依矚烟霞眷眷返墟里湛生久已没邱也亦同耻立言咸不朽何必在青史吕渭巖居舊風景人世成今昔木落故山空猿啼秋月白誰同西府僚幾謝南平客摧殘松桂老蕭散烟雲夕跡留異代逺境入空門寂惟有草堂僧陳詩在石壁伏覽吕侍郎邱員外舊題十三代祖厯山草堂詩因書記事湛賁名遂貴知己道勝方晦迹髙居葺蓮宫遺文煥石壁桑田代已變池草春猶碧識曲遇周郎知音荷宗伯調逸南平兆風清建安跡祖徳今發掦還同書史册題厯山司徒右長史祖宅湛賁隳官長史籍髙步厯山椒麗句傳黄絹香名播宋朝分能知止足跡貴出塵囂松竹心長固池臺興自饒龍官欣訪舊鶯谷忝遷喬従事叨承乏銅章愧在腰别恵山書堂捲簾曉望雲平檻下榻宵吟月半牕病守未能依結社更施何術去為邦宿恵山寺詩并序王武陵戊辰秋八月吳郡朱遐景自秦還吳南次無錫命予及故人竇丹列會于恵山之精舍是時山林始秋髙興在目凉風白雲起于座隅逍遥于長松之下偃息于盤谷之上仰視雲嶺俯瞰寒影夕陽西歸皓月東出羣動皆息視身如空𤣥言妙論以極窮奧丹列有遁世之志遐景有塵外之心予亦樂天知命怡然契合視富貴如浮雲一歌一詠以抒情性夫良辰嘉會古人所惜序述不作是闕文也山水之下景物秀美賦詩𨗳意以紀方外之逰秋日逰古寺秋山正蒼蒼泛舟次巖壑稽首金仙堂下有寒泉流上有珍禽翔石門吐明月竹木涵清光中夜何沉沉但聞松桂香曠然出塵境幽慮澹已忘題恵山寺朱宿古寺隠秋山登攀度林樾悠然青蓮界此地塵境絶機閒任晝昏慮淡知生滅微吹逓遥泉疎松對殘月庭虛露華綴池浄荷香發心悟形未留遲遲履歸轍逰恵山寺詩竇羣共訪青山寺曽隠南朝人問古松桂老開襟言笑新步移月亦出水暎石磷磷予洗腸中酒君濯纓上塵皓彩入幽抱清氣逺蒼旻信此澹忘歸淹留冰玉隣元和二年五月三日重逰此寺獨覽舊題二十年矣當時三人皆登諫列朱遐景方詣行車王晦伯尋卒郎署余自西掖累遷外臺復此躊躇吁嗟存没朱拾遺詩云嵗月人間促烟霞此地多殷勤竹林寺更得幾回過可謂得詩人之思也因命題壁以誌所懐山南東道節度副使檢校兵部郎中兼御史中丞賜紫金魚袋竇羣記四年十一月二日附蘧舅氏扶風公貞元四年秋八月與太原王武陵吳郡朱宿同逰恵山精舍為賦往體詩一首王序而題之觀其詞頗有世外之交出塵之想凝思澹慮泛溢天格雖建安才人不足居其右矣後二十年復繼于末則有傷時嘆逝之感宿草鄰笛之悲洎會昌初武皇帝隳浮圗法詔毁其宫而逐其徒恵山在毁中時無好事者詩亦隨塵焉今寺既復而詩尚遺落内弟審餘寓書請于蘧會蘧赴河陽辟召路出寺下因重記于軒廊南垣我舅氏由吏部拜執法器業磊落為時巨人平生操尚備在國史此不能舉所載者風韻之詞登臨之興俾後人挹其清芬而已大中十一年五月十三日懐孟等觀察使試大理評事兼監察御史李蘧重題題恵山詩序李隲太和五年四月予自江東將西歸涔陽路出錫邑因肄業于恵山寺居三嵗其所諷念左氏春秋詩易及司馬遷班固史屈原離騷莊周韓非書記及著歌詩數百篇其詩凡言山中事者悉記之于屋壁文則不載其寺會昌末經廢毁屋室殆無存者去年䝉恩自禁職出鎮鐘陵鐘陵與毘陵地不相逺而恵山居其屬邑間其寺復置會錫邑宰去年過此留宴數日今于予為故人因寓書請再題焉嗚呼自太和癸丑至咸通己丑三紀餘矣念邑中居人與僧居在恵山興寧兩寺者今無人焉染翰増悲復何言耳咸通十年二月一日江南西道都團練觀察處置等使中散大夫檢校左散騎常侍使持節都督洪州諸軍事兼洪州刺史御史中丞上柱國賜紫金魚袋李隲題記恵山寺肄業送僧懐坦上人流水何山分浮雲空中遇我生無根株聚散亦難固憶昨鬭龍春巖棲侣髙步清懐去覊束幽境無滓汚日落九峯明烟生萬華暮兹懽未云隔前笑倐已故四時難信留百草換霜露離襟一成觧悵把將何諭驚泉有餘哀永日誰與度𬗟思孤帆影再生重江路去去忽悽悲因風暫迴顧自恵山至吳下寄酬南徐従事不接芳晨逰獨此長洲苑風顔一成阻翰墨勞空返悠悠汀渚長杳杳蘋華晚如何西府歡尚念東吳逺瑶音動清韻蘭思芬盈畹猶及九峯春歸吟白雲巘讀恵山若冰師詩集因題故院五首五天何處望心念豈皆知化塔留今日泉鳴自昔時古苔生石静秋草滿山悲莫道聲容逺長歌白雪詞髙懐逢異境佳句想吟頻月冷松溪夜烟濃草寺春浮雲將世逺清聽與名新不見開巖日空為拜影人景物搜求歇山雲放縦飛樹寒烟鶴去池静水龍歸暗榻塵飄滿陰簷月到稀何年燈熖盡風動影堂扉陰陰垂露跡苔壁幾年書種樹青松老𫝊衣白髪居字工窮八體詩律繼三閭豈是多年學真空任性餘常聞鑿洞碑此立為冰師意刻山泉觧功深造化疑碧雲終一謝飛錫久無期惆悵人間世空𫝊樂府詞晨過昌師院深庭芳草濃曉井山泉溢林馥亂沉烟石潤侵經室幽巖鳥飛静晴嶺雲歸宻壁蘚凝蒼華竹陰漏晴日生期半宵夢憂緒仍非一若無髙世心安能此終畢暮秋登北樓望逺王武陵秋滿空山悲客心山樓晴望散幽襟一川紅樹迎霜老數曲清溪繞寺深寒氣急催遥塞雁夕風髙送逺城砧三年海上音書絶鄉國蕭條惟夢尋過春申君祠張繼春申祠宇空山裏古栢陰陰石泉水日暮江南無主人彌令過客思公子蕭條寒景傍山村寂寞誰知楚相尊當時珠履三千客趙使懐慚不敢言題恵山寺張祐舊宅人何在空門客自過泉聲到池盡山色上樓多小洞穿斜竹重階夾細莎殷勤望城市烟外暮鐘和題恵山泉僧若冰石脈綻寒光松根噴曉凉注瓶雲母滑潄齒茯苓香野客偷煎茗山僧惜浄牀安禪何所問孤月在中央懐恵山寺許渾排空殿塔倚岩巒松韻經聲月裏寒兩眼流泉清户牖九龍飛雨洒䦨干浣紗女弄金池影聽法烏啼施食盤却問繡衣車馬客幾時林下脱頭冠題恵山寺皮日休千葉蓮花舊有香半山金刹照方塘殿前日暮髙風起松子聲聲打石牀題恵山泉二首丞相長思煮茗時郡侯催發只憂遲吳闗去國三千里莫笑楊妃愛荔枝馬卿消瘦年纔有陸羽茶門近始閒時借僧爐拾寒葉自來林下煮潺湲過梅李上家山李紳上家山家山依舊好昔時松桂長今來容髪老上家山臨古道髙低入雲樹蕪没連天草草色日淒淒寒螿徧草啼噪鴉投樹逺行雁貼雲飛巖光翻落日僧火開經室竹洞磬聲長松樓鐘韻疾苔階滴溜缺石甃鋪莎宻舊經行處迷前交坐中失歎息整華冠持盃强自歡笑歌憐稚孺絲竹縱吹彈山明溪月上酒滿心聊放丱髮此淹留垂絲匪閒曠青山不可上昔士還惆悵况復白頭人追懐空望望别泉石恵山書堂前松竹之下有泉甘爽乃人間靈液清鑑肌骨潄開神慮茶得此水皆盡芳味也晴沙見底空無色青石潛流暗有聲微動竹風涵淅瀝細浮松月透輕盈桂凝秋露添靈液茗折春芽汎玉英應是梵居連洞府浴池今化醴泉清鑑𤣥影堂故禪師鑑𤣥影堂在恵山十年前師亦到夀州相見香燈寂寞網塵中煩惱身銷色界空龍鉢已傾無法雨虎床猶在有悲風定心池上雙漚没招手巖邊夢幻通深夜月明松子落儼然聽石待生公别雙温樹余往年於恵山寺手植今葱翠蔽日此樹過江多死有橘之狀翠條盈尺憐孤秀移植書牕待月軒輕剪緑絲春葉暗宻扶纖榦夏陰繁故人手植空懐想温室心知不敢言為爾拂雲今得地莫隨陵谷改深根憶恵山故山一别光陰改秋露殘蟬嵗月多松下壯心年少去池邊衰影老人過白雲生滅依巖谷青桂榮枯託薜蘿唯有此身長是客又驅旌斾寄烟波却望無錫芙蓉湖丹橘村邊烟火微碧波深處雁紛飛蕭條落葉垂楊㟁隔水寥寥聞搗衣水寛山逺烟嵐逈栁岸縈迴在碧流清晝不風鳬雁少却疑初夢鏡湖秋逐波雲采參差逺背日嵐光隠見深猶似望中連海樹月生湖上是山陰舊山認得烟嵐近湖水平鋪碧岫間喜見雲泉還悵望自慚山叟不歸山翠崖幽谷分明處倦鳥孤雲在眼前惆悵白頭為四老逺隨塵土去伊川重到恵山二首望中白鶴憐歸翼行處青苔恨昔逰還向竹牕名姓下數行添記别離愁碧峯依舊松筠老重得經過已白頭俱是海天黄葉信兩逢霜節菊花秋夜泊毘陵無錫羅隠草蟲嗚咽露初溥獨繋孤舟夜已䦨濁浪勢奔吳苑急疎鐘聲出恵山寒愁催髩髮凋何易貧戀家鄉别漸難他日親朋應大笑始知書劍是無端登恵山北樓皇甫冉秋興因花蝶歸心過逺山風霜征雁早江海旅人閒驛樹雲仍宻漁舟晩自還仲宣何所賦祗嘆在荆蠻懐錫山藥名離合體皮日休暗竇飬泉容泱泱明園䕶桂放亭亭厯山居處當天半夏裏松風儘足聽曉景半和山氣白微香清浄雜纖雲實頭自是眠平石腦側空林看鹿羣同前陸龜蒙鶴伴前溪栽白杏人來隂洞寫枯松蘿深境静日欲落石上未眠聞逺鐘佳句成來誰不伏神丹偷去亦須防風前莫怪擕詩藁本是吳吟蕩槳郎恵山流泉歌皇甫冉寺有泉兮泉在山鏘金鳴玉長潺潺作潭鏡兮澄寺内泛巖花兮到人間土膏脈動知春早隈隩陰裏長苔草處處縈迴石磴喧朝朝盥潄山僧老林松自古草自新清流活活無冬春任疏鑿兮與汲引若有意兮山中人偏依佛界通仙境明滅玲瓏媚林嶺宛如太空臨九潭詎減天台望三井我來結綬未經秋已厭微官憶舊逰且復遲迴猶未去此心只為靈泉留送陸羽歸恵山顧况千山待逋客香茗復叢生採摘知深處烟霞羨獨行幽期山寺逺野飯石泉清寂寂然燈夜相思磬一聲訪陸羽處士不遇僧皎然太湖東西路吳王故山前所思不可見歸鴻自翩翩何山賞春茗何處弄春泉莫是滄浪子悠然一釣船自蘇臺泛舟至望亭驛因寄従弟紓李嘉祐南浦菰蒲覆白蘋東吳黎庶逐黄巾野棠自發空流水江燕初歸不見人逺樹依依如送客平田𣺌𣺌獨傷神那堪迴首長洲苑烽火年年報塞塵晩春宴無錫蔡長官西亭茅簷閒寂寂無事覺人和井近時澆圃城低不見河興縁芳草積情向逺峯多别日歸吳地停橈更一過宋寄伯强知縣求恵山泉蘇軾兹山定中空乳水滿其腹遇隙則發見臭味實一族淺深各有值方圓隨所蓄或為雲洶湧或為線斷續或流蒼石縫宛轉龍鸞蹙或鳴深洞中雜珮間琴筑瓶罌走千里真偽半相瀆貴人髙宴罷醉眼亂紅緑赤泥開方印紫餅截團玉傾甌共歎賞竊語笑僮僕豈知泉下僧盥洒自挹掬故人怜我病篛籠寄新馥欠伸北牕下晝睡美方熟精品厭凡泉願子致一斛逰恵山詩余昔為錢塘倅往來無錫未嘗不至恵山既去五年復為湖州與髙郵秦太虗杭僧參寥同至覽唐處士王武陵竇羣朱宿所賦詩愛其語清簡蕭然有出羣之姿用其韻各賦三首夢裏五年過覺來雙髩蒼還將塵土足一歩漪瀾堂俯窺松桂影仰見鴻鶴翔炯然肝肺間已作冰玉光虗明中有色清浄自生香還與世俗去永與世俗忘薄雲不遮山疏雨不濕人瀟瀟松徑滑䇿䇿芒鞋新善哉二三子皎然無淄磷勝逰豈殊昔清句仍絶塵弔古泣舊史病讒欺小旻哀哉扶風子難與巢許鄰敲火發山泉烹茶避林樾明牕傾紫盞色味兩竒絶吾生眠食耳一飽萬想滅頗笑玉川子飢弄三百月豈如山中人睡起山花發一甌誰與共門外無來轍恵山謁錢道人烹小龍團登絶嶺望太湖踏遍江南南岸山逢山未免更留連獨携天上小圓月來試人間第二泉石路縈迴九龍脊水光翻動五湖天孫登無語空歸去半嶺松聲萬壑𫝊奉贈恵山表大師行遍天涯意未䦨將心到處遣人安山中老宿依然在案上楞嚴己不看欹枕落花餘數片閉門脩竹自千竿客來茶罷空無有盧橘楊梅尚帶酸即恵山煮茶蔡襄此山何以得適與真茶遇在物兩稱絶扵予獨得趣鮮香籬下雪甘滑杯中露當能變俗骨豈特湔塵慮晝静清風生飄蕭入庭樹中含古人意來者庶㝠悟謝黄従善司業寄恵山泉黄庭堅錫谷寒泉撱石俱并得新詩蠆尾書急呼烹鼎供茗事晴江急雨看跳珠是功與世滌羶腴今我屢空常晏如安得左轓清潁尾風爐煮茗卧西湖恵山泉蘇儀甫觱沸靈源湧翠巒當年鴻漸此盤桓一泓巖腹涵天逺千古雲根潄玉寒竹院引歸虬甲動茶鐺烹出雪花攢月明松桂蕭騷夜堪入禪心清浄觀陪制置朱工部正辭賦恵山泉詩分韻得雲字醴液璇源世未珍陸經甄品始流聞千尋深異江心汲兩𣲖元因嶺上分輕發茗花慿匕箸散為膏澤待風雲一篇此日摛鴻藻五色他年浴鳯文題恵山王禹偁吟入恵山山下寺古泉閒挹味何嘉好抛此日陶潛米學煮當年陸羽茶猶欠片心眠水石暫開塵眼識烟霞勞生未了來還去孤棹寒篷宿浪花題恵山寺蘇舜欽古寺名傳唐相詩三伏奔迸予何之青山相照翠會合碧殿對定梁參差清泉絶無一塵染長松自是㧞俗姿近邊兵馬日鬭格釋子宴坐殊不知題恵山潘正夫秋風蕭瑟浄巖扄寂寂澄泉可鑒形比色未饒先玉乳試甘應合跨中泠夢迴春草花猶落雪灑松牕酒乍醒須碾月團三百片不辭來此汲泓渟題恵山寺張理九山朝暮雲摇落少㳺墳野蔓碑全沒晴庵磬亦聞洞偏泉路細松折鶴巢分髙視太湖近雪濤鷗起羣贈慶公上人燕肅陸羽泉邊倚瘦笻參差臺殿暎疎松五天講去春騎虎一鉢擎來晝伏龍像閣磬㪣清有韻蘚庭雲過静無蹤相逢多說逰方話知老靈山第幾峰題恵山寺李邦直丙午八月朝陽暾繫舟放步來山門萬松森森殿屋聳仰視愈覺山形尊巖深谷静鳥獸樂麋鹿哺子猨生孫泉生石門落石去呱呱哀響無晨昏挹之甘比蔗漿味渟渟清照魑魅魂正性不専時節換夏如冰雪冬還温我知此泉本靈異飬畜造化同胚渾有時精魄應期會坐令一勺彌乾坤氣如蒸炊出山背倐忽四面浮雲奔一洗萬里原野浄枯株蔓草沾餘恩豈知提携聚甖缶不獨灌溉江湖村下為閑泉上為雨信哉天下雲雨根題恵山麓亭楊傑聞說文公最好賢瀛洲可買不論錢樓臺蔽日都無地草木藏春别有天石上雲翻千峽雨洞中泉落幾家田髙閑誰似幽居樂一坐青山不問年逰恵山二首蔣之竒釋子幽居逺俗氛停橈登覽日將曛湖光已嘆千年變山勢猶驚九隴分迸溜泠噴雙沼雪煮茶香透一甌雲偶因流落尋佳致何意聲名世外聞還家豈不樂生事未應閒朝日已復去征鞍方更攀傷心百道水極目萬重山何以忘覊旅蕭然醉夢間逰恵山三首蔣之美維舟上重巘景物近斜暉流水連珠落殘華碎錦飛白雲隨步武香鳥傍軒扉拂井松傾蓋殘崖蘚上衣池光清可鑑竹色翠成圍更接髙僧話林梢帶月歸絶頂疑天設重門一逕深泉清千古意松老百年心髙閣窺平陸危亭倚翠岑勝逰方自適猶恐日西沈九隴分形怪蒼龍據厚坤洞寒清水脈石潤飬雲根探逺塵應斷窮髙斗可捫江湖倦行者對此欲忘言題翠麓亭釋仲殊素虬盤屈走靈泉槲葉塗紅作畫船幡轉玉繩光影旋杯銜金鏡酒痕圓篆形綵字方𫝊世星落光纒忽下天逺想螭蟠殊未若小圖河曲宛依然緩浮松釀環雲際不動蘭橈到席邊上已浮恩非此日山陰盛事掩多年従歡未省向尊俎屢酒何嘗議聖賢翰墨主人今獨步雙鵝應復䧏飛仙題恵山寺袁黙山翁自合老林扃小有天中盡杳𡨕兩靣樓臺驅作勢半崖松石倚為屏雲歸洞口紛紛見泉落池心細細聽勝景深藏誰到此好須圗繪入丹青次韻蔣不回恵山行見贈九龍山髙茂松竹冉冉嵐光真潑綠重岡複嶺勢峥嶸五里垂楊排岸曲雲生洞口若拖縑泉落田間如噴玉公垂若冰遺迹在瀟洒儒冠與儒服夜蟾清影照寒流春鳥新聲答寒谷山畔人家農事閒長得秋風魚稻熟太湖光射夕陽間澗澤相通財必育一生逰賞心不足憶與髙人時往復夢魂還是念歸歟問舍求田無百斛身名牽制悼人心收拾未能如水覆侵尋白髮已盈簪方此徘徊干寸祿樂安道人來自蜀尚爾小官身僕僕恵然相訪蓋初傾符彩瑩顔神滿目徐言得道先辟穀二年粒米不入腹日南先生韻超俗授術為之留五宿發殺天機指下𫝊妙用圓通皆智燭見我情親逾族屬勸以修持言滿軸自慚正𩔖雞伏鵠敢示精心循所祝痊除多謝枕中方臭腐豈為刀下肉斧斤牛羊肆殘毒古人已況牛山木深言元氣須引續起我衰羸丸射鹿煩胷一訣願相傳卦體儼然存九六同剛中適甫逰恵山雨過山前翠欲飛水雲髙下正含暉魚跳細浪千花碎蟬倚微陰一嘒微沉李浮𤓰吟齒盡清風明月滿船歸超然不負尋幽興拂得荷香在葛衣寄題恵山寺翠麓亭奉呈伯强錢公輔曩時曽作家山逰亭有翠麓排新幽疎軒宻牖竹鏘戞烈風勁雨松颼飀呀然出户瞰山足屹爾數峯圍上頭掃除雲峯聳客步煎煮錫水供茶甌我時既合衆賓飲醉岸山幘心遲留山僧顧我丐詩榜詩来脱吻驚旋輈四方環走倐已晩十載負約今方酬珎籃増葺想勝舊我已白首縻藩州何當一賦歸去来再欵巖室窮披搜吾宗道人正嘉遁擺脱世上無窮憂欣逢主人賢且令泉石笑傲都相求上人掃灑莫暫閒行行逆我西来舟謹次君倚舎人寄題恵山翠麓亭韻焦千之余愛兹山昔屢逰回環氣象泠清幽茂林滃鬰疊蒼翠宴坐瀟洒風颼飀宻甃積蘚迸泉眼飛翬比翼叅雲頭逕邉誰開青步障客来共泛紫玉甌毎思乗興可獨往塵纓未濯莫我留勝處盡至心未厭健步厯覽勢挟輈平生趣向與時背泉石夙志畧已酬兹山獨以泉品貴乃得嘉名𫝊九州譬人其中貴有物源深混混難窮搜支公此去乆愈愛自我佳句忘百憂忽蒙逺寄煮巖壑而我方欲千里求願公早見疑蛇觧公乆服藥急詔當應易剡舟次韻陸子泉周邠水自錫山出中含萬古情穿雲縁有脉激石豈無聲鍊藥源尋逺煎茶味覺輕堪資許由飲休濯屈原纓徹底驚澄瑩傾杯戒滿盈長流千里潤髙注一巖清篇什新𫝊美圖經乆得名主人當鑑止劇論著莊生題恵山翠麓亭蘇台父山勢叢叢向北盤髙僧平日為開軒莫嫌長有車馬到真愛都無鳥雀喧剩長松篁留日脚少移桃杏破雲根十年往返未曽厭煮茗甞泉到酒樽題陸子泉王汾泉品舊知名澄源石甃盈甘滋飽僧飯潤澤濟農畊漱玉人誰聽囊茶客自烹久供鴻漸啜曽奉贊皇羹李衛公非恵山泉不飲昨忝此邦守今無諸縣行煩醒想巖壑一日慰幽情慚怍方堆面王翰林泉詩云聊將一掬水洗我面慚怍塵埃正滿纓臨流聊洗濯心已識蒙亨恵山泉劉達靈脉發山根㳙㳙才一滴寶劔護深源蒼珉環甃壁鍳影鬚眉分當暑挹寒冽一酌舉瓢空過齒如激雪不異醴泉甘宛同神瀵潔快飲可洗胷所惜姑濯熱品第冠寰中名色固已掲世無陸子知淄澠誰與别冰泉洞飛泉落巍巍湍水去激激未若洞中源静淵如得適清潤挹千岩冷凝涵四壁幽討會有時煩襟聊與滌龍淵巖巖白石嵌深泉適此止夜雨半山回春風蟄龍起清明無遁形溥博有餘美受濁不傷清納汙非所恥趣操比幽人泓澄如得已山林乃挺途真復誰洗耳綉嶺亭絶境隔囂紛烟霞張綵繪逺目入無中髙情馳物外春田發英華秋林横紫翠何時杖屨逰利名聊委蛻題恵山練師竹軒袁植子猷喜種竹太白喜乗月俛仰雲泥間勝事俱清絶况乃吾廬幽風煙浩一丘竹虚能受月華白月白能牽竹翠浮不應玉壘李太白長對山隂王子猷未携花下一壷酒已登殘夜水明樓人間好景四并難無如月下春琅玕影摇金鎻碎光動劔芒寒䰟醒耿不寐哦詩坐長歎題恵山次韻蔣叔任觀溪漲煙曳平川上雲屯翠嶺頭雨淫成大浸堤潰失安流地入三呉窄山餘九隴浮不應昬墊後始用濟川舟陪諸公逰恵山汪彦章兹山定中腴秀色乃如許連峯積蒼潤嵐氣亦如雨珎泉不浪出世俗那得取羣仙作佛供洒此玉池股甘寒飲天下瓶盎走膏乳兒嬉供茗事雲散入江渚當源起臺殿下瞰松栢古巍基首梁宋爽氣接吳楚我来值佳月勝得濟稽吕聊分小蒼壁同振百年羽躋攀興未極落日在林莾却立望翠屏中流駐鳴櫓過恵山皡老試茶二首孫廸蕭蕭阿蘭若桑苧有故家佛屋倚髙寒僧蹊抱欹斜殷勤泉下客流落瘴海涯蜑酒壓梨楂蠻烹㗖蠅蛇光潔鏡一奩影照空自嗟老僧薦茗粥芳鮮凝露華驅除鼻中雷掃盡眼界花飄飄思凌雲攝身上蒼霞戰塵霾漢天獵火焮塵地一笻遺垢氛步入青蓮寺耽耽九龍盤一壑埋老翠倚天松骨大粘碧苔髮細道人本臞儒得法妙出世胷中萬斛泉洗盡蔬笋氣天風吹泠泠助我鳴鼔吹名為不二門聲音作佛事見舊題一别名山十五年宦情覊思雨茫然故人半作纍纍塜只有蒼官立道邊髀肉消磨馬上鞍塵砂滿眼路漫漫不須更障西風扇為酌崖泉一洗看次韻濟川西山避暑錢紳西山藴靈異九曲面崚嶒泉石漱鳴玊松蘿掛古藤勢雄