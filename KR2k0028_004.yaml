餘懐抱良以悟欲圖無妙筆欲詠無奇句聊為掲佳名於焉賞心寓硯池焦千之蕭公事迹久塵泥猶有當年洗硯池世俗所傳應髣髴僧人獨得耿頹隳小亭新構藏幽趣一水中分疊舊基遺澤泯然無處問清風緬邈竹隂垂上方蘇紳疊石構岩扄僧居在杳㝠澄心蟾海白縱目鶴天青衣上煙霞色窓間草木形我来凭檻久塵慮恍然醒又唐皥佛龕經閣等嚴㟼地在髙中此最髙日出四楹浮寶氣雲開百里見秋毫登臨暫得心機静徙倚翻嫌目力勞况是雄飛先上者強揮吟筆繼詩豪題膠山寺壁元掔崗頭鵓鳩鳴定欲喚晴雨驅車指東山山下寺亦古道人雙眼青雪齒起柔語松回萬壑風落絮趂輕舞日薄詠歸歟扁舟在烟渚環翠軒楊介一上十餘里携笻始可尋山形三面合林影四邊深壁暗苔争長堦荒草亂侵凭髙獨覧處烟靄滿衣襟題陽山翠微寺唐皥平地巍然起一峯厯山西畔隔湖東勢侵雲漢千尋直影落烟村四面同龍窟正當螺髻頂僧居端在畫圖中邦人不獨資觀賞旱歳為霖更有功雲海亭姜䕫茫茫復茫茫中有山蒼蒼大哉夫差國坐占天一方夫差醉蓮宫巨浪摇不醒越師從何来奪我玉萬頃年年亭上秋一滌萬古愁誰能知往事飛下雙白鷗題雲海亭二首僧古愚目前多少古今情盡在太湖之上亭舸艦浮雲空葉亂属鏤沉水浪花醒一盃㶑灔含雲夣數㸃蒼茫認洞庭明日恵山曽有約又携茶鼎汲清泠亭下漁舟泊釣磯釣絲垂影弄晴暉雲連碧海潮聲逺雪壓青山野色微絃管無音西子散蓴鱸有味步兵歸閒僧不解論興廢自折松針補毳衣題青山寺尤袤峥嶸樓閣挿天開門外湖山翠作堆蕩漾烟波迷澤國空濛雲氣認蓬莱香銷龍象輝金碧雨過麒麟駁翠苔二十九年三到此一生知有幾回来雲海亭亭前山色遶危欄亭下波瀾直浸山亭下漁舟亭上客相看渾在畫圖間香山蘇紳幾年飛錫倦逰方雲衲斕斑掩竹房一榻夜禪蒲座稳滿盂春供藥苗香汲泉岩畔驚猿飲栽葦池邊引鷺翔像座霧昏燈焰小石樓風度磬聲長攀蘿别嶺衝寒靄掃葉床前趂晩陽大抵僧居遺俗慮此中身世更清涼過無錫文天祥金山冉冉波濤雨錫水茫茫草木春二十年前曽去路三千里外作行人英雄未死心為碎父老相從鼻欲辛夜讀程嬰存國事一回惆悵一沾巾錢氏四亭詩蔡載遂初亭結廬傍林泉偶與心初期佳處時自領未應魚鳥知望雲亭白雲來何時英英冠山椒西風莫吹去使我心摇摇芳美亭髙人不惜地自種無邊春莫隨流水去恐汚世間塵通恵亭水行天地間萬𣲖同一指胡為穿石来要洗巢由耳題膠山綉佛妙相奪天真針針巧入神幾多瞻禮者還想用心人元題慧山寺趙孟頫南朝古寺慧山前裹茗来尋苐二泉貪戀君恩當北去野花啼鳥謾留連恵山夏日酌泉燕集鄧文厚我生懶拙百不堪放意林壁窮幽探兹山九龍勢飛動鬐鬛錯落盤松柟髙風吹衣凌險逺太湖𣺌渺天西南泉流不逐湖波逝融為氷鏡開塵函六月火雲生熱惱三嚥氷雪開清甘試將水品證泉味一語須喚山僧叅層臺桑苧悄遺像古屋彌勒空香龕五年兩厯恵山頂未辦草具来卓菴白鳥翻風導先路黒雲垂地隨歸驂酒醒呼枕聽風雨老龍卷水空溪潭撫掌歡㳺已塵跡隠隠孤舟沉暮嵐詠恵山泉楊載此泉甘冽冠呉中舉世咸稱煑茗功路轉山腰開鹿苑池攅石骨閟龍宫聲喧夜雨聞幽谷彩發朝霞炫太空萬古長流那有盡探原疑與海相通題恵山白珽名山名刹大佳處紺殿翠宇開雲霞陸羽廼事已千載九龍諸峯元一家雨前茶有如此水月裏樹豈尋常花奇奇恠恠心語口無根拄杖任横斜題無錫恵山寺湯仲友梁溪停短棹帶月步西闗路盡忽逢寺松多不見山岩腰雲殿古洞口石泉閒到此政吟苦秋聲滿樹間題慧山寺郭麟然疋馬西風入慧山小橋流水碧潺潺樓空雙鳯臺猶在峯遶九龍雲共閒宻藻護寒黿睡稳老松籠暝鶴飛還自憐奔走成何事回首山靈益厚顔題慧山寺僧明本慧山屹立千仞青俯瞰天地鴻毛輕七竅既鑿渾沌死九龍攫霧雷神驚霹靂聲中崖石裂銀泉迸出青鉛宂惟恨當年桒苧翁玉浪翻空煮春雪何如跨龍飛上天併與挈過崑崙顛散作大地清凉雨免使蒼生受辛苦我来扣泉泉無聲一曲冷光涵萬古殿前鳯檜砉然鳴日暮山靈打鍾皷留題恵山柯九思騎馬東華塵滿道山川如此不曽来清泉白石何年有翠竹蒼松古殿開幽人試水甞春茗過客題詩生雨苔杖藜絶頂便疎曠日暮浮雲天際廻留題恵山僧恩方沼不生千葉蓮石房髙下煮茶烟春申遺廟客時過李衛絶郵僧晝眠塵世豈知無錫義殿廬猶記大同年九江一棹東風便更試廬山瀑布泉上已日㳺恵山張雨水品古来差第一天下不易第二泉石池漫流語最勝江流湍急非自然定知有錫藏山腹泉重而甘滑如玉調符千里辨淄澠罷貢百年離寵辱虚名累物果可逃我来為泉作解嘲速喚㸃茶三昧手酬我松風吹兔毫登恵山張翥到寺日已夕鍾梵滿中林倚崖佛殿古出雲泉水深談詩禪榻上煮茗磵松隂况值𤣥丘似悠然諧素心㳺恵山陳方僧居髙處接雲霞村市周遭石徑斜細細山泉争入澗䨥䨥水鳥净眠沙佛前風動桫欏樹溪上春留躑躅花十五年来頭漸白倚欄仍舊一烏紗題恵山泉吳壽仁九龍之山何蜿蜒玊漿迸裂為寒泉来歸石井僧分汲流入草堂吾獨憐暗滴洞中雲細細冷穿池上月娟娟奉乞茶經為水記俟予歳晩為周旋留題恵山移剌廸參差樓閣古招提猶有唐人石上題潭影空明天上下蘚痕生澁路髙低泉香茗細僧清供竹宻花深鳥亂啼已負半生岩壑趣馬蹄羞踐緑莎泥㳺恵山陳䢍空山微雨後啼鳥早春時雲氣侵衣潤泉聲出寺遲清茶方破夢新酒復催詩了却公家事重来再與期題恵山泉僧山陸羽曽經次崖根小小池飲從来者取味有幾人知清影凝秋色寒腴是石滋老僧分茗好細瀹更相宜題恵山寺鄭元祐百里盡平壤兹山忽中蟠􅚱砑得宏深迂徐納平寛僧坊隠其腹崇構居桓桓立神衛觚稜縁雲置闌干我来𤣥冬交榜舟起㣲瀾天連黄沙白露委青林丹地無車馬塵松筠政堅完蒼然後凋意彼此不厭看稍稍陟其崖探源汲甘寒共惟桑苧翁出處良獨難帝青九萬里㝠飛見修翰空留雪泥跡莫䆒清静觀鬻茗滌愛渇晏然有餘歡㳺恵山寺王輔仁紅社溪邊艤小舟青蓮宇内作清㳺土花繡壁淡如書嵐翠撥雲濃欲流短李清風存古意大蘇圓月洗春愁摩挲泉石舒長嘯未羡神仙十二樓登恵山張遜洩雲䝉青山零雨暗村樹重来丘壑暮慰此清夜叙髙堂開翠户野客當楹據踈鍾越林度清嘯逾嶺去風吹松可聴石漱泉致飫景勝煩顧接心領各異趣恱此神為清耿耿至達曙㳺恵山寺周翼路出城西紫陽頭旌忠寺裏作春㳺桫欏葉暗雲初起躑躅花開雨未收古殿龍蛇唐制度東山歌舞晉風流野人不慣乗車馬也向溪邊具小舟恵山寺酌泉周權恵山鬱嵂九龍峯磅礴大地包鴻濛劃然一夕震風雨欲啓靈境昭神功六丁行空怒鞭斥電火摇光飛霹靂一聲搥裂老雲根嵌洞中開迸寒液道人甃玊深護藏鏡涵萬古凝秋光陸翁甄品親試甞翠浪煮出松風香我来山下討幽境自挈瓶罌汲清冷味如甘雪凍齒牙紺碧光中敲鳯餅昬塵滌净清净觀心源㸃透詩中禪亟呼陶泓挾𤣥玉揮洒字字泉聲寒投閒半日聊此駐孤棹明朝又東去紅塵人世幾浮雲鍾皷空山自朝暮游恵山楊文炳騎馬西神訪逺公湛君舊宅且從容樓臺影落雙河口鍾磬聲傳九隴峯自汲清泉煎苦茗又携美酒看眠松若冰禪洞寒流静應是當年養毒龍題恵山倪瓚重過湛公宅因甞陸子泉佛香松葉裏僧飯石岩前市駿惟憐馬池荒憶種蓮清心有妙契塵事久終捐謁膠山李忠定公祠陳方丞相非腐儒慷慨遭國難平生痛哭心忍死抱長算嗚呼百歳後寂寞誰享祼至今空山中祠宇妥涯岸鳥迹上香臺樓塵落風幔山僧雖異流展像亟稱讚飄飄風塵際黄屋在䑕竄不有左轄尊至今猶扼腕公留人心安公去人心亂桓桓种将軍一皷鋭而悍所至係其􅖪小衂何足憚魏公經濟才安劉左吾袒傾葢出流離中情始冰泮倉皇青城役慘淡失神觀豈無婁敬筞尚足勤修捍落落付空言悠悠惜神斷聲名宇宙間草草入嗟嘆留題時思精舎李士行匹馬九峯道行行如山隂勝境不暇接爽氣襲衣襟悠哉時思庵寫我千古心脩竹秉髙節流泉響清音日暮山下去疎鐘烟霧深又張雨重逰九龍峯寒食生春隂竹露洒我笠松風吹我襟况逢金閨彦幽探惬素心風泉繞屋壁亂響琹筑音翻然出谷去回睇煙蘿深又倪瓚我生倦馳騖無機如漢隂重逰古蘭若對山開我襟風流李謫仙賞静諧夙心琅然哦新詩如聞大雅音回首石林晩白雲花雨深題趙䝉山悟空精舎張雨濯濯嘉樹色肅肅紫殿隂崇岡既延睇寒泉復洗心莭物士女繁而我得孤吟杖者足易跛移舟指烟林龐公豈無家魚鳥不厭深適辨芳春月就子碧山岑自仙源放船来雲林奉懐元鎮范致大徳原扁舟蕩槳出東城冣愛新流拍岸平霽雨蘭苕来翡翠晩風楊栁送鸝庚盈盈溪女臨沙浣厯厯郊農傍隴耕謬倚林齋望山郭憶君清話不勝情無錫縣志卷四上欽定四庫全書無錫縣志卷四中記述四之二上傳曰文者載道之器也是故先民所重莫尚於文道徳仁義非文不彰禮樂刑政非文不紀著稱事業非文不周討論古今非文不達文其可後乎先後所述有闗於邑政悉纂録之俾後来者有所考唐恵山寺新泉記獨孤及此寺居吳西神山之足山小多泉其髙可憑而上山下有靈池異花載在方志山上有真僧隠客遺事故跡而披勝録異者淺近不書無錫令敬澄字源深以割雞之餘考古按圖葺之築之乃飾乃圬有客竟陵陸羽多識名山大川之名與此峯白雲相為賓主乃稽厥創始之所以而志之談者然後知此山之方廣勝掩佗境其泉伏涌潛泄潗㵫舎下無沚無竇蓄而不注深源因地勢以順水性始雙墾袤丈之沼䟽為懸流使瀑布下鍾甘溜湍激若醴灑乳噴及于禪床周于僧房灌注于徳地經營于法堂潺潺有聲聆之耳清濯其源飲其泉使貪者讓躁者静静者勤道道者堅固境净故也夫物不自美因人異之泉出于山發於自然非夫人䟽之鑿之之工則水之時用不廣亦猶無錫之政煩民貧深源導之則千室襦袴仁智之所及功用之所格動若響荅其揆一也余飲其泉而悦之乃志羡於石恵山寺記陸羽恵山古華山也顧歡吳地記云華山在吳城西一百里釋寶唱名僧傳云沙門僧顯宋元徽中過江住京師彌陀寺後入吳憇華山精舎華山有方池池中生千葉蓮花服之羽化老子枕中記所謂吳西神山是也山東峰當周秦間大産鈆錫至漢興錫方殫故創無錫縣属會稽後漢有樵客於山下得銘云有錫兵天下争無錫寧天下清有錫沴天下弊無錫乂天下濟自光武至孝順之世錫果竭順帝更為無錫縣属呉郡故東山謂之錫山此則錫山之岑嶔也南朝多以北方山川郡邑之名權創其地又以此山為厯山以擬帝舜所耕者其山有九隴俗謂之九隴山或云九龍山或云鬭龍山九龍者言山隴之形若倉虬縹螭合沓然鬭龍者相傳云隋大業末山上有龍鬭六十日因以名之凢聮峯沓嶂之中有柯山華陂古洞陽觀秦始皇塢柯山者吳子仲雍五世孫柯相所治也華陂者齊孝子華寶所築也古洞陽觀下有洞穴潜通包山其觀以梁天監年置隋大業年廢秦始皇塢者柯墅之異名昔始皇東巡會稽望氣者以金陵太湖之間有天子氣故掘而厭之梁大同中有青蓮花育於此山因以古華山精舎為恵山寺寺在無錫縣西七里宋司徒右長史湛茂之家此山下故南平王鑠有贈荅之詩江淹劉孝標周文信並逰焉寺前有曲水亭一名憇亭一名歇馬亭以備士庶投息之所其水九曲甃以文㽃窳甓奫淪潺湲濯漱移日寺中有方池一名千葉蓮花池一名纑塘亦名浣沼歳集山姬野婦漂紗滌縷其皎皎之色彼耶溪鏡湖不𩔖也池上有大同殿以梁大同年置因名之從大同殿直上至望湖閣東北九里有北湖一名射貴湖一名芙蓉湖其湖南控長洲東洞江隂北淹晉陵周回一萬五千三百頃蒼蒼渺𣺌迫於軒户閣西有黄公澗昔楚考烈王之時封春申君黄歇於吳之故墟則此也其祠宇享以醪酒樂以皷舞禪流道伴不勝滓噪遷於山東南林墅之中夫江南山淺土薄不有流水而此山泉源傍注崖谷下溉田十餘頃此山又當太湖之西北隅縈疎四十餘里唯中峯有叢篁灌木餘盡古石嵌崪而已凢煙嵐所集發於蘿薜今石山横亘濃翠可掬昔周柱史伯陽謂之西神山豈虚言哉傷其至靈無當世之名惜其至異為訛俗所棄無當世之名以其棟宇不完也為訛俗所棄必其聞見不逺也且如呉西之虎丘丹徙之鶴林錢塘之天竺以其臺殿樓榭崇崇嶪嶪車輿荐至是有嘉名不然何以與此山為儔列耶若以鶴林望江天竺觀海虎丘平眺郡郭以為雄則曷若此山絶頂下瞰五湖彼大雷小雷洞庭諸山以掌睨可矣向若引修廊開䆳宇飛簷眺檻凌煙架日則江淮之地著名之寺斯為最也此山亦猶人之秉至行負淳徳無冠裳鐘鼎流也茍無其源流将安發予敦其源亦伺其流希他日之營立為後世之洪注云錫山銘二首後世無名人有錫兵天下争無錫寧天下清有錫沴天下弊無錫乂天下濟宋常州無錫縣記聶厚載無錫建邑始於前漢案陸羽恵山寺記云山東峯當周秦間大産鉛錫至漢興錫方殫故創無錫縣後漢有樵客於山下得銘云有錫兵天下争無錫寧天下清有錫天下弊無錫乂天下濟故順帝更為無錫縣又按圖經本𨽻會稽王莽改為有錫至呉時改為無錫又縣㕔記云其有是邑得名之始興建廢置之由陸鴻漸恵山寺記之備矣然則寺記雖備而與圖經互有得失而不究其本矣當周秦間大産鈆錫乃六國時也其後暴秦塗炭劉項戰争之符也樵客得銘合在文景之世是時弭師偃革天下清晏故神靈薦祉其銘出矣因之創縣宜彰其美陸云後漢得銘非也復不書王莽改易之弊莽若不為有錫則順帝何以更為無錫耶莽既改革則前漢得銘建邑明矣前漢季世錫乃復出莽包篡逆之心藴姦邪之計因其銘改其邑欲惑衆而祈應也及順帝時兵冦載戢其錫復泯故更為無錫益昭前䜟銘之文非人文也天意也陸云無名人者不可攷之辭也圖經秪述王莽改更不載得銘創邑之事葢闕文也夫名山秀嶺郡縣有之茍峯巖奇峭洞壑幽䆳勝恵山者多矣若探治亂之幾贊清寜之運則海内諸岫莫之與比山在西郊翠逼衙署雖隔梁溪一水而數尺之深不能截千仞之勢隂陽流謂坐辛山面巽水宜其邑廣財豊復多秀民也太伯渡江始居此地六朝而下賢才繼生披啚可詳不復悉紀自偽唐納境之後皇朝統御以来民風載淳文教益振前後出宰者率多名士如開寶乙亥迨天聖丁卯五十載間被唐虞之化蔑覩戈㦸下恱卓魯之政罔嗟苛刻此亦大塊間福地也豈非山岳之助乎獨厚載濫司銅墨素懵刑政字人逖愧於前修易俗欽徯於来者先是縣封密接呉境唇齒相齧兵冦荐侵官室民廬亟為煨燼後於縣城西南隅重建衙署事皆草創棟宇未完咸平壬寅年邑宰錢維周移就中位其經營之美石記具存寒燠代遷土木圯壊乾興壬戌歳縣令李晉卿明可禦姦威能率下悵公庭之卑陋不足壯大邑之形勢乃募豪傑萃杞梓利工善之器揆定中之日聴訟之㕔雄構撃皷之樓峻峙修廊挾室越柒拾間迨棘丞王周繼政工畢縣庭壯麗自此而始俾黎庶望而畏之増令長之威徳夫升是㕔治斯民者得不端心秉節誓公私察下民之枉直荅元聖之寄任然後不辱斯㕔不愧斯民矣舊制邑署修建弗給官用咸出於吏民之上貪者徇私忘公家之利㢘者㓗已避𤓰李之嫌所以縣寮公宇罕有修葺李公不畏率劒之譏竭力公家之事幹敏之譽猶沸民口可謂縉紳中英傑也惜其未立文誌寖厯歳時慮後人忘作者之勤勞失建邑之本始因訟空案簡直書前烈姑欲補圖經之闕正寺記之誤永李公之懿績也平清堂記尤爚觀近臣以其所主觀逺臣以其所為主古今不易之論也蓋惟賢而後知賢抜茅彚征治道斯泰而懐才抱徳者亦得以垂鴻名於盛世古靈陳先生在神廟朝薦士一疏至三十有三人皆一時名公偉哲延洪我宋無疆之休三百載如一日猗歟休哉㳂海制使可齋先生古靈之裔清文直諒毎以進賢報國自任不輕諾衣鉢有傳矣錫山舊為壯縣邇来敗不可支歳至五易長官可齋衣繡日畿選趙君紃夫来攝邑歳值大獲君聴訟以清守己以正敏明善斷事至立辨上承供億下蘇凋瘵士民感懐列治績于臺府乞就真以福百里公朝報可未幾可齋入轄中臺旋鎮東海貽書以平易近民清苦律己八言相勉君因欲擷平清二字掲于公退之室以自律可齋復大書鋟梓以恵之君嘱予著語將勒堅珉以侈教誨不倦之論爚邑人也日聞善政喜君之得所主於是乎書淳祐次元長至前九日朝請郎直祕閣尤爚記無錫縣宰郄公徳化記陳篆上即位改元建炎秋八月杭州守土軍竊發為盜意朝廷北伐之役勢未及討廼敢俘我王官燔我民廬釋獄囚發府庫掠金帛殘毒百姓據城以守朝廷命辛將帥甲二千用伐有罪將私犒賞不分士卒仇之師行次于加禾共殺將以叛勢不得進反兵北首聲假道於呉以如金陵志實利冦松江軒槁以備賊得巨舟百數夜襲松江一夕煨燼人無逃者蘇人閉闗塹河被甲登堞及賊距城雖矢石紛下而不少卻守臣實畏之乃使人遺以書廣設金糓願得㳂外壕以進賊計呉城險固未易攻徒老師爾遂盟以許之三日弃蘇州以行維舟于閶門之五里賊意是将被我邑而及常也語聞于道欲焚我居屋芟夷我農田䖍劉我士庶邑人聞之駭愕股栗莫不舉手相弔號若待盡邑宰郄公痛民之危既䀌傷心且謀其䇿丁國家軍興倉庫所積無幾公乃罄家之所蓄器用并帑藏得銀二千兩預一日遣人具咨目以遺賊賊見且喜已善公之能迎勞荅公以狀詞頗肯受時又得丞相李伯紀弟季言慨然謂公曰某職兼鈐轄属官公憂如此又不可坐視願前五十里迎賊諭道公意茍全此邑亦某之衷公之幸也公重信而聽之季言不及省問家人即衣褐單騎從者數人暮行夜宿于界亭明日賊舟果至季言見首領賓主禮唯謹諭賊以公之恤民愛物如此賊屈首無毅色謂季言曰毋憂敢不如所言季言即間遺公書具道賊所以狀公為之喜且懼謂兇人姦險雖首肯而心或違則適敗謀又明日賊舟将抵邑南門公接見首領以禮折勞曲度賊氣平改容正色語賊曰若所謂季公言不謬百姓得賜更生雖殺我以償所志無憾不腆金幣以賞從者或甘言紿我陽許而隂背之願先殺某不忍百姓之罹凶毒也賊欷戯感嘆謂公曰學士與李君實邑之父母當戒士卒釋甲受犒即趣舟以行乃指天以誓茍逾盟有如日公聞而後喜可知也賊於衝道間呼謂邑人曰爾等賴縣令郄公得保首領不然則松江矣雖燒頂斷臂何以報徳於是癃老扶杖擁公之車感泣跪謝是日賊兵果解維以去一毫不取士庶帖然弗擾嗚呼公之覆護一邑如此之至其古之遺愛乎夫漢唐循吏止有一事可書則勒功于碑以為甘棠遺愛况公之徳於吾民不啻覆載使後世湮沒無稱亦邑子之罪也篆於是紀其事篆聞唐朱泚之亂得一何蕃而六館之士不從君子謂蕃仁勇人也公儒者平時理縣尚寃恤百姓交愛之及是終以此得抗非仁而有勇者乎且以蘇州金城湯池雖松江有大川可恃而卒破蕩蘇人亦不免躬甲胄赴矢石為城下之盟不愧僅得免死亦幸爾無錫當通道外無城堞以守内無甲兵以敵賊一舉手則旋踵而傾覆郄公不動聲色俾賊善觧李勣賢於長城逺矣斯人今復見之嗟夫雷霆駭耳蜂蠆起懐雖賁諸荆育之倫未有不猶豫奪常者至若解紛赴難確然有不可挫之色自非足以化檮杌未有能喊虓虎而集之氣者也以賊之殺部将破松江視民如螻蟻至我邑以公故罔敢流毒非有以化之而然耶昔漢劉𢎞農反火虎渡河後世以為難事以公匹之過昆逺甚是宜邑之父老必有為公立祠者兒童必有為公歌謡者駢四儷六錦心綉口之士必有濡毫染翰為公作詩以頌其徳者至篆則恐公異日陞朝以濟大事秉史筆者舉其大而遺其細則叙公之事不能無闕文得此則庶可少助而張文愧近俚葢欲道其實焉公名漸字子進丁未十月日晉陵陳篆記常州無錫縣學記章望之有儒生謁于前曰我無錫之士人也示予以學宫之圖曰吾大夫祕書丞張樞言始謀人也其中南向者文宣王之殿也大門值其前論堂横其後後又有先生之室東西兩序則諸生之舎也葢在縣署東南三百步之間其貲財所出則吾邑業儒葢百人矣能倡義者裒諸儒之有為之也作之之日則丁酉秋也成之之日則明年春也諸生入學在四月之乙卯望越十四日己巳吾大夫與其僚宿於齋次庚午朔五皷作師生陪執事釋菜于廟庭退而宴私于論堂之上揖吾曺而謂之曰凢我造學于茲将使而習聞聖人之美用于而躬非専之决科也諸生曰敢不恭禀所教令也請以事之始末諉予以文久吾大夫之風於弊邑何如予為之持觴以賀曰有本哉張子之為邑而子之鄉里之慶也其令不擾而民信其文不宻而民畏鄉尊耆艾之無過者而後生有勸富家羣養孤獨之人而衆不憚煩則吾既知之矣政其成矣又興學校以貽人得不曰有本哉梓人之子知百木之堅脆商人之子知四方貨財之有無屠人之子善皷刀裘人之子善治皮豈皆其天才自然耶少而目治長而手治由是積習之漸耳燕趙之好兵也未必鈞好也其見者兵也荆楚之好巫也未必鈞好也其見者巫也吳越之好漁也未必鈞好也其見者漁也今夫孔子之道包百王之教治則堯舜光顯亂則桀紂誅亡大之通天地微之入鬼神宻義精言散在經傳厥有師斆學者猶莫窮三豕使閉户學之筋骸憊矣儻有得哉勤勞已甚邈焉大道死矣無傳如皆郡縣勸儒開設學館長吏且有意焉則其民感思自興心志開而見聞愽矣異時庸知是邦不由樞言户曉詩書而尚禮義歟予故為之詩曰表表南山興雲以雨木之苞矣春陽攸聚念我慮善教不有初彼繰者絲厥抽惟緒築室維何有殿有堂有序有房閑隂啓陽翔翔者楹盤盤者梁工逸於成伎臻其良我之思矣古之孔子我居我處友朋來萃爰飲爰食爰講爰議永懐恭人肅慎容止敬恭明神邑令有僚盛服至止徒御弗囂齋明有日其誠孔交何以薦之清酒少牢咨示父兄順聽邑命爾子爾弟朂成正性必儒其躬俾善其行貽親以不病咨示子弟優優在道律身如學以忠以孝令名匪今于後有耀貽孫以不詔中田有稷其實離離張子有猷神享人治善人之延百世攸宜爾民其承之常州無錫縣崇寧増建學記王相崇寧改元上既庚用二三大臣克篤前烈追盛三代唐虞之治爰詔冢宰慎簡乃僚置司講議政事當務之急是秋大丞相司空嘉國公本原神宗皇帝以聖智稽古即位之初慨然追法先王訓經以廸士置師儒以明道廣學校以教養嘗詔侍臣欲考古者庠序之制闓明堂辟廱以施發政功志未就遭元祐變革無復存者恭惟皇帝陛下盛徳大業修明法度追而述之深悼風化之微而欲善天下之俗非學不能成之謹以學校為今日先務制可之遂詔天下郡縣皆立學以三舎法取士粤明年甲申乃下詔曰神宗皇帝甞欲以學校取士而罷州縣科舉之令其法始於畿甸此學士大夫之所共知也朕不愛百萬之財以教養天下之士而以育材官人善風俗修政事為急其詔有司罷發解及省試取士並由學校升貢庶幾追復成周之隆紹先帝之緒以稱朕所以圖治之意其年十二月甲戌皇帝視太學幸辟雍即敦化堂賜上舎釋褐者凢十有六人其次免省試者二十有六人内舎生及畿内貢士皆免解其數幾半三歳賜第於集英者於乎盛矣美矣不可以有加矣雖三代教養之隆未有甚於茲時者也詩曰周王壽考遐不作人信乎美成在久者其必自於作人也愚竊以謂化人成俗莫不由學故先王之盛時設庠序以養賢論才徳而取士自天子諸侯之子下至國之俊造莫不入學自成童而藝文至四十而仕其習乎禮樂之容講乎仁義之說敦乎孝弟之行入以養其父兄出以事其長上與朋友交而有信臨財㢘處衆不争行修于身有聞於家達於鄰里鄉黨然後詢於僉言又定于鄉老之可信者而薦之始謂之秀士久之又取其甚秀者為造士然後司馬辨其論隨其材而官之任官然後爵之位定然後禄之夫如是積徳累善其勤若此其久亦至固非止取一日之長然後求賢審官寘彼周行如此其慎而有次第則浮偽矯激干利茍得之士不容於其間風俗不陷於偷薄而日以忠厚也宋興葢百有五十年而天下之學始克大立稽古之制放周之文其養也教以經藝文辭其取也考以材識行實由三舎以察士之能否而命之以官可謂希闊之舉矣是以詔下之日遐邇慶幸而奔走趍事者以後為羞常州無錫縣有學嘉祐初自龍圖張公詵始其興制之本見於武寧章望之之記後四十八年其猶子元度繼宰是邑會朝廷班學制他邑皆承命經營力作不暇而兹得即舊以新之功省十倍然後知君子之澤利施者逺而事固不偶然者是學之興適在其父子属者朝廷増養士之制初大縣以五十人為率後廼以三歳應書多寡計之無錫冝増給百人以百五十人為率而舊舎扁廹隘不可容今乃與其属度學之西偏増直購地斥廣而大之别為屋二十有六楹又遷庖厨浴室於其北鳩工於八月壬辰考之於十一月戊辰閎壯顯敞踰於昔制令以予掾於尉曺寔董廼事會終更属予為文以識其成予懼學者不明乎朝廷教養之美意而師儒之官或不揣本而齊其末失其所謂作成之方謹具述明詔如上所載因誦其所聞而著之夫大學之道将欲正心誠意修身以治其國家天下而必先本於知至則所謂知至者貴達乎道徳性命之理而已非止乎期命辨說形名度數之間弊於淺淺者爾故先王教法必以智仁聖義忠和為之别以孝友睦婣任恤為之同藝則該之以禮樂射御書數至於淫詞詖行析言破律異端之術為之誅禁書曰格則承之庸之否則威之方今舉皆法此吾固知其教化之行風俗之成唐虞三代之治可跂足而待之異時諸生道徳明秀行藝修飭歳頻升選賦菁莪采芑之詩以頌明天子育材之意書繡而謁謝先聖先師周覽墻屋慨然思咏令佐之功績而予因得并預兹榮附托不朽不亦幸哉輙不自揆退為之記俾刻諸石以告學者崇寧三年景至日無錫縣學之記李彌正孔子删詩列國獨存魯頌非私魯也以其君臣有道而庶事舉也體大而有證孰若修頖宫鄭亦同姓國學校不修而子衿之刺興其後然明至欲毁鄉校賴國僑知政議尼不行以鄭之刺則魯之頌宜也厥今天下郡縣同被王靈固無異政於奉令率職身任風教不為具文避課豈不冝大書特書行之永久乎毗陵浙右支郡文儒逾於大府無錫於郡属又壯哉縣也九峯峙其西太湖漾其南山川炳靈人物阜夥卿材民望繼踵接武服冠屨業弦誦者肩摩地属異時庠序未稱獨廟貌岌然孤立旁無夾輔春秋二丁官吏用事張以管葦風雨不除道路目笑廼紹興甲子秋詔諸縣治學舎尚或窘於獄訟簿書日不暇給遲回未遑越明年冬邑宰胡君舜舉既下車以儒雅飾吏事廼惕然曰徳音甚渥矧大邑多士其敢後於是營資庀具拓地度材属主簿朱君奇視役竒究心知務纎悉必躬克欽乃事以輔其長迄用有成堂皇敞崈齋廡整㓗榱桷户牖丹雘塗塈咸極精敏庫置什器廥蓄儲貯炊烹滌皆有處所凢為屋大小五十有四楹又徹殿葢而新之公無侈費民不告勞作始于丙寅春三月至於十月工畢丁未率里之大夫士釋菜于先聖退鄉飲酒于講堂主賓遵升降獻酬耆耋壯稚成叙在位觴豆静嘉殽核旅美揚觶致戒情文具盡禮成拜送于庠門之外觀者如堵嗟咨歡忻喜王化之復行伻圖來諗俾記以文斯舉也夫子以為冝頌其敢惜辭乃具載興建本末且告諸方來曰惟人萬物之靈者有倫有𩔖也五典之序自天子下達有虞夏啇之學名異實同皆以明倫為本周制益詳崇術立教廸徳訓行悉有官師以造俊秀養老齒胄獻馘受成咸在焉鄉學里選之法出長入治之政頋寓行於其間耳由漢而来取士之制一變而升孝㢘冄變而置中正三變而舉進士雖科目猥多途轍浸廣而明君良臣賢守令師以立學官増弟子員為急先務葢牧化淵源有在于是非直用文藝偕進取而已國朝自慶厯始詔州縣悉置學元豐推行三舎法於賢闗崇寧遂頒天下海隅遐荒禮乂渗漉中更艱難兹道乍熄今天子撫運中興儲神道藝既修鄰睦廓廓無事乃與大臣議建太學繼及郡邑以幸斯文縣大夫洎其僚精白承休亟就嘉績嗚呼士之㳺息於斯與夫耕養家食者盍體勉勵訓飭之勤平居孝弟忠信修身行道奉彝倫蹈聖域禄在其中矣其或先利後義綴緝口耳之學顓以弋釣名第如區區漢儒之陋指典籍為拾青紫具陳車服以夸稽古力斯豈君相崇儒易俗之㫖而大夫宣化流澤之意哉紹興十六年十一月朔旦無錫縣徐偃王廟庵記尤缺名錫山西南一舎而近是為五里湖湖之陽有山山之陽有廟祀徐偃王王嬴姓誕其諱為周諸侯治以仁義穆王西㳺瑶池忘返諸國交執玉帛贄于徐穆王馳歸伐之王不忍兵其民去之彭城武原山下而居焉至章禹見止於呉子孫散處揚徐間即所居立王祀韓昌黎記衢州廟網羅舊聞於斯為信葢衢常皆古揚州境也然今是邦蔑王子孫廟籍之不廢則里人若浮屠氏之力甞質圖志闕創始歳月惟殿重建於紹聖戊寅書棟可考殿南為軒軒南為門共以東西二序殿後小室浮屠氏趺息地也廟山相𫝊曰廟塘廟據其趾石塘横其東人是以名𨽻於廟者六十畆有奇歳取薪槱供祠祭等用紹興間善彬居之業猶故彬去中廢官稅莫供為里正病吾宗有佃于官為任輸送慶元己未衆謂祠宇日就荒蕪水旱疾厲將無所乎禱遂選請宗佾繼彬之舊佾敬共事神清苦持戒為一方信重經營補葺由殿及序翼欹而正更汚而㓗結庵廟北扁以保慶中建閣以儲𣑽爽旁闢軒以延賓客逼湖波往来病涉又累石隄百餘丈為橋三役竟復慮無以供衆乃置田三千七百餘步為伏臘計先後二紀乃克就緒一日其嗣孫文禮欵門曰廟菴規橅粗整惟故山未復余曰於吾宗族歸之吁始乎此廟僅有此山今由菴而隄隄而橋照映湖濵過者属目詢之衆皆曰佾與其徒道恢等弊衣粗食稽羸累奇而成余謂元本所在皆王仁義之澤浸潤演迤非惟子孫敬之與浮屠氏皆敬之故相為扶持廢者復興失者復還也禮請記顛末兹山去先瑩近余春秋掃祭經祠下瞻敬已登閣顧彼巖石磊磈久欲剜苔以記曽逰禮之言適與心會故書景定癸亥孟冬朔奉議郎宜差知安慶府桐城縣主管勸農管田公事兼弓手寨兵軍正尤缺名記恵山泉記聶厚載水之甘苦猶人之賢愚人生禀氣清則賢濁則愚水流因地㓗則甘穢則苦石脉至潔山泉悉甘而斯泉勝諸泉者以其感錫之氣也苦井投黑鍚於其中久而則甘查梅橙李和鉛霜食之則美葢錫能變味致甘也兹山當周秦間大産鉛錫豈非假其餘味乎或云茍錫能致甘則山下諸泉味當一矣而獨美者何也曰山一而源異也佗泉脉淺發於山表斯泉源深出於山骨故積霖而不溢乆旱而不竭承平之代錫乃深藏故源深而得其液焉不然則何以滑於衆泉重於諸水或云古時錫産東峰非泉脉矣恵山本也東峯枝也未有本亡而枝有者也利物之外尤資茗荈陸先生嘗奇之美名始振夫食味别聲人之常也甘辛爽口嬰耋一致至若水之淡薄其味各别能於淡薄之中紀其優劣峻其等級非奇人不能臻乎妙亦猶金絲睦耳清濁易辨其或審興衰察治亂非賢者罕極其奥審聲之奥䕫季而下世有能者别味之妙生民以来先生一人耳且䕫季於樂聴於心而不聴於耳先生於水别於心而不别於口後之慕先生名恱水之味者又不别於口别於耳也噫别於耳者衆矣非獨水之難别也先生未生泉味非苦先生生後泉方有譽信乎蔡邕辨薪而㸑伯樂顧駿而増價天下之山珠聮櫛比山中之泉絲棼髪委先生不登之山未嘗之泉多矣其間揖康洞而抗蘭谷者有之不偶奇識滔滔於汙潦之間惜夫且以無情之水遇至鍳汲引尚能紀名於簡册分甘於郡國矧有道之士遇知己振𤼵豈不能澤潤生民道濟天下煥令名於今古哉前所謂水猶賢者言非過也感物而動與泉作序陸鴻漸品水二十味江州廬山康王洞簾水第一常州無錫縣恵山石泉第二蘄州蘭溪石下水第三硤州扇子硤下石窟洩水第四蘇州虎丘山水第五江州廬山招賢寺下石橋潭水第六揚州揚子江中冷水第七洪州西山瀑布水第八唐州桐栢縣淮水源第九江州廬山頂龍池水第十潤州丹陽縣觀音寺水第十一揚州大明寺水第十二漢江金州上流中冷水第十三歸州玉虚洞香溪水第十四商州武闗西谷水第十五其水温煖蘇州吳松江水第十六台州天台西南峯瀑布水第十七亦呼十丈瀑布彬州圓泉第十八嚴州桐廬江嚴陵瀨水第十九雪水第二十恵山陸子泉亭記孫覿陸鴻漸著茶經别天下之水而恵山之品最高山距無錫縣治之西五里而寺據山之麓蒼崖翠阜水行隙間溢流為池如奏琴筑如鸞鳯之音味甘寒最冝茶於是茗飲盛天下而缾罌負擔之所出通四海矣建炎末羣盜嘯其中洿壊之餘龍淵一泉遂涸會今鎮諸軍節度使開府儀同三司信安郡王會稽尹孟公以丘墓所在疏請於朝追助𡨕福詔從之賜名旌忠薦福始命寺僧法皥主其院法皥氣質不凢以有為法作佛事糞除灌莽疏治泉石會其徒數百築堂居之積十年之勤大屋穹墉負崖四出而一山之勝復完泉舊有亭覆上歳久腐敗又斥其贏徹而大之廣深袤丈廓焉四達遂與泉稱皡請余文記之余曰一亭無足言而余於皡獨有感也建炎南渡天下州縣殘為盜區官吏寄民間藏錢廪粟分寓浮圖老子之舎市門日旰無行跡逰客暮夜無託宿之地藩垣缺壊野鳥入室如逃人家士大夫如寓公寄客屈指寄歸日襲常蹈故相帥成風未有特立獨行破茍且之俗奮然以功名自立於一世故積亂十六七年視今猶視昔也法皡者不惟精神過絶人而寺之廢興本末與古今詩人名章俊語刻留山中者皆能厯厯為余道之至其追營香火奉佛齋衆興頽起仆絜除垢穢於戎馬蹂踐之後又置屋泉上以待四方往来冠葢之㳺凢昔所有皆具可謂不欺其意者矣而吾黨之士猶以不織不耕訾其徒姑置勿論議焉是冝淬礪其材振飭蠱壊以趍於成無以毁瓦畫墁食其上其庶矣乎故書之寓一歎云紹興十一年六月日晉陵孫覿記并書膠山竇乳泉記翁挺膠山在無錫縣東去恵山四十里由芙蓉塘西南拔起平陸聮綿迤邐髙下十數而後峙為大陸有泉出其下曰為竇乳泉葢昔人以其色與味命之自梁天監時地為佛廬踞山北向而泉出寺背至唐咸通中浮圖士諫改作今寺依東峯與恵山相望則泉居左廡之南水潦旱䁧無所増損隆冬祁寒不凝不涸故其山雖不髙泉雖不深而草木之澤烟雲之氣淑清秀潤澒洞發越皆兹泉之所為也然而疏鑿之初因陋就簡決渠引溜不究其源閲歳既久瓴甓弗治滴乳渗漏淪入土壤建炎二年余罷尚書郎自建康歸閩適聞本郡有冦留滯浙河因来避暑兹山日酌泉以飲病其湫隘謂住山益公能撤而新之當以金錢十萬助其費益公雅有才智且感余之意以語其徒元净慶殊乂冲三人者或願出力於是坎其山入丈餘得泉眼於嵌竇間屏故壤理缺甃而泉益清駛乃琢金石於包山為之池廣袤四尺深三尺以蓄泉上結宇庇之榜曰蒙齋池之北㵼為伏流五丈有奇以出于庭跨伏流為屋四楹属之廡有扉啓閉之䄘曰竇乳之門庭中始作大井冄尋疎其櫺檻使衆汲葢數百千人之用常沛然而無窮事既成益公謂余曰寺有泉厯數百載較其色味與恵泉相去不能以寸而名稱蔑然公乃今發揮之當遂逺聞信物之顯晦亦有待乎余笑曰水之品題盛於唐而恵泉居天下第二人至于今莫敢易其說非以經陸子所目故耶自承平来茗飲逾侈恵山適當道傍聲利怵廹之徒往来臨之又以缾罌甕盎挈餉千里諸公貴人之家至以沃盥焉泉之徳至此益貶矣今膠山所出岡阜接而脉理通固冝為之流亞獨恨余邁往之迹介潔之名非陸子不能與之為重然山去郭一舎蹊遯阻而涇流陿邑居者欲逰或累歳不能至况過客哉比之君子恵泉若進為於時故雖清而欲凂竇乳𩔖夫逺世俗而自藏者將愈僻而無悶以彼易此泉必難之而公顯晦有待特以為言亦期之淺矣益公亦咲曰有是哉請著之泉上使逰二山之間者有感於斯焉遂書以授之歳戊申冬十有一月癸丑一梅堂記蔣重珍寶慶丁亥皇上即位之四年也重珍試吏苕幕以病易鄞幕待次歸治藥石無宏榻之地解脱閫中簪珥得敗屋一區掃洒扶持而居之癸巳春奉祠杜門痼疾弗瘳目昬耳聵老態具見乃於室之東南隅撤舊而新為堂一間兩挾置藥爐丹竈蒲團紙帳於其中將静坐養疴以茍旦暮之命屋卑地狭月餘落成故舊有誚予者曰子其掃除一室之小者丈夫歟吾視子幼孤繩樞甕牖所居不能容膝遷徙徬徨将母而行傍人籬落竊一椽之芘輒以為幸今破屋視昔已過分矣而奚以堂為余竦然而悲曰是予之過也雖然吾豈以堂為樂哉獨念吾家凋弊五十餘年生意幾絶其不肖誤䝉寧廟親擢未幾叨被皇上召對名列班簿么微此身病廢退休足矣足矣雖然此身父母之遺體也可不敬乎築斯室也敬斯體也乃所以報親也不然則安宅何在廣居何在而顧區區於此堂哉自斯堂而成而可以求師也凡齒徳俱尊者孝可及人者義理精熟者克忠克孝者博通經史者深識時務者吾於此下一風而問焉則身雖病而心不病矣自斯堂而成而可以合族也凡姿禀可教者好禮知恥者遷善逺罪者小㢘曲謹者貴不簡傲者貧不卑屈者文藝自将者多識事物者吾於此因材而篤焉則身雖病而家不病矣自斯堂而成而可取友也凢能修而通者能言而踐者卓犖之重者淳静而立者已知大體者能勤小物者虚心無我者善如己出者惡如無隠者相觀為善者吾於此久交而敬焉則身雖病而道不病矣夫心不病則不敞家不病則不替道不病則不孤貧無憾也賤無憾也存順事而沒寧嗚呼此豈忘其親而事身哉堂之前有梅一株清圓茂宻因以名堂無所取義示不改其舊也萬竹亭記蔣重珍余已記一梅堂復為後圃開林為徑縳亭東偏扁曰萬竹亭有池池上有梅梅之外琅玕森然向亭而立如衆賢盍簮挺挺其清也如三軍成列懔懔其嚴也風清月明發揮髙爽雨隂霧暗韜晦䝉宻景物常變皆啓人意余時命蒼頭扶掖病足自徑而亭焉非日涉成趣之謂也非起居適安之謂也其所感慨深矣余生於淳熙末年時和歳豐田里安樂先君與諸父實居鳯山貧不聊生故廬已屬有力者然茅齋方池飽足幽趣前植古梅後列脩竹藜杖野服日引児姪從容其間故余平時清夢皆此時事嘗刻之家傳以冩罔極之思矣今是亭之營本非求合而梅老竹茂渾然天成時異事殊心感情愴見先訓遺風使余一刻之不能忘也是余之一㳺一息洞洞属属然如將見之也可不謹哉雖然園林之樂一也而其所以樂此者則有間焉葢先君諸公之樂此也安於貧而予之樂此也厄於病貧者循其理分之當然病者出於形體之偶然律之以原憲之言則大有媿矣先儒亦曰人多言安於貧賤皆是力屈才短不能營畫若稍動得恐未肯安余之病廢抑近是歟書置壁間因以自警通恵亭記蔣瑎彭城錢侯申仲世家于無錫既仕而歸乃卜居于邑南漆塘山中聚書四萬卷日取而讀之探古聖賢之藴以美其身於其暇日稍稍疏巖剔藪立臺亭蒔松竹為㳺觀之適然是山無水率以罌瓶汲于湖以供朝夕之用僕奴顔汗肩頳陟降告勞紹興三年春二月申仲行于其居之南爰有寒泉發於岩趾以杖導之如龍蛇蜿蜒盈科而後進酌而賞之清冽滑甘與恵山之泉無異於是甃以瓴甓洄為方池饋饍漱浣日用而不竭廼作亭於泉上名之曰通恵意其與恵山通山居之父老聞而觀焉驚顧顔色且曰水之行地中一氣耳兹山去恵山不百里則其泉脉灌輸理或有之或曰不然吾與若居是山老身長子日以逺汲為病今錢侯蒞止而泉發於其居豈天藏神閟不輕付與有待而出耶衆以其言為是乃相與歌曰泉何為兮效祉侯有徳兮克君子挹彼注兹兮况羞饋祀永收勿慕兮自今以始又賡而歌曰孝友温良溢于文章錢侯之徳兮演迤汪洋恵我無疆兹泉之澤兮徳積而愈光澤久而彌昌世世其無斁兮於是宜興蔣瑎聞而異之曰昔唐相李文饒既貴重其服御飲食必欲極四方之怪珍常喜飲恵山泉置驛以取水天下苦之有浮圖人告曰長安昊天觀井水與恵山泉通公試之信然遂罷水驛寥寥數百年間其事相為符望然以予觀之恵山距長安數千里而逺有高山大川之限是烏能相通哉特以其味似之耳今九壠漆塘相望宻邇而申仲以隠徳懿行䝉神之貺則泉為時發亦無足疑者因取父老之謡言且本其所以作亭之由而為之記橘中記余永弼江東計臺從事曽當時謂子余子曰我於梁谿所居之旁辟小室周施纔丈尺非有増臺傑觀晧旰華敞之足言也而虚明静深似可人意日浩然其間誦書著文行歌坐嘯客至則有棋有琴一觴一詠不知世之有所謂榮辱驩戚者室雖小滔乎其有餘端不减啇山之樂也榜曰橘中子為我記之予曰嘻子相家子也何自而知此樂哉夫極狗馬之好騁逰田之荒揚激楚之結風𤼵陽阿之妙音冝子之所樂也而方且馳騖乎書林漁弋乎義圃好古博雅過於藜藿之士齊竽趙瑟晉棘梁棃宜子之所樂也乃漫不屑意至於商鼎魯鐘昆吾之刻岐陽之鼔則耽玩研覈恨不追軒頡而揖冰斯又侈之以詩書六藝之學先聖賢之徳音以成其文故舂容乎大篇則髙壯廣厚辭正而體備寂寥乎短章則潔簡疏越言峭而意美風雨交於筆札雲霞散於翰牘窮情盡變雖長吉之陣馬風檣嘉謨之孤峰絶岸不是過也異時必能𤼵揮志業羽翼清朝暢淑聲於不朽是無愧於四老矣此予所以樂為子記之若夫景物之勝登臨之適尚冀相羊其間而賦焉隆興甲申上已日鄱陽余永弼記無錫縣志卷四中欽定四庫全書無錫縣志卷四下記述四之二下宋蔣狀元母夫人墓誌銘魏了翁嘉定十有六年夏五月戊申蔣重珍舉進士第一故事京師給騶哄自端門騎至期集所侯王大第供帳左右觀焉時重珍迎侍母顧夫人于京下馬稱夀都人榮之留兩月餘授僉書建康軍節度判官御其母以歸于常州之無錫方榮聞四馳惕然如將弗勝韜輝潜實益求其可願者竊所器愛焉明年重珍以書來曰走也不夭以禍吾母曽不及豆區之養嗚呼尚忍言之吾母十餘歳鞠于外家管氏一日父母家絶糧母祝髪而號曰天乎吾親之未憗也此髪其有售乎命鬻於市得百金以給炊自是父母家生理稍蘇若有相之者迨歸我先君事大母軒氏樂而忘其疾我諸父七人或夭或貧先君不能自振假館于人吾母贊治室事既備且戒能誦習五經論孟親以授重珍有闗於義則伸而復之重珍既孤諸父給㠯饘粥母治絲枲取毫末之贏以給之甞驟寒無衾重珍覺而温如則吾母紉纊以覆之且語曰保汝以奉先祀也重珍泣數行下孀孤乏人不堪其苦或以貲訹重珍為之子而奪母志以配累舉得官者吾母叱之吾先君之未冺則母之力也重珍年十七嵗為人授小學有𥜗鶉結忍敝以待束脩之入它日吾母持敝襦於諸父曰藏此俾無忘貧賤時有欲妻重珍以女室廬田土皆具母謂幼孤得不死者諸父之力謹母他徙乃固謝焉重珍年四十餘始獲齒名于進士籍冬至之前日親黨賀吾母生辰母曰吾雅憚宴族今不聴汝為之後将有悔重珍色然以疑季冬得疾月正元日而卒身後惟破楮敗衣嗚呼天乎仗吾母居約蹈困而曽不食子之報也今将以三月庚申葬于謝堰之原祔先君兆重惟昔試禮部甞以文字受知于先生由是幸有錄于門心授神予非他人面交勢合比也墓中之石不可以它属某甞聞之國人曰重珍之父南式資方教為學謗贍不事舉子業其卒也重珍方生十年顧夫人持家教子有儀法讀書至男子由右婦人由左誦之尤喜言李氏斷臂事以為婦人當如此所居雖容膝而檢防内外凛不可越然則今於重珍之請也曷不敢諾顧氏晉散騎常侍贈侍中榮之後世居建業入國朝徙毗陵曽大父某大父某父某男子一人即重珍女適李大年孫女一人銘曰先儒有言婦適不再婦適而再飢寒之􅊣然飢寒之事小而失節之罪大此豈婦焉之責抑為士也之戒自義理之不競𣺌世途之焉届雖本無飢寒迫己莫知此身之愛偉哉夫人七十九載困窮陻阨而若是介百挫一忻亦莫之待琢銘幽宫其永勿壊宋故刑部侍郎蔣公壙誌尤焴公諱重珍字良貴常州無錫人曽祖紹祖端卿父南式皆隠徳不仕父以公貴贈奉議郎嘉定癸未公以進士第一人擢承事郎僉書建昌軍節度判官㕔公事未上丁太夫人顧氏憂服闋除僉書昭慶軍莅官一考引疾告歸改僉書奉國軍需次紹定己丑召除秘書省正字入對奏語剴切執政者不恱遂謁告還家就遷校書郎力辭不拜改通判鎮江府復以疾辭遂以直寶章閤主管華州雲臺觀端平改元上厲精更化召為秘書郎兼莊文府教授辭不得命乃詣尋兼崇政殿説書俄遷著作佐郎兼權司封郎官權起居舎人兼國史院編修官實錄院檢討官同知貢舉遷起居郎說書常如故以疾丐外除集英殿修撰知安吉州當上病甚屢請祠宫不允召為刑部侍郎趨朝甚急而公疾不可為矣請致其事詔特贈兩官守權刑部侍郎致仕積階朝散郎享年五十有四公少以雋異聞于鄉踰壯以髙文魁天下士入朝以直言名震天下由是受上異知入侍講席晉拜柱石宻勿嚴近知無不言而朞年遂退處于家葢平生侃侃自持不肯詭隨流俗少不得其意則必奉身而退於名位利禄常若凂已上思其忠藎方倚以大用而公遽歿朝野莫不歎惜焉公生於淳熙癸卯三月己巳歿於端平丙申十一月乙丑次年二月壬寅葬于當縣謝堰先塋之右從遺命也娶闕水丘氏承務郎介之女封恭人子二人長儀次似女一人許適登仕郎趙與可孫一人遂孫公之清名勁節歿而不朽自有名儒鉅筆任是責者茲謹撮出處大略書而納諸壙朝奉大夫除直寶文閣差知吉州尤焴述書元無錫陞州記李晦粤自黄帝畫壄分州堯命禹别為九舜承堯肇為十二縣之名未聞殷封國始有天子之縣縣之名聞而未詳至周作雒千里百縣縣有四郡縣百里郡五十里縣之名詳而在郡上始皇易封建為郡縣以郡統蓋昉於此自唐改郡稱州繼此以州領縣定矣厯代㳂襲州縣之名號雖一州縣之更改不同錫山境土初有人於山下得古銘云有錫兵天下争無錫寧天下平因名無錫舊志載周武王封周章少子贇於無錫安陽鄉甞為侯國秦漢為縣新莽亦甞改為有錫吳省并晉復置陳禎明中升吳州尋復為縣中間𨽻會稽𨽻吳不同㝡後隋於常熟置州取縣名為常未幾𨽻常州時唐武徳七年也緜厯至今左姑蘇而右南徐引蠡湖而控申江錫山州西可五里許清淑之氣蜿蜒扶輿磅礴鬱積而為恵山拔起萬仞泉居天下第二故其俗愿而文民多魁傑忠信才徳地大物稠古號繁劇天開景運二十餘年沾濡聖澤生齒日益衆元貞元年夏五被詔升為中州名仍其舊存古也明年正月之吉開藩于今五年升改州記未立非所以侈皇恩而崇偉觀也誠為缺典今知州禾速嘉勞甫與長官暨同列莅官年餘政事修舉一日謀之儒館補其未備博士張元孫命余着筆余老矣猶能記憶前世州縣名義㳂革一二并述今日升改年月以為他日删修圖誌之一助云大徳庚子中秋州人前鄉貢進士李晦顯翁記常州路無錫州重建譙樓記虞薦𤼵古者兵車所次必巢居於其上以觀敵譙門之設葢昉諸此考之史傳已見於秦置郡縣時其来逺矣無錫古壯縣今為常之支郡郡非縣比也陞改初郡治甞一撤而新之獨譙門仍舊貫因陋就簡人多議其未稱廼龍集壬寅秋七月朔海颶闖淮浙間官署之漂毁者什九以改併其陋且簡者一甓不復存值年儉重於勞民越嗣歳癸卯州長率乃僚相為謀曰譙門一郡政令所自出而千里之觀望係焉闕而不理過矣然必䇿不靡於官不漁於民計乃善會州尹楊公以寛民急務入籲中朝而長貳治辨歳終事填委唯州倅杜公昶職専警捕就董焉先是鄰郡僝工土木往往以田籍計畆而裒於民吏弄滋張侈大踰度卒致徴呼旁午人不堪之杜公之佐郡敏而恵乃召吏於庭以謂譙門之役斷無它技捐官吏半朞之俸可得千五百緡不給則輟公田以繼之而已爾其度財於賈傭夫於市毋奪人毋妨農吏奉示䖍既戒既備遂以是歳仲冬之七日始事歳除而告成於是近者恱逺者来行者議於道更相告語以為郡府者吾生聚事育之所倚賴今獨諉之於官若吏豈人情哉一日衆環堵于前或貫而鏹或觴而酒俎而肉衆未及言而公遽諭之曰若軰欲何為耶是役也吾官吏力足以辦此毋溷汝為也衆懽以入輒委之吏舎而去以緡計者七千五百有奇吏因悉上送官為用不匱矣大學曰有諸已而后求諸人書曰民情大可見皇衷烝彛千古不泯謂民風之漓不足以觀感之者厚誣吾民也向使有一毫強拂於其間則怨汝詈汝者至矣况望其麾之而不去哉昔孔門髙弟有何如斯可以從政之問吾夫子誨之以尊美而屏惡因民所利而利之擇可勞而勞之美也不戒而成慢令致期惡也聖人之言嚴矣哉世率以儒者之論多迂闊於事情余觀錫山之政非聖言之一驗歟杜公徴余記興造之歳月因以為後之從政者之戒云旹大徳八年歳在甲辰夏五旦日郡人虞薦𤼵記億豐倉記陳䢍國家謹租賦之入東南諸郡尤加之意故二千石長官専任其事所以重民食也常之為郡沃壤多而稅石夥於是置倉無錫州以便海漕合是州及義興溧陽之糧凢為石四十七萬八百五十有奇悉於此輸納焉歳率大府分官董之其責至不輕也今總管丁侯以開敏練達之才兼得為政之軆釐剔中外周知民間利病至順三年冬寔涖是倉先是倉吏並縁為姦往往髙下其手當民租入時設計漁取或至倍輸羡餘既多則縱姦民乗間為欺詭攬掩冒莫能究也夫漕事有嚴𤼵廪視之米色腐黒者有焉糧數折閲者有焉向常為官府之累矣侯思所以革之爰命属吏疏厥糧多者俾先輸且躬授教條立期程信賞罰壹斗㮣均富貧政不擾而民信從率皆趍事唯謹務先期以濟向之漁取倍輸之患有不懲而自息焉侯之徳民戴之寔深非有過人之才者能如是乎昔漢兒寛為左内史收租税時裁闊狭與民相假貸故民樂輸繈屬不絶課更以㝡史臣稱之繄侯之治毗陵也下車未久適中寛猛之政彬彬可紀及董制糧事来錫山也一舉而掃數十年之弊其事有難於児内史者今因州人士有請故書其事于石侯名亦祖丁世系仕籍有史筆焉梁溪義塾記吳澂梁溪義塾者湖廣等處儒學提舉強以徳之所建以淑其里中之子弟者也塾在無錫州西南隅梁溪之東屋以間計三十而贏田以畆計一千而贏歳入以斛計五百而贏燕居有申申夭夭之儀報祀有濟濟鏘鏘之禮延請名儒以施其教招集後進以受其教務俾講習其間者皆能明經修行以稱時需此其意也侯嘗教授於南劒福州又提舉江浙湖廣其在官也政教所被亦云廣矣其居家也乃於里塾之教拳拳若是予竊證之以古古者國有國學鄉有鄉學二千五之州五百之黨既莫不有學而二十五家之閭猶必有塾里中有道有徳之老朝夕教焉何也蓋教必自近始始於塾而升之黨升之州以達于國然後考論其材而官之培其根本者深厚而非晨種暮穫之比古之人才所以後世莫能及也今日有路府州縣儒學有舊設新創書院不為不多視古者鄉遂州黨之學豈有異乎然教官例從省部注擬何能一一得其人哉學院之教有虚名而無實效往往由此義塾之教不然選擇師儒在已識鑑而無所牽制雖未必有如淳古道徳之師然茍能得耆艾博碩之彦引導有其方熏漬有其漸不壊之以速成不害之以小利亦庶幾乎古焉爾凡逰處義塾之子弟勿卑汚其志斷斷以古之人才自期此心此理必通貫體用而無闕遺所言所行對越天地而無愧怍若夫淺末於口耳葩華於筆墨以釣譽媒身而已寕不負義塾所以教之意也夫強侯又捐山四百畆為義塜凡貧而無地可葬者得葬焉侯之用心亦仁矣至治三年當路以其事轉聞于朝立門旌表以示勸云重建五先生祠堂記尤棟寶祐戊午四明袁擇善從尹常之無錫剏先賢祠附庸于學厯十九年時丁元二眡廟貌不如故自虞君薦𤼵出而教授生徒乃汎掃蕪穢一撤而新已而増博喻師長之員會孫君桂𤼵居之之二人者皆鄉人也相與諏經訂禮為之言曰必釋奠于其國之先師無先師則與鄰國合國有人焉何庸取諸其鄰我楊文靖龜山先生雖非吾錫之人而寓居於郡者十有八載今城東精舎乃其講學之地是即鄉之先師也鄉者先生標表是祠居中奠位曽謂土崩瓦解之勢我興受之然有不依形而立者參倚如見吾黨小子忍倍此而更師乎喻工部玉泉先生尤文簡遂初先生李肅簡小山先生蔣忠文實齋先生何莫非吾錫之人而起家於邑者相望百有餘歳今里中故宅尚有指為藏書之所非鄉之先師與玉泉遂初實齋三先生已有秩祀而小山先生未及與享迎之致敬獨可遺乎若夫廣漢大儒非不同宗河洛景定間已繇此而陞從祀然猶不敢先之繹而江西顓門之𣲖其師友父子視吾諸老先生之所學未能無頓漸之異伊欲借晉人將無同之說以復其位庸詎知不見幾而作乎審厥象而儀圖之盍亦知所變置烏虖職教者之能為是言是必有黙契於心而無疑者抑慮夫斯道之無師無𫝊復質之鄉老蔣公應新以其規接前輩年幾八旬其尚論人品具得之於耳聞目見真公曰如吾五先生則有可言者惟堯舜文武周公孔子孟氏所傳之道至河南二程夫子而復𫝊而龜山先生葢受學於二程夫子昔伊川自涪歸獨稱楊謝長進使其學少變於凋落之餘詎有是言哉慨思龜山載道東南士之㳺先生之門者甚衆玉泉乃登其門而能續程夫子之道遂初不及登其門而從玉泉學亦能續程夫子之道小山實齋二公固不及登龜山之門又不及從玉泉之學因龜山玉泉二先生論孟中庸大學之遺言而皆能續程夫子之道故玉泉得之而主紹興之正論遂初得之而為乾淳之老儒小山得之而居慶元之學黨實齋得之而號端平之善𩔖自九京之莫作而國人之無所矜式也久矣不有君子其能國乎始吾學之祠諸賢吾見其居於位者與先生並果孰使之然哉近若潭之長沙有祠周元公先生而以胡子五峯張子南軒朱子晦庵為配者而鶴山魏公了翁因其修祠嘗為之祀亦深嘉而樂道之今可法也曲禮曰羣居五人則長者必異席曷不即玉泉遂初小山實齋四先生而配我龜山先生乎讙曰然論定然後肖其貎是歳垂光大荒落卜六月丁亥展舎采之敬周服殷冠魚雅就迣枚數先生之族子裔孫有渙乎無萃竊幸尤氏喻氏蔣氏文獻之存輯冠者五六人奔走與祭是禮也救滅亡而扶壊爛豈曰小補之哉其初位次未定繪事未素棟方卧疾未興虞君數四貽書俾識其事奈何不能守墳墓政懼夫無詞以自白其先人何敢表先儒而厲後進輒謝不敏暨歸梁溪澤中直落其成固以請自揆愚隘無能言之不出恥躬之不逮燾子侍側語之曰二子之所云一老之所𤼵揮是即記也吾奚以文為女其敬誦所聞告諸執事者雖然棟豈終無言耶夫祭不越望魯可以祭泰山楚不可以祭河惟人亦然自生以來未有夫子然終漢之世其廟猶不出闕里永平二年詔郡縣行鄉飲始祀周公孔子亦未有作廟之文唐武徳二年始命胄監立孔廟貞觀四年始勑州縣皆立孔廟出闕里徧祠夫子距今載六百五十年繇此觀之其在諸子非其鄉國而祭之僣也僣祭非古也不于其僣而于其古則蒐遺黙異凢今日之所是正者庶幾解逐客之嘲棟不學妄論至此不能不為先生之罪人尚有餘藴吾牛飢姑止後學尤棟記重修淮海先生祠堂記闕名淮海先生秦少㳺建中靖國初卒藤歸葬髙郵致和中遷葬于常州無錫縣恵山之原子孫因家焉墓故有亭刻建炎四年追贈龍圖閣告并山谷送秦少章詩置之亭中秦氏仕不顯諸孫貧窶墓四旁地皆豪右所得亭亦毁壊不存山谷詩石歸邑好事者獨贈碑荒蕪榛杞中樵蘇不禁墓祭幾絶開禧丙寅永康應純之以州判官攝邑事訪問遺蹟慨然興念封殖其墓取旁近地還之率邑士大夫合錢建亭乃立贈碑且贖還詩石擇秦氏諸孫知學者使肄學職得月給使具祭祀倉臺黄公常守湯公皆助其凢廢應君故從余學余自澄江召歸道出無錫應君首及茲事且請余記之余嘉其志不待再請然行役未及作也至吳門會淮東漕孟良夫因論少㳺醉卧古藤隂下人謂卒于藤之䜟也獨未知一事少㳺墓後古松一株直幹髙聳有巨藤自墓穴中出周匝數四已乃施于松上葢覆其墓此真古藤隂下也松為人斫去藤芽暨今僅存爾良夫信忠孫恵山寺功徳院也故知其事最悉應君来索記因併及之四月朔日永嘉闕無錫州退學齋記尤棟錫常邑也士窮不離學歳大比視闔郡所薦率強半擢奉常第亦項背相望時哉時哉其結纓裹革者不可作枚卜生之徒今餘幾虞君君瑞職教喟然歎曰昔者所進将沒世而不稱乎周轍東人之楊之墨各於其黨孟子辭而闢之孔道以明二三子何患於喪乎歸而求之有餘師力相學西隙地結廬可五十席築亭伐石不隕其名使遺簮堕履歳時燕序而子若孫來者之所景慕落之日惟余未反屠肆君瑞走書寄所以齋額來審余輒謂齋固所以待先進之士政所以崇易退之風茍知進而不知退士何學擬之名退學何如君瑞曰名之必可言也請為我属筆噫難言也聖門四科之目非後之科目比吾夫子不能無所優劣至論進退大義則恥原憲徳南容直史魚而君子伯玉其嚴於春秋之法凡我同盟當相與不負好學茍不由其道而往者則吾問之曰先生學何之進士尤棟題蔣應新書華孝子故址記髙明恵山寺之東偏當泉水之上有三賢祠按志書今祠址華孝子所居宅也初祠久廢呉人王彬始復倡建既成則以三賢事刻諸石且曰初址實孝子故居孝子之事不以沒而不著復礱其碑隂以記其事章善也按齊史孝子名寶晉義熈末始八歳父豪戍長安且行謂曰我還為汝冠後長安䧟父歿寶奉命至七十不婚冠或問之不忍荅輒號慟彌日建元三年詔表其門閭凢史載孝子事若此葢自西晉以来尚𤣥虚賤名檢教弛法斁波流風靡而孝子獨能篤至行終始不渝其誠意惻怛可以貫金石于雲霓若與宇宙日月同其久於此見天之降衷人之秉彛不以衰世末俗而有異也孝子晉人而志謂齊孝子者葢孝子生於晉長於宋沒於齊當其一身而天下三易姓當時居朝廷有爵位者朝事司馬氏夕事劉朝事劉夕事蕭恬不以為恠而孝子奉父一言七十年餘未甞斯須忘以至沒身不替使當時朝廷有爵位者其奉君命恪官守亦咸若華氏子則晉不當為宋宋不當為齊而孝子宜不曰齊孝子也凡㳺于茲者憇幽林酌清泉臨風覧古懐三賢之髙風慕孝子之至行其素有志者宜加奮勵其未能者則澄思革心勉追遐躅是則某所以樹碑之意云爾夫人性一耳有為者亦若是吾徒宜毋自怠薇山先生虞公墓志銘韓性薇山先生虞公既葬十有八年其嗣志道使使至山隂貽性書曰先人力學厲行期見於用維卒不施抱志而沒不肖孤承乏官使蒙恩追秩承務郎常州路同知無錫州事惟是冢木盈把矣而刻石未立懼無以逭不孝願為銘詩刻諸冡上以示無止性辭不獲則諾而為銘公諱薦發字君瑞虞氏逺有世緒居丹陽者尤稱大族七世祖諱申行父其字為安定先生門人實生衢州府君諱浵以恩贈中奉大夫再世曰将仕郎諱柄娶于晉陵遂遷晉陵於公為曽祖祖諱伯䕫考諱杲皆耆年隠徳為善宋徳祐中公避地無錫樂其土風居焉幼頴悟讀書過目成誦未弱冠試鄉校輙髙等賈師憲為淮東閫擬試甚盛試者率多為卷以幸得公笑曰是罔利者非耶一卷可矣已而果中前列文聲益著家公鉉翁為郡守客之郡齋屢上吏部未幾而科舉革矣公益力學不倦性純孝事親葬祭盡禮與弟應酉極友愛自為師生待宗族盡婣睦之道族人有被掠于兵者有去從異教者公詢訪得之經理其田宅賴以不絶與人交和不茍同故舊有過不輕棄喜節義處約而好施人有急難周之惟恐後歳歉貴糴損其直與人冨人稍稍效之平生口不言錢不以産業為意視貴勢不以一毫挫也無錫學廢士無所歸強起公為師招諸生坐齋中講說義理考論徳業士聞風而至課試無慮數百士有田籍官俾給驛傳公言於帥若憲諏律引誼其言􅈤􅈤諸使素重公從其請得免者且百家鄉飲酒久廢贊使邑長行之再龜山先生之来南也居于常者十八年公為祠堂奠龜山于中而列鄉之先賢於左右歳時祠焉秦淮海之墓在恵山南為趙氏業公諭趙歸其地于學為之封殖士論韙之為鄉校官十餘年廪禄皆辭不受而校官之所當為者舉行無遺文風之盛它邑莫能及聲譽聞于中外當路貽書於公將致公都下而行其法於它學公謝不往因遂辭學事則又貽書曰杭學者一省之望為杭學得賢師江左之士有所式矣公又力辭即遣使賫𠡠授興國路儒學教授拜命不赴自是杜門謝所還往號薇山老人以見志學者稱之為薇山先生延祐甲寅初行科舉左丞許公董試江浙擇試官必當世師表遣使致公公曰科舉興廢吾道所係今取士本朱文公貢舉私議吾㳺場屋時所願行者不意莫年見之且所避者利禄也今幸無是遂應命試闈經疑問忠恕或引天地忠恕以對他試官曰地豈有忠恕耶乙其豦公曉之曰此非川流山峙之地不對且轉語同列若此者黜公作色曰此程子之說君非寡陋者豈偶忘之耶吾無書自隨君求程氏書宻視之毋令人笑其陋也他試官始媿服公因盡閱餘卷黜而復取者數人監試佟公伯起謝曰微公幾誤事公之學精而守固於此亦可少見矣素不喜佛老氏學不道機鬼神異之事暇日惟以詩書自娛毎戒其子曰爾既仕當以職業自見謹勿藉手書尺求知也由是志道累任果有立文集雜著二十卷藏于家素康強少疾童顔蒼髯如未始衰者一日忽晨起正衣冠步入正寢顧諸子曰今日三月十九日也顔色不異雙眸烱然拱手避足而逝生于宋嘉熙己亥四月廿七日卒于延祐三年三月十九夀七十八以是年五月十九葬開元鄉恵山之陽娶趙氏先公五十年卒追封恭人唐氏封晉陵縣太君太君謹重修整處己待人皆足以為閫範後公十六年年九十而卒生宋嘉熙壬寅四月二十日卒于至順二年十一月初四其年十二月十九合葬於公之墓子男三人志道承務郎嘉興路嘉興縣尹致仕師道慶元路儒學正守道女二人孫男七人士𢎞早卒淵慶元路慈溪稅務提領沆浚泂澂女十四人曽孫男女十二人甞試論之士患於無才有才矣患不知學學不足致用猶無學也足以致用而汲汲焉惟用之求不得則若有觖焉者有道之士不是為也公負頴異之才而加之學力故其成就有過人者卓然以經術行誼為東南學者所宗足以致用而用之不究從容進退皆適其宜可謂賢矣安定先生以體用之學教人公其有得於家傳者歟引其家學久而彌長追榮錫爵人所共羡而公之志不若是止也夫學見於用者徴其用用之不究者尚其志志之難言也久矣公之所望於後而後人之所當益勉者也予故反覆論著而不敢畧也遂為之銘銘曰學成於已以用而彰譬彼導江其流洋洋行父氏虞學于安定位不稱名以鴻厥慶其傳七世是生先生束髮亹亹祖訓是承跂彼修途有捷坐趍珮玉長裾獨行徐徐用之於鄉鄉人是懌行于膠庠衿佩是式論議已慤操履彌堅索其緒餘可知其全采薇于山於焉是息以順以寧繄學之力學期于成用不期售鬱彼新阡克昌爾後故恵泉散更顯翁先生李府君墓誌銘白雄飛至大四年三月二十七日己亥恵泉散更李顯翁先生病革香巖白雄飛偕貳車劉通甫往問焉先生撫已而謂曰人生天地間過客耳生死理之常也矧吾逢太平之世行年七十有四精力強健子孫滿前安享甘㫖日與故舊賔客相羊閭里間從詩酒琹書之樂兹亦大幸雖暝目無憾矣以身後碑銘託於公曰先生之材世所推服如山斗尊韓之仰何待贅辭儻遇不諱當如斯言先生首允而竟不復語既出舉家悲號知下世矣聞者莫不䀌䀌越三日闔郡官僚鄉閭士大夫從大守石抹公詣門往弔嗚呼哀哉已矣乎善人吾不得而見之矣會哭而去卒哭之日乃子元招持書篇衰絰来見泣而告曰此先君自述墓誌也其辭云顯翁名晦小字原孫姓李氏自臯陶蔓衍支派具載家譜予一脉居于常之砧石始祖熈靖立朝三十年徧厯華要因家于汴詳見東都事略南渡後復居于常終端明贈少師子元瀹以國子入學釋褐未幾中詞科贅錫州胡叅政家卒朝請員外郎葬邑之開元鄉遂占籍焉乃五世祖也曽祖正誼父煥世習儒業隠徳不仕生兄弟四人予居其長育于外家外祖尤梅澗業宏博科㑭任檢閱書史其猶子率齋棟壬戌省魁持其筆硯十有四年夜以繼日孜孜于學隆冬惟紙衾破而復補不恥也凢有觀覧一見即通若宿世然咸淳戊辰逰學京庠元名燧鄉簾引經義無慮二百卷多温福士名實未孚俱以尋常視我暨中首選始願内交宿齋三年聞見愈博庚午歸應鄉舉更今名拔郡解赴禮闈書義即常州解試題執政者慮考先泄至日皮筒下大院與别院兩易其題有鄉人竟以予所作主意破題不易一字冠别頭朋友常以李省魁目之自此文聲益振赴館珠舎陳簿适兄弟遇之㝡厚束脯過於守宰禄家道稍豐皆稽古力也元二之變停貢舉脫去時文窠臼得以肆意簡編教子凡經子史集醫卜隂陽筭數射覆真草篆𨽻下至詼諧小說釋道二教無不講貫大徳甲辰劉行省之子世常平父許魯齋髙弟也守無錫一見契合首問鄉校無書板遂出白虎通風俗通家山圖書韓魏公家祭式俾予悉為校正繡梓貯于學家無宿舂好延客厨無積薪喜買花臺省時貴折節相過親戚故舊時來聚首詩書辯論琴尊情話殆無虚日忘勢利齊物我是以壽踰七十優㳺暇豫得終天年自號恵泉散更有事文𩔖聚刋誤四集顯翁記聞三卷板行于世有恵泉小藳七十卷李姓源流一卷見俾兩子元昭元明求名傳删定續刋兹懼溘先故自述我心䥴石遺命歿則樹于墓前使後人覧之庶知其為錫山之一逸民也吁至大戊申十一月十五誌又曰先君生於宋嘉熙戊戌七月二十七日配周氏子男二人長曰元昭玷充慶元慈湖書院山長次曰元明亦𨽻儒選女二人長適玉泉喻工部孫之緯次適湖州徳清院主簿王將仕子鏸孫男四人實容宷皆習儒業宣尚幼女二人在室將以困敦之月重光作噩之日卜𦵏于州隅景雲鄉弓河之原從治命也慎終追逺之禮敢不盡心棺槨衣衾僅遵古制唯誌石未完其文以道義為重交分深宻者莫若我公願無忘吾先君臨終之言而銘焉謹泣血以請余聞而哀之不敢辭銘曰錫山青青恵泉泠泠鍾奇孕秀生此豪英心潜聖學選中王庭閉户著書揮麈談經國人矜式學者儀刑壽踰七十令徳惟馨疾革蚤作遺訓叮嚀天不憗遺遽夢奠楹孝哉二子元昭元明朝夕號泣㒺極哀情弓河之源鬱鬱佳城刻銘立石永賁幽扃無錫縣志卷四下
