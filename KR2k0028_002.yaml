body:
  text: 無錫縣志卷二山川第二易曰天險不可升也地險山川邱陵也王公設險以守其國自古城郭莫不因山川之險以為之固無錫屆乎浙右之地無名山大川之限而其所恃一本於先王之教化體天地尊卑之義民生習為禮法以固其封域而山川之佳秀者適足為邑人逰衍之娛有不足以恃其險焉然亦職方之所不可缺也作山川第二總山二之一地里家言山亦多岐矣雖其言之不經要亦有其理其言江南諸山皆自西蜀而來逾河導江並入于海蓋以地勢言之莫髙於西北由是指西北之山為天下之根本脊脈順其性而下以至於東而止論其勢然耳或言浙之諸山悉本天目之來脈此據浙之一境而言蓋杭為兩浙之都㑹天目居杭之境內界乎浙之兩間巍然傑出莫之與京地里家言凡山低者多則高者為主故以天目為浙之主山則兩浙之山皆附屬矣其他不足論也且以無錫一邑言之既以錫山為主自錫山西北由惠山龍山周回起伏缺而為㠏􅣦走而為青山大穹或斷或屬行五十餘里入於太湖由錫山而南蓄而為獨山引而為石塘軍將蜿蜒盤礴亦五十里而入於湖其他若鴻堠膠顧芙蓉石窒等山率皆孤邱獨巘東西望於錫山有拱輔之勢此無錫諸山之大略也錫山去州西七里開元鄉在惠山之東本惠山之脈也惠山至是中斷伏而為山岡缺半里許復起為錫山至錫山而山脈始絶唐陸鴻漸惠山記云惠山東峯當周秦間大産鉛錫所以謂之錫山至漢興錫方殫後有於山下得銘云有錫兵天下爭無錫寧天下清有錫沴天下弊無錫義天下濟至王莽之時錫復出光武至順帝之世錫纍竭自是以來不復有錫故東峯至今謂之錫山考之銘記則知是山古嘗出錫有關於世也又按無錫諸山皆高惟錫山獨低地理家言凡山髙者多則低者為主故世以錫山為主山惠山雖髙不得並稱也俗云客山髙利客不利主理或然耳其山得以主山稱故擅名浙右山上有小石圓廓若盆引竅潛通山谷積水嘗滿雖大旱飲千人不竭俗呼為仙人洗面石山前有蕩曰月子蕩山下有澗曰錫山澗二泉之𣲖由澗引入梁溪元延祐間里姓倪文光創精舍於山之陰名清微築隄遏澗為水簾作潺湲之聲晝夜不輟山根有聖水井宋盧至柔隱山中學道時所鑿環甃以甓上悉書符篆以為汲飲可以愈疾至今邑人信之山側有塢曰秦王塢惠山記云始皇東遊望氣者以金陵太湖間有天子氣故掘而厭之其東復有塢曰烏腰塢皆與山近春申君廟在山下惠山在州西境內去州七里當錫山之西南徐記云其南北數十里嶺東西各有泉皆合梁清溪水西南入太湖唐陸鴻漸惠山記云惠山古華山也是山連亘二百餘里吳地志云華山在吳城西一百里晋宋時號曰厯山郡國志云南朝多以北方山川郡邑之名權創其地又以此山為厯山以擬帝舜所耕者山北有石田曰舜田有石井曰舜井其村因謂之厯村寰宇記云無錫有古厯山下有春申君祠又有范蠡城釋寶唱名僧傳云沙門僧顯宋元徽中過江住京城彌陀寺後入吳憩華山精舍華山上有方池池中千葉蓮華服之羽輕與華州華山所産同老子枕中記云華山者吳西神山是也郡國志又云無錫有九龍山亦曰冠龍山鴻漸記云是山一名九隴一名九龍一名鬪龍九龍者謂山九起若龍虬縹螭合㳫之狀鬬龍者隋大業末山上有龍鬬六十日因以名之按今山有九峯下有九澗其第一峯有寺曰普利院寺後有若冰洞冰泉及天下第二泉山西復有古洞潛通包山即古洞陽觀今亦擁閉山下有羅漢泉今不見其迹山側有黃公澗因黃歇以名去黃城八里自錫山東第一峯曰惠山由惠山而北曰龍山自龍山龍尾斷曰㠏􅣦口舜山又在其北又名舜柯山即所謂厯山也其上有舜田不種而禾歲恆産一二穗并舜井在焉自惠山北至龍山凡九起止㠏􅣦口而山脈始微斷至舜山復起北走迤邐入湖皆惠山之脈故昔人併稱之耳不然則寰宇記何以言厯山下有春申君祠及范蠡城哉今春申君祠廟基在錫山當惠山之東范蠡城即所謂斗城者是也在惠山之西去春申君廟六七里而所謂舜山者從惠山自南而北相去懸絶十里在九峯之外不應與惠山混稱也特以惠山之名著故併稱之無疑矣然觀南徐記所云是山南北數十里則縣西之山與惠山同脈者皆可以惠山稱而陸羽記又云是山連亘二百餘里則又知太湖諸山與惠山勢若相接者皆可稱為惠山又不獨指同脈之山也而謂之厯山則當自南朝始曰舜山舜柯者後人因厯山之名故附㑹其說舜田舜井不過假舜之名以神其事耳兹山得泉水之勝為錫之名峯髙人逸士既多卜築若孟信安之别墅尤遂初之齊居皆在焉其他僧坊仙館若孟氏之時思倪氏之清微凡以菴若院名率皆占山之勢指為佳境四方遊衍之人舟車隘塞攜觴挈榼歲無虛日而兹山之名將與湛茂之陸鴻漸同為不朽矣其山雖為一邑之名勝然無深林大谷之藏竒葩異草之産惟鴻漸所品之泉實為天下第二及金蓮花世亦罕有圖經雖稱出石香葇然亦不見采録馬鞍嶺在山上璨山去州西七里在惠山東南亦惠山之脈山之麓有明陽觀云即古洞陽觀基也觀中有亭曰橫翠以望諸峯山半有閣曰望湖下瞰太湖蒼蒼渺渺一瞬彌矚旁有半山之亭亦可遐睇山上有泉曰洞酌泉由觀而上可到泉上有亭可坐可睡山下有大冢元延祐間邑士强以德買地附山築為大隴凡有死而無以為殯者給以葬穴至今號為義冢春暮之月邑人祭掃率往逰焉亦為邑之名境山後有義興嶺由此可徑義興大池塢牛來塢即遊來塢皆在山南龍腿塢在大池塢北章山在惠山之西南與璨山前後相向皆惠山之來脈龍山乃惠山之北尾一名龍山蓋惠山自南而來其中為馬鞍嶺自馬鞍嶺而北至龍山而惠山之岡斷矣越絶書所謂縣西有龍尾陵道春申君初封吳所築者即此是也至今山尾呼曰龍尾山上有龍潭周氏風土記云龍山去縣十八里上有三峯有白龍潭東晋時有家其上者妻妊三年忽産一龍色如銀七日升天去龍母死葬於山頂龍父併所居成潭號曰白龍潭自後遇龍一歸歲則大熟山由是名按此山春申君時已稱龍尾陵道則龍山之名又恐不止於東晋産龍之後也山下有精舍曰悟空宋宗姓若嵓之小隱長松茂林深蒨蓊鬱可以遊處有軒曰玩雲當惠山西來第七峯之下朝霏夕陰宛若圖畫方外張伯雨及往來之士皆有留題山西有澗曰回龍澗其水從山之西循山而北轉龍尾東流注于河㠏􅣦山在龍山西去州一十八里惠山諸峯至龍山龍尾稍斷數十步然後突起為㠏􅣦山其斷處曰㠏􅣦口由㠏􅣦口以通湖上諸山舜山與㠏􅣦山相指舜山去州西北三十里一名柯山俗合而名之曰舜柯山即所謂厯山也與龍山㠏􅣦皆相近中斷處即㠏􅣦口風土記及陸羽惠山記云西神山聯峯疊嶂之中有柯山者吳公子仲雍六世孫柯相所治之處故山以柯名郡國志稱南朝多以北方山川郡邑之名權創其地故以惠為厯山今厯山不云惠山而此山其獨指為厯山者豈此山與厯山之形真肖特表而出之耶惠山之脈相去固不甚懸絶也蓋惠山西來山勢連亘四十里蜿蜒盤礴至是始得其半豈四十里之山皆得為惠山稱是山居適其中惠山既改為厯山故指此山界乎兩間者總而名之耶而所謂舜山豈亦因厯山之故而變稱耶山上有舜田舜井豈亦因是耶抑以舜田舜井之故後人妄指此山為厯山而呼為舜山耶不可必其說也故併疏之以俟知者辨焉東孔山去州西一十八里舜山之陰其上有宋端明尤袤墓西孔山去州二十里與東孔山相屬皆舜山之來脈石盆山在舜山之西勝山在石盆西與舜山接山下有煮狗嶺雞籠山在勝山西自石盆而下皆舜山之連脈青山去州西北三十五里面太湖山下有張循王墓及華藏寺由青山嶺以入寺中山下有小嶺塔子嶺唐灣去青山不遠唐灣山在青山下邊太湖唐灣上蒼峴嶺在其側皆青山之連脈大穹山去州西北四十五里廣長山在大穹山西白射山又名白石山去州西五十里面太湖在廣長山之西月牌山在白射山西與白石山連章山在月牌山西與月牌山連大雷山小雷山並在章山西章山之連脈郡志云雷山在太湖中馬跡山西風土記云震澤中大雷山小雷山或以為舜漁之所按今富安鄉有大雷小雷二山邊太湖當在馬跡之東南俗呼大犂山小犂山今吳縣洞庭山亦有大雷小雷之名郡志所録當為富安之二山風土記所載乃洞庭之二山特以名同誤指之耳此山俗以雷為犂者蓋語訛也或以為大驢小驢失之逺矣又名閭江山其稱大驢小驢或因此耳陳灣山在小雷山西胥山在小雷山之西由陳灣而上曰廟渚山即此山也山下即閭江史記曰吳王夫差殺子胥取其尸盛鴟夷浮之江中吳人憐之為立祠是曰胥山張晏曰胥山邊太湖去江不逺百步故云江上今閭江有闔閭城下有伍員廟山以廟渚名者此也其山去州五十里下有青山嶺韓灣山在廟渚山下與青山嶺接自大穹而下諸山悉連亘相屬皆為閭江山之連脈歸山去州西北四十五里風土記云闔閭殺伍子胥以鴟革裹之浮於江中子胥既死吳人於此山猶望其歸故命其山曰歸山胡山與歸山相近平塔山去歸山不逺皆在閭江山東長腰山去州西北四十五里山上有嶺曰長腰嶺賈山去州西北四十五里在長腰嶺東苦奄山去州西北四十五里皆近安陽山安陽山在州之西北寰宇記云安陽山到州五十里周回一十八里髙一百丈風土記云周武王封章子贇於無錫為安陽侯至今山下有周贇墓意者山之名義兆始於此今人稱為陽山亦稱曰西陽山郡志云山在陽湖之上故名二說當有合也其山平地拔起髙峯圓峻四望如一挹湖水之光包林木之秀若人之有文采然故世易以美名曰文筆峰山趾有翠微院長廊邃宇甲於鄉為今名剎山頂有龍池廣袤三丈深過一仭嵗旱禱之嘗驗山出大石可為礲臼始見采於漢大夫陸端旁近數州藉以用之惟文質粗礪不堪作他器也然自漢至今取之不竭山之空嵌皆弊於掘鑿故中多洞穴舊稱三十六洞今山多圯塞不可尋究但言九門洞張公洞甘草洞清水洞而已要皆為取石之穴非天成也錫山之脈蜿蜒北走至是始斷橫山在㠏􅣦西周回十四丈髙九十丈去州西二十里其東與龍山勢若相附中斷為平田通㠏􅣦口以出惠山其西與管社山相望中隔為梁溪太湖在其北磻龍澗大澗皆在山下許山去州西南二十七里在橫山之西鎮山在其東月山在其西是謂山之兩尾西顧山去州西北三十里在孔山之北與橫山近雞坑山去州西二十五里邊太湖石步山與雞坑山相連晶山與石步山近俗呼為甑山謂山形之肖也管社山去州西二十五里西南入太湖與獨山相峙中匯為浦嶺門亦名廟門其東望于橫山溪流導二山並注於湖獨山去州西南一十八里其北與管社山相望衝為浦嶺門南與充山對峙中匯為門號曰獨山門溪流入五湖演漾而西從門出太湖充山去州西南二十五里與獨山相對山下有灣曰曹灣自曹灣而下坦為平壤悉皆良田相去不一里許截然中斷為獨山門山東即五里湖湖水由山下里西流入太湖朱山一名朱墓山在充山南去州二十五里漆塘山去州西南二十五里與朱山相連北臨五里湖宋知州錢紳退老卜築其間遺趾尚存遊者咸造焉山南有塢曰狗腸塢狗腸塢北曰南桃花塢羅嶺又在其南石塘山一名廟塘山在漆塘山之北去州西南二十五里山西有徐偃王廟山下有石塘枕長廣溪一名廟塘按廟記云錫山西南一舍而近是為五里湖湖之陽有山山之陽有廟又云廟山相傳曰廟塘廟據其趾石塘橫其東山是以名山北有嶺曰山門嶺嶺後通漆塘大浮二山路耿山去州西南二十五里在石塘山北得揚名開化二鄉諸山之中其山髙聳冠乎兩間層巒疊嶂四面環繞若相朝拱然前俯長溪後背太湖要名佳勝之境山旁有塢曰董塢與山相接山下有嶺曰羅嶺可徑石塘山復有小山無名俗稱為野山由野山而度許舍許舍山去州西南三十五里在路耿山之南橫山之東羣峯盤旋結為深谷宋待制蔣諧顯謨許德之侍郎施坰禮部尤袤皆嘗卜築其內山東有湯村嶺南橫山去州南四十里當許舍山南白茅山在南橫山之南與南橫山接山下有嶺曰赤石嶺羊祈山與白茅山連軍將山去州南四十里邊太湖南唐時嘗屯軍此山以禦吳越之兵故以軍將名其山山北有塢曰甲仗塢相傳所以貯兵器之地南曰官材塢俗稱為官來塢西曰竹弱塢五浪山與軍將山連山下有嶺曰芮家嶺嶺下皆平田吳塘門在其下吳塘山相近焉石人塢在山西廟山龜山裏山長太山去州南四十里在裏山北山下有長太寺過山在長太山南吳塘山去州四十五里邊太湖其山與鵓鴣山南北相望山下坦為平田去三里許始匯而為川號曰吳塘門溪流從中瀉入太湖門上駕橫木為略杓名沙木橋由是徑鵓鴣山以通湖上之路自充山至吳塘山山勢連亘五六十里或起或伏獨路耿軍將最髙要皆為路耿軍將之來脈鵓鴣山去州南五十里山下皆良田離山一里許即吳塘門其山與吳塘山南北相望沙頭山一名廟山在沙觜上邊太湖與鵓鴣山相近其沙觜亦曰廟山觜沙觜山在沙頭山南其南即竹山竹山在沙觜山南無錫諸山之南脈至是而絶鴻山去州東五十里本名皇山吳地志及南徐記云太伯宅東九里有皇山太伯所葬即此山是也語訛以皇為鴻耳一名梅李山亦曰梅里平墟髙十丈上有太伯墓白擔山去州東四十五里佘山奚山去州東四十五里亦名晶山俗呼為諧山奚字語訛也石窒山去州東五十里嵩山去州東五十三里嵩或作松南徐記云松山一名少孤山堠山去州東四十里吳地志云堠山周回七里髙七十丈南徐記云堠山北有白石峴堠或作緱龍腿山在其下亦堠山之脈膠山去州東北四十里在堠山東北髙九十丈長九里山上有梁蕭侍郎宅今為招提旁有泉出山竇中味甘色白名曰竇乳泉又有滌硯泉世傳蕭公肄業時嘗滌硯是池故名池上有亭曰硯水亭山上有獸蹄痕寺僧神其說以為金牛跡是山與惠山相去四十五里東西相望宛若翠屏其西小峯曰鳯凰山甑山與鳯凰山連插旗山與甑山連皆膠山之來脈芙蓉山或稱余蓉山或稱余洪山去州東三十里其山周回八里髙三十丈歲遇清明遊衍之人畢萃此山俗因目為清明山山上有二土邱一號龍井峰峰上有龍井嵗旱可禱又名天一峯復有頑石二各髙六七尺人呼為石公石母二石對峙中可通人往來或云山下居民時望見石有光彩又有金雞石明澤可愛與公毋石相連世傳每至歲旦昧爽有金雞飛鳴其上亦未見其必然山之西趾有田一規名彈子邱中有土壠隨田圎轉宛若彈丸環壠四旁之田一犁可竟不費周折稱以為異土人不敢近壠而鋤鋤輒蛇虺出焉當芙蓉湖之未塞為田時登臨兹山可以凝眺烟水山由是名其曰余容曰余洪者皆因吳人語訛謬稱之耳斗山去州東北四十里其山長九里山頂自南至北有土邱七象北斗形故以斗名山山之中有黃腰嶺西通牛塘山上有白堊朱石回山在斗山之東與斗山同𣲖里人併稱為回斗山觀基山在回山北二山相連本回山之𣲖山西有舊闕碑無字枝柚山或云梔子山在回山西其山多生苦梔黃文山俗呼為黃梅山四山皆頑石不宜樹木在回山東前山在回山東南去回山不逺白石山在前山東與前山相近皆斗山之餘脈西髙山去州東北二十五里興寧鄉其山平淺無深林邃谷山之南峯頂上有仙人禮拜石石上有迹類人額痕及兩肘膝伏處相傳人俯其上不論老稚長短其額與肘膝處皆當其穴以為異山中有路可通興道鄉其中峯曰靈龜山北峯曰鳯凰山山西世為里姓髙氏之居山由是名俗呼為西膠山蓋指膠山為東故誤稱耳東顧山去州東六十五里其山占江陰常熟無錫三州境寰宇記云顧山東屬蘇州西屬常州一名馬婆山山上有寺及龍潭金匱山又名紫金山在州城東北隅第六箭河上鳯光橋東周回數十丈當邑之中邑之主山也世傳有金匱藏書於山下為無錫之巨鎮故名今按此山負土所成要非天設屆邑之中故指為鎮山云然亦總山之不可佚也姑附之於篇末總水二之二周禮載九州之浸揚州其浸曰五湖即今之太湖也無錫據太湖之東倚湖為浸環州之水皆出納於湖旱則隄以遏之潦則疏以浚之此無錫之水利也嘗考邑之水源出於惠山之泉至山下分為二道一注於雙河一下於梁溪皆合於運河之水湖流之出而通於運河者其南皆自小五湖而入青祁淹過大小渲而㑹于梁溪以達於河餘若長廣新安烏角諸溪及蠡瀆之水或竟出為河流或相㑹于溪水至運河則皆合而為一其北閭江陽湖之出皆太湖之餘波閭江之水悉㑹于雙河口陽湖之流則貫直湖淹而出花渡雙牌諸港皆達于運河而復合為一運河之水其南皆東注于太伯瀆鴨城河而入蠡湖以下東海其北則東流為五瀉水支分脈拆至江陰而達于大江此無錫之水勢也太湖去州西南一十八里自西而北繞州之境四十五里即古具區震澤所謂五湖者是也越絶書云太湖周回三萬六千頃禹貢之震澤爾雅云吳越之間巨區其湖周回五百里襟帶吳興毗陵諸縣界東南水都也周官揚州其浸五湖張勃吳録五湖者太湖之别名以其周行五百餘里故以五湖為名郭璞爾雅巨區注云縣南太湖也中有包山山下有洞庭穴道潛行水底無所不通號為地脈舊經云湖內有靈山去北岸二百里其山清秀山中有靈山寺舊屬無錫後割入晉陵南際有洞庭山在蘇州吳縣界産柑橘與瀟湘洞庭等非船莫通寰宇記云太湖從湖州長興厯常州義興晉陵及無錫界今按太湖南自平江長洲縣入長興與義興並行四十八里東南至吳縣界自烏山北沿湖西岸東行六十二里又與吳縣為界沿湖屈曲越常州界一百四十八里與州之分水為界占州之新安開化揚名開元富安五鄉由新安鄉烏角溪口自南而西迤邐行至富安之閭江而止為是州之巨浸西流之水皆㑹於獨山吳塘浦嶺諸門而通太湖小五湖在州南一十八里一名五里湖其北梁溪水順流而南二十里其東南長廣溪迢迢二十餘里注于西北皆至湖口與梁溪水㑹二水合流由是湖過獨山門及廟門而通于太湖青祁淹去州西南二十里揚名鄉東西二十里南北一十八里梁溪自州西迤邐西南流分為大渲小渲二淹並行至青祁淹口復合為一由淹入五里湖從廟門獨山門下太湖大渲淹小渲淹去州西南一十六里揚名鄉梁溪由開元鄉自北而南直流行五里至孤瀆口分為二道其西為大渲東為小渲二水中隔平壤相去五里餘復行二十里許至青祁淹始合里人多植蓮芰于是夏秋之月荷花盛開彌望不絶好事者往往泛舟汀渚為煙水之逰以謝炎暑梁溪即梁清溪距州城西四十丈闊十丈深三丈源發於惠山之泉入溪為南北流其南繞惠山西南三十里自小渲淹西流出浦嶺獨山二門入太湖其北至五里橋與運河通今謂之雙河口吳地志云古溪極狹梁大同中重浚故號曰梁溪南北長三十里郡志云梁溪去州一十八里按今溪在西門外去州治才數十步人止稱西溪而不言梁溪其云十八里者併其發源處稱之耳據溪側有將軍堰今構石梁于上遺趾尚存去州南可一百五十步風土記云唐景龍三年置堰堰旁有梁蕭將軍墓宋嘉祐中開運河通梁溪取太湖水堰遂廢毗陵圖經云唐將軍單雄信提兵道此以鎗止水為堰故號將軍堰舊有閘今廢二說不同互有得也凡歲潦則是邑之水由溪泄入太湖旱則湖水復自此溪回居民藉以溉田俗云州人不能逺出出輒懷歸以此溪水有回性所致孤瀆曹黃涇梁墓涇俱在州南揚名鄉其水由溪東出運河長廣溪去州南一十八里廣二十五丈長三十五里占揚名開化二鄉亦惠泉之脈吳地記云縣南有長廣溪水深三尺陳勳所導按今溪由梁溪西南而下從揚名鄉南至開化鄉水分為二道其南出吳塘門其北至揚名鄉由五里湖出獨山門並入太湖溉田百餘頃大旱不竭唐干淹去州南二十里開化鄉長五里其水南自洪邱淹東從五里湖其西與北皆由太湖西流而至中蓄為浸東北出于蠡河洪邱淹去州南四十五里開化鄉其水南自太湖演漾而來蓄為浸澤東北出于蠡河蠡瀆去州南三十里在新安鄉寰宇記云范蠡伐吳所開又云太伯瀆西帶官河東達范蠡瀆入蘇州界澱淤年深元和八年孟簡開浚之併導蠡湖長八十里即此瀆也按今此瀆在新安鄉通太湖其地謂之蠡口自蠡口北流十餘里而與梁墓涇合為一今人稱為蠡河自涇口東出運河與太伯瀆之水㑹為河流東葑瀆周涇皆自蠡瀆而來達于運河赤城溪長五里去州南三十五里新安鄉太湖之上南通太湖北入于蠡淹烏角溪長六里去州東南四十五里新安鄉太湖之上東出望亭入運河西至于太湖是溪中分為平江南北之限隔新安溪長六里去州東南四十里新安鄉與太湖相近東出運河其南與西並通太湖閭江在州西四五十里太湖上即太湖之别浦也史記云夫差殺伍子胥取其尸盛鴟夷革浮之江中即此地其江與太湖合流實太湖之區也特别其名耳江上有觜凡十五曰閭江觜錢家觜陳家觜蔣家觜奮家觜盤塢觜章山觜鹽亭觜大驢觜秦墓觜韓家觜後峴觜邵墓觜許峴觜奮橫觜皆近江之島又有惠家觜杜公觜蓮荷觜皆在湖上去江不逺陽湖去州西北四十里神護鄉東西八里南北三十二里深五尺寰宇記云陽湖在晉陵無錫兩縣去常州東六十四里南入太湖二縣中分為界北通蚊濤臨津等湖謂之三湖南徐記云陽湖壅塞久壞宋文帝元嘉中治湖之四旁成良田數百頃今存湖名北復有一湖俗謂之北陽湖亦曰宋建湖度其地本臨津以宋文帝嘗治故名雙河在開元鄉去州北門外一里西溪之尾於此與運河合而為一曰雙河其流從運河入越布政鄉自西北而南復引于西貫直湖港過張橋為陸墟河而與晉陵縣界長岸河接其流通於太湖者皆自直湖港而下秋子瀆毛瀆皆運河之旁流而西者並注于雙河北渡港在青城鄉運河之旁流而西者貫直湖港入雙牌而與雙河之水合而為一直湖港在青城鄉由運河而入志公港南下為北洋湖湖之南即港之脈直南而下貫于神護富安二鄉入晉陵縣界而下于湖雙牌港在青城鄉近晉陵縣界越神護鄉過黃灣橋而入于南陽湖運河東南自長洲縣界望亭入本州界行四十五里越州城迤西行四十五里至五牧口出晉陵縣界勝七百石舟大業雜記云隋大業六年十二月敕開江南河自京口至餘杭郡八百餘里水面闊十餘丈又擬通龍舟并置驛館草頓並足欲東巡㑹稽自唐武德以後至今纍浚為東南之水驛城中河凡十有八皆運河之支流别𣲖曰斥瀆在北倉泥橋西㙂曰胡橋河在州治後曰州橋河在州治前曰營河在州東與州橋河胡橋河並通由胡橋河東出運河曰水䃮河在大市橋南曰束帶河河上即宋尤端明之故宅河繞其居故以束帶名自斥瀆而下皆引西溪水東入運河曰倉前新河元大德間鑿水通漕運曰弓河曰九箭河皆縣之古河運河舊通焉今多堙塞二河併疏其說於後自倉前新河而下皆在運河東弓河本舊縣之羅城濠也歲久無可驗但稱東河故老相傳云弓河自閘口灣灣由東門而南出度僧橋通運河如弓之背故號弓河以運河比之弓絃也九箭河在弓河上有河九道皆通運河若弓之有箭然故老云無錫有九龍峯下有九澗城中有九箭河應之諺云九箭通出三公今通者惟第六箭河餘皆漸次堙塞今列九箭河于左第一箭河在東南隅邊巷西止官街而絶水常涸不通舟第二箭河在東南隅莊巷底河面頗闊祇長十餘丈耳可停舟第三箭河在東南隅染涇橋西稍西而止東向粗可通舟第四箭河在東南隅楊家巷頗深闊西至大街而止稍可停舟第五箭河在東南隅董家巷西止𤣥聖觀前稍西而止但一大溝耳第六箭河在東南東北兩隅界東自𤣥元宫前而入西出運河稍通小舟河北有善智尼寺又名師姑河第七箭河在東北隅福田巷底惟存一溝約長三四十丈西至陳賢良墓右而止第八箭河在東北隅自東門橋北而入西通洞虗觀前而止可通小舟第九箭河在東北隅盛巷底惟存河口一二丈耳五瀉水即五瀉河去州北一十四里天授鄉通運河闊六丈深七尺其源上湖大陂自五瀉口北岸行泝流四十里至江陰晉陵兩縣界雉尾口從界北四十七里深三尺已上至申浦上口北入大江潮汐所至可勝二百石舟溉田一百七十餘頃舊有堰臨官塘稱五瀉堰宋元祐間既治蓮蓉湖為田因置閘於是以備旱潦今則架橋其上曰髙橋以通徒行堰與閘俱廢矣運河水由橋下北流越興寧鄉入江陰界由夏港而入于江長渠在州東北二十四里北入江陰境勝二百石舟或云在州西北一十五里入五瀉渠泝流六十里北入江陰軍按此渠當與五㵼水同𣲖而異名驗其方隅之向背地里之相去與泝流之逺近水力勝載一一可比而推况出自北門入江陰之水道莫此為大特以歲久蔑有識者姑辨其說用闕其疑歐瀆去州西北四十里興道鄉有減水石䃮斗門閘宋元祐間置蓋以芙蓉湖為田遇潦則開閘泄水從閘口出由江陰界以入江閘口河其水從五瀉水東流而為陸逐港過蔡家渡分為二道其一循州城而東越景雲鄉至梅里鄉界口而入于伯瀆其一至膠山鄉界口東流越膠山鄉而匯于南與宅仁鄉新河合又行數里北走而入于江陰界五步湖去州東北七里天授鄉東西二十里南北一十里南徐記云五湖其源濁而流清溉田百餘頃或云即陶穀所隱之處梁載十道四蕃志云漢末錢塘縣陶穀有道藝隱居五部湖時大旱蝗太守奉印綬請為無錫令穀退而歎曰郡界有災安得懷道而不救之到城修六事行弭災之術三日雨蝗盡死穀乃遁去今此湖皆塞為良田惟所經之道稱五步塘今之塘頭即其地芙蓉湖在州東北興道鄉寰宇記云上湖一名芙蓉湖亦謂之無錫湖占晉陵江陰無錫三縣界西去常州五十九里東西四十五里南北四十里深五尺東流為五瀉水毗陵志云芙蓉湖在縣東五十五里南北八十里南入無錫縣北入江陰軍東南入平江府北入揚子江吳地記云無錫湖萬五千三百頃為晉陵上湖又云無錫湖通長洲多魚而甚清徐州記云橫山北曰上湖南曰芙蓉湖陸羽惠山記云惠山東北九里有上湖一名射貴湖一名芙蓉湖其湖南控長洲東洞江陰北掩晉陵蒼蒼渺渺迫於軒戶故惠山有望湖閣蓋自山下百餘里目極荷花不斷以為江南煙水之盛於是皮日休買舟與陸龜蒙及毗陵居士魏不琢共為煙水之樂時乘短舫載一甔酒由五瀉徑入震澤穿松陵抵杭越號其舟曰五瀉舟南徐記云芙蓉湖晉張闓基其中泄湖水令入五瀉注於巨區欲以為田盛冬著赭衣令百姓負土值天寒凝沍施功不成而罷至宋居民因其舊迹隄岸堰水塞湖為田今悉南東其畝矣湖之經界漫不可考獨興道鄉麻塘橋至今有湖東湖西之稱亦皆良田無復痕跡以諸家傳記所載考之則芙蓉湖占平江常州江陰凡三郡自無錫推之其南當與延祥鄉鵝肫蕩接為控長洲之境東入興道鄉麻塘港以北為洞江陰之界北出興道鄉越歐瀆為掩晉陵之域其西則五瀉水從東流入于湖如此則南北不下七八十里東西亦四五十里始合傳記所載獨徐州記稱橫山北曰上湖南曰芙蓉湖按今南橫山在州西南開化鄉去惠山不下十里北橫山在州西北開元鄉去惠山亦十五里兩山相望皆在運河之西臨太湖而惠山記稱東北九里有上湖若在橫山之北不應與惠山逺近不倫姑辨其說合諸家傳記之載并著徐州記之失好事者或可因是以求古跡西瓜瀆在興道鄉其源出天授鄉運河自蠡河西北至興道鄉而始以瀆名行二里而與麻塘港合麻塘港自咸塘河之西而為鄒祁河至興寧鄉界口名麻塘尖而為麻塘港行二里許與西瓜瀆㑹而接于江陰界咸塘河在天授鄉出北門運河之水入于髙橋之南而貫于五丫濱為河之起脈北走越興寧鄉而通于江陰界嚴埭河在天授鄉由北門橋而下出閘口河為蔡家渡從渡口向北直下即河之起脈入興寧鄉為泰平港入膠山鄉為嚴埭河河流由是入江陰界其泰平港北流轉西亦入于江陰之境由夏港而達于江其東則為興塘港其北則為劉家河興塘港嚴埭河下流至宅仁鄉分為二道其東則為興塘港至宅仁鄉而絶復引水東流而為包堰河至懷仁鄉而中貫為南北流南接于盛塘河河水東入常熟之境西通上福鄉芙蓉塘河其包堰河北通于江陰界張塘河在興寧鄉太平港之旁注于西者稍行至胡家渡分為二道西為張涇通五瀉水其南入天授鄉咸塘河北通江陰界太伯瀆去州東五里貫景雲太伯梅里垂慶四鄉西枕官河東通蠡湖又東達于濠湖入平江界嵗久淤塞唐元和間刺史孟簡浚之長八十里闊一丈二尺深四尺民獲霑溉之利唐書地里志云元和八年孟簡開太伯瀆東連蠡湖寰宇記云太伯瀆西帶官河東達范蠡瀆入蘇州界澱塞年深粗分涯岸元和八年孟簡開浚之併導蠡湖長八十七里廣十有二丈自後太伯瀆謂之孟瀆蠡湖謂之孟湖孟簡傳云元和中簡為刺史有孟瀆久淤治道溉田千頃盧同有謝諫議茶歌云安得知百萬億蒼生命墮巔崖受辛苦之句正浚此瀆時為其勞民也此瀆始開於太伯所以備民之旱潦民德太伯故名其瀆以示不忘瀆上至今有太伯廟鴨城河在梅里鄉其源自運河而來東出江陂橋過景雲鄉越梅里上福至延祥鄉而止其在景雲謂之王莊橋河江陂河在梅里謂之新塘河鴨城河在上福謂之信義瀆杜家河亦名太平橋河至延祥鄉稍蓄而為謝蕩引流至甘露水分為二道其一過濠橋而去其一由月河而出皆東注于濠湖破塘河在梅里鄉起于鴨城河越太伯鄉過大橋南入于蠡湖潭塘河在梅里鄉鴨城河之旁注而北者至宅仁鄉為劉家河貫興塘港與新河接新河在宅仁鄉南自尤村渡至江陰界河面雖闊底大淺水常涸惟通小舟春夏水漲巨艦始通故老相傳云建炎間大金太子南征被困一夕開此河通大江而去故名曰新河河上有馮梓二堰今廢斷塘河在上福鄉太平橋河之别脈至延祥鄉而貫于濠橋河橫塘河在上福鄉信義瀆之旁注于北者漸流引東貫走馬塘為芙蓉塘河至懷仁鄉為盛塘河而入于常熟界羊尖河鯉河俱盛塘河之别脈顧市河亦包堰河之别脈皆東㑹于羊尖河而入常熟界蠡湖在州東南五十五里與平江長洲縣分界即今太伯鄉之漕湖也郡志云蠡湖在縣東南五十五里與蘇州吳縣分界寰宇記云范蠡伐吳開造蠡瀆通此湖故號曰蠡湖唐書地里志云元和八年孟簡開泰伯瀆併導蠡湖自後太伯瀆謂之孟瀆蠡湖謂之孟湖按今漕湖在太伯鄉當州之東南去州五十餘里東西十二里南北六里其地率皆占長洲之境邊湖之旁僅得一二里為無錫之界湖水泝流而西與太伯瀆接貫景雲垂慶梅里太伯四鄉而出于運河至今梅里太伯界口有河名蠡尖口距湖三十里平江城東餘門數里外亦有蠡口去湖十餘里今謂之漕湖實古之蠡湖也而郡志謂與蘇州吳縣分界者蓋唐以前未縣長洲其地皆吳縣之境而𨽻于蘇至唐始分置長洲縣故後人襲舊之文不變其實然謂之漕湖則不知自何代始其湖之浸皆長洲之利無錫獨得其一區耳濠湖在州東七十里東西四里南北三里即今延祥鄉之鵝肫蕩也謂之鵝肫者取其形之肖俗呼之耳亦云河湖語訛故也自湖向東稀墩與長洲縣界接稀墩向北三十里至苑山經湖中心與平江常熟州分界西南達於蠡湖無錫縣志卷二
