body:
  text: 無錫縣志卷三上事物第三十室之邑必有忠信無錫自太伯肇基于前其後才賢之著代不缺人其禮義之邦乎若夫名泉舊迹遺封故剎因人而勝者可以登臨弔古而想其風焉災祥又繫乎一邑之休咎庶善可勸惡可戒也作事物第三吳太伯世家三之一楚春申君列傳附余嘗讀史記至太伯世家而歎曰嗚呼讓德之基也至矣太伯之讓也哉方殷之未亡而太王已有翦商之勢太伯知文王之賢乃不肯立而文王竟以周興太伯之讓也厥後季札亦以國讓而吳遂為沼不亦悲夫嗚呼太伯其可謂至德矣乎吳太伯太伯弟仲雍皆周太王之子而王季之兄也季厯賢而有聖子昌太王欲立季厯以及昌於是太伯仲雍二人乃奔荆蠻文身斷髮示不可用以避季厯季厯果立是為王季而昌為文王太伯之荆蠻自號勾吳荆蠻義之從而歸者千餘家立為吳太伯太伯卒無子弟仲雍立是為吳仲雍仲雍卒子季簡立季簡卒子叔達立叔達卒子周章立是時周武王克殷求太伯之後封周章弟虞仲於周之北故夏墟是為虞仲列為諸侯周章卒子熊遂立熊遂卒子柯相立柯相卒子疆鳩夷立疆鳩夷卒子餘橋疑吾立餘橋疑吾卒子柯盧立柯盧卒子周繇立周繇卒子屈羽立屈羽卒子夷吾立夷吾卒子禽處立禽處卒子轉立轉卒子頗髙立頗髙卒子句卑立是時晉獻公滅周北虞公以開晉伐虢也句卑卒子去齊立去齊卒子壽夢立壽夢立而吳始益大稱王自太伯作吳五世而武王克殷封其後為二其一虞在中國其一吳在夷蠻十二世而晉滅中國之虞中國之虞滅二世而夷蠻之吳興大凡從太伯至壽夢十九世王壽夢二年楚之亡大夫申公巫臣怨楚將子反而奔晉自晉使吳教吳用兵乘車令其子為吳行人吳於是始通于中國二十五年王壽夢卒壽夢有子四人長曰諸樊次曰餘祭次曰餘昧次曰季札季札賢而壽夢欲立之季札讓不可於是乃立長子諸樊攝行事當國王諸樊元年諸樊已除喪讓位季札季札謝不從吳人固立季札季札棄其室而耕乃舍之十三年王諸樊卒有命授弟餘祭欲傳以次必致國于季札而止以稱先王壽夢之意且嘉季札之義兄弟皆欲致國令以漸至焉季札封于延陵故號曰延陵季子王餘祭卒弟餘昧立王餘昧卒欲授弟季札季札讓逃去於是吳人曰先王有命兄弟代立必致季子季子今逃位則王餘昧後立今卒其子當代乃立王餘昧之子僚為王公子光者王諸樊之子也嘗以為吾父兄弟四人當傳至季子季子即不受國光父先立即不傳季子光當立陰納賢士欲以襲王僚伍子胥楚之亡臣也奔吳公子光客之伍員知光有他志乃求勇士専諸見之光喜客伍子胥子胥退而耕于野以待専諸之事十二年冬楚平王卒十三年春吳欲因楚喪而伐之使公子蓋餘燭庸以兵圍楚六灊使季札如晉以觀諸侯之變楚發兵絶吳兵後吳兵不得還於是吳公子光與専諸謀欲自立為王且曰我真王嗣季子雖至不吾廢也専諸不可公子光強之曰我身子之身也四月丙子光伏甲士於窟室而謁王僚飲王僚使兵陳於道自王宫至光之家門階户席皆王僚之親也人夾持鈹公子光詳為足疾入于窟室置匕首于炙魚之中以進食手匕首刺王僚鈹交于胸遂殺王僚公子光竟立為王是為吳王闔廬乃以専諸子為卿季子至曰茍君無廢祀民人無廢主社稷有奉乃吾君也吾敢誰怨復命哭僚墓復位而待闔廬立用伍子胥之計伐楚與楚兵夾水而陳吳王闔廬弟夫概欲戰闔廬弗許夫概遂以其部五千人襲冒楚楚兵大敗走於是吳王遂縱兵追之比至郢五戰楚五敗遂入郢越聞吳王之在郢國空乃伐吳吳使别兵擊越楚告急秦秦遣兵救楚擊吳吳師敗闔廬弟夫概見秦越交敗吳吳王留楚不去夫概亡歸吳而自立為吳王闔廬聞之乃引兵歸攻夫概夫概敗奔楚十九年夏吳伐越越王勾踐迎擊之檇李越使死士挑戰三行造吳師呼自剄吳師觀之越因伐吳敗之姑蘇傷吳王闔廬指軍却七里吳王病傷而死闔廬使立太子夫差王夫差立常以報越為志二年吳王悉精兵以伐越敗之夫椒報姑蘇也越王勾踐乃以甲兵五千人棲于會稽使大夫種因吳太宰嚭而行成請委國為臣妾吳王將許之伍子胥諫不聽太宰嚭卒許越平與盟而罷兵去越王勾踐率其衆以朝吳厚獻遺之吳王喜唯子胥懼曰是棄吳也諫不聽使子胥于齊子胥屬其子於齊鮑氏還報吳王吳王聞之大怒賜子胥屬鏤之劍以死將死曰樹吾墓上以梓令可為器抉吾眼置之吳東門以觀越之滅吳也十四年春吳王北會諸侯于黃池欲霸中國以全周室六月戊子越王勾踐伐吳乙酉越五千人與王戰丙戌虜吳太子友丁亥入吳吳人告敗于王夫差惡其聞也或泄其語吳王怒斬七人於幕下太宰嚭諫引兵歸國於是乃使厚幣以與越平十八年越益強越王勾踐率兵使伐敗吳師子笠澤二十年越王勾踐復伐吳二十一年遂圍吳二十二年十一月丁卯越敗吳越王勾踐欲遷吳王夫差于甬東豫百家居之吳王曰孤老矣不能事君王也吾悔不用子胥之言自令陷此遂自剄越滅吳取之春申君楚人也名歇姓黃氏遊學博聞事頃襄王頃襄王以歇為辨使于秦秦昭王使白起攻韓魏敗之韓魏服而事秦秦昭王方令白起與韓魏共伐楚未行而楚使黃歇適至于秦聞秦之計恐秦一舉兵滅楚歇乃上書説秦昭王昭王善其説發使賂楚約為與國黃歇受約歸楚楚使歇與太子完入質于秦留之數年頃襄王病太子不得歸而楚太子與秦相應侯善於是黃歇乃説應侯應侯以歇計聞秦王秦王令楚太子之傅先往楚太子用黃歇計變衣服為楚使者御以出關而黃歇守舍常為太子謝病度太子已逺秦不能追歇乃自言于秦昭王曰楚太子已歸出逺矣歇當死願賜死昭王大怒欲聽其自殺也應侯勸止之秦因遣黃歇至楚三月楚頃襄王卒太子完立是為考烈王元年以黃歇為相封春申君賜淮北地十二縣後十五嵗黃歇言之楚王曰淮北地邊齊其事急請以為郡便因并獻淮北十二縣請封于江東考烈王許之春申君因城故吳墟以自為都邑春申君相楚二十二年諸侯患秦攻伐無已時乃相與合從西伐秦而楚王為從長春申君用事楚及諸侯兵為秦兵所敗楚考烈王以咎春申君春申君以此益疏客有觀津人朱英説春申君楚于是去陳徙壽春而秦徙衛野王作置東郡春申君由此就封于吳行相事楚考烈王無子春申君所幸李園女弟有娠李園乃與其女弟謀園女弟承間以説春申君曰楚王之貴幸君雖兄弟不如也今君相楚二十餘年而五無子即百嵗後將更立兄弟則楚更立君後亦各貴其故所親君又安得長有寵乎非徒然也君貴用事久多失禮于王兄弟兄弟誠立禍且及身何以保相印江東之封乎今妾自知有娠矣而人莫知妾幸君未久誠以君之重而進妾于楚王王必幸妾有子則君之子為王也楚國盡可得孰與身臨不測之罪乎春申君大然之乃進李園女弟于楚王幸之遂生子男立為太子以李園女弟為王后楚王貴李園園用事恐春申君語泄而益驕陰養死士欲殺春申君以滅口春申君相二十五年楚考烈王病朱英説春申君殺李園春申君不聽朱英知言不用恐禍及身乃亡去後十七日楚考烈王卒李園果先入伏死士于棘門之內俠刺春申君斬其頭投之棘門之外而盡滅其族而李園女弟初幸春申君有娠而入之王所生子者遂立是為楚幽王春申君要亦楚之豪傑也方説秦王合從之時何其壯哉及一旦為李園所殺身與國滅由其好智不好學也視太伯之風則逺矣以其封國在吳因附載其傳於太伯世家之後吳之興滅可以參考人物三之二仲尼稱子賤為君子而贊之曰魯無君子者斯焉取斯余傳無錫名世之士古今得四十有五人非流風之有所被歟不然何賢才之多也文雅彬彬忠孝迭著名邑之稱可無愧矣前漢虞俊字仲卿無錫人也少以孝友稱于鄉黨明春秋公羊左氏傳漢哀帝時為御史稍遷丞相司直王莽執政左遷新陂令尋召為司徒俊欲遁歸遂見脅迫仰天嘆曰吾漢人也願為漢鬼不能事兩姓飲藥而卒光武即位髙其節行與二龔比為表塋墓後漢王關字選公無錫人也明易及天文郡舉為主簿更始平守山陰令補侍御史遷冀州後拜謁者僕射卒于陳留太守不交豪強人號王獨坐後漢髙彪字義方無錫人也家本貧彪為諸生逰太學有雅才而訥于言後舉孝亷試第一校書東觀遷內黃令卒有德政靈帝詔東觀畫彪像以勸學者髙岱亦知名並著漢書獨行傳晉顧凱之字長康父悅之為州别駕長康遂為無錫人博學有才氣善圖畫妙于一時頗自矜伐每過其實少年因相稱譽以為戲弄初在桓溫府嘗云凱之體中癡黠各半合而論之政得平耳故俗傳凱之有三絶謂才絶畫絶癡絶也嘗為虎頭將軍人號顧虎頭事並見晉書及南史唐李紳字公垂無錫之梅里人父悟厯晉陵令因家無錫紳讀書惠山少苦貧每有著述潛取寺中佛經竊識其後為主藏者所知致被歐辱後徙剡川天宫精舍一日熟寐舍前丹奈方結實有蛇據其上會老僧至驅之蛇入紳懷中忽不見僧異其事及覺問紳答曰適夢在樹間食奈甚美似為僧逼而悟老僧以故隂異之延致院中肄業數年去將赴解舉僧分槖金助其行元和中果擢進士第釋褐國子助教歸寧李錡鎮江南辟為從事錡叛令紳草檄紳不從錡怒囚之後錡伏誅獲免穆宗召拜左拾遺翰林學士與元稹李德裕同在禁中時稱三俊武宗時拜中書侍郎同平章事四年罷調淮南節度使拜尚書左僕射封趙郡公卒諡文肅事見唐史宋杜鎬字文周無錫人也博學強記少時將就試有鼠銜孝經疏置榻前鎬怪之取以熟讀及試題出其內遂預選當南唐時嘗為集賢校理及宋平南唐授千乘簿至國子監丞崇文院檢討將南郊彗星見宰相趙普問鎬鎬曰當祭而日食猶廢祭况彗見如此乎上聞乃罷祭翼日遷著作佐郎纍遷虞部員外郎景德初置龍圖閣待制首以鎬為之澶淵凱旋遇懿德皇后忌日或以軍中鼓吹為疑馳騎問鎬鎬對曰武王載木主以伐紂前歌後舞可據也祥符二年种放告歸上宴餞於龍圖閣賜詩命侍臣皆賦鎬辭以素不屬文詔引名臣歸山故事鎬即誦北山移文以譏放其固直如此真宗凡得古器異書必詢鎬悉能究其本末令人閲其事在某書幾紙何行未嘗少忘鎬雖老四鼓起誦春秋遲明已數卷日以為常後除龍圖閣學士至禮部侍郎年七十六卒子渥生孫杞字偉長以鎬蔭補將作監簿纍遷太子中允知建陽縣除無名租萬計性豪邁遇事勇為稍遷至度支判官虞部員外郎廣西歐希範推蒙趕為帝而自號為神武公率其徒破環州轉攻桂管勢甚熾仁宗患之授杞廣西安撫使杞至宜州得州人吳香及獄囚歐世宏先往説之杞乘怠擊其後破白崖等寨及其五洞斬首千餘級復攻環州焚其山林積聚蒙趕等大恐隨香出降希範走保荔枝洞併擒戮之廣西平除天章閣待制知慶州蕃酋孟香率部落內附夏人以兵索香詔許還之杞言彼違約舉兵香不可與因移檄問罪夏人讋服慶厯中范仲淹參知政事患諸路監司非才多所更易杞與張昷之首被擢用杞博覽強記通陰陽術自推其數曰吾年四十六死矣卒如其言宋袁默字思正無錫人父繹字子安篤學至忘寢食嘗升禮闈人咸師之早以英華教授諸子默少卓犖尤深于文嘉祐八年中進士擢京兆府教授入為司農簿獻無逸傳神宗召對遷光祿丞太學博士哲宗即位除湖北轉運判官默學問淵深卿士大夫宗為師法謝獻道解論語嘗共辨確三弟點植正功皆有名當世點字思與熙寧初在太學直講為學者領袖與兄默共號二袁名在諸儒右中元豐八年進士第纍遷至通判杭州知淮陽軍致仕喜佛老書詩甚工東坡見其所作以為有驚心駭目之嘆正功亦中兩科官至右司郎中植事見後宋淩浩字直翁無錫人與同邑陳敏俱學于安定胡先生以經術知名二浙登治平二年甲科嘗令蓬萊武涉以能召拜太學博士推安定之學以誨多士咸敬服之出倅辰州守渠陽致仕年六十五浩與敏皆不引年而告老人謂得安定之傳而有所守者宋陳敏字伯修無錫人髻丱喪父廬墓哀毁有芝生冢上長從安定先生胡瑗學與同郡袁默淩浩姑蘇孫載皆為英特時目為安定四俊友熙寧三年舉進士王荆公嘉其才薦敏堪大用除太學正從蘇軾遊甚厚嘗守台州會朝廷命郡國立元祐黨籍碑敏拒守以為不可監司促之急敏曰誣司馬公為姦臣是誣天也其倅卒立之敏碎其石或咎敏敏曰我死且不辭何劾之畏竟挂冠而去自號濯纓居士大觀中以八行搜天下士殿撰李夔丞相綱之父也時奉祠居梁溪以敏行能薦於上守令親為勸駕敏嘆曰昔歸今往何出處之戾也弗就年八十一終德行之美時所欽慕宋錢顗字安道無錫人舉進士熙寧間由烏程令召為御史裏行王安石初行新法宰臣曽公亮依違不言顗與侍御史劉琦上疏論安石厯官以來莫不言尊尚堯舜故天下以為賢陛下亦聞而知之遂致公輔今乃首以財利之説務為容悅言行乖戾剛狠自任不知安石之心待陛下為何如主曽公亮位居丞弼被遇三朝自當悉慮竭忠以身許國反有畏避安石之意更相稱譽以固寵榮安石大怒貶顗監衢州鹽稅琦亦坐謫顗行謂御史孫昌齡曰君奴事安石以得御史亦當少念報國顗今得罪分當逺竄君為美官自以為得䇿即我視君犬彘不若也聞者悚然時人號鐵肝御史宋沈初字子深無錫人熙寧六年擢進士第初始入國學時試周以宗強賦為第一文詞典麗時爭效之元祐間尚詞賦朝廷常以林希佚道使民沈初周以宗強劉輝堯舜性仁陳之方恤民深者嚮其樂江衍王道正則百川理賦五篇頒天下為格初之賦後流至西夏夏人織為文錦其珍賞如此尉明之象山入為國子直講以終兄弟四人兄禋揚皆中進士科宋王岡字壽祺居無錫賈山稱賈山王氏世雄于財至岡尤嗜學耽玩經籍父厚贈資貨使之遊學自是文益精元符三年舉進士除北京國子司業通判揚州時丞相吕頥浩統戎任辟置幕下髙宗南渡丞相拜御營使以岡為參議官謀畫多用其計後丐祠歸紹興初上思其人召為比部郎中復厯金部遷左司郎中頥浩去國岡請老以朝散大夫直祕閣致仕與晉陵孫覿友善覿尺牘中有稱王左司者即岡也其弟亦為中興後都司宋孫近字叔諸無錫人父廷筠嘉祐中進士近幼警悟號神童七嵗能屬文崇寧二年擢進士第五年中宏詞科纍遷至工部郎中髙宗即位除祕書少監起居郎中書舍人給事中同章誼使金還除吏部侍郎直學士院從上親征書命悉委焉凡所撰著宣布德意武夫義士讀者莫不感泣一時比之陸贄繼而參大政兼樞密居政地三年金和議成丐詞上許之未幾時以和金有異論謫授祕書監分司南京漳州居住易南安移贑州薨年七十八弟建舉遺逸賜進士及第宋唐作求字叔孝無錫人崇寧二年進士登第公卿間有以作求薦于徽宗召對稱旨除御筆所禮制局檢討官遷主客郎中出守徽州以朝散郎致仕作求學術該敏家訓嚴肅勵後進以振文藝唐氏由作求藹然以儒學名家從弟孚字益裕亦志學所見深逺嘗厯謁元祐諸君子談論移日皆造其奧理宋李謨字茂嘉無錫人幼孤事母孝家貧感憤向學從樂安先生遊登崇寧五年進士第又試中教官有敏譽徽宗知其才擢廣東運判入對留為太常丞繼為監司遍厯河北髙宗即位除直徽猷閣知鎮江臨安兩府遷寶文閣移鎮京口終謨厯事三朝皆蒙眷奬屬當時艱閲兵走馬于燕趙之間而智略精敏隨事制變稱為奇才宋施坰字林宗少力學馳譽上庠崇寧五年進士登第再除為太學博士宣和末提刑江東朝廷命鑿銀林河通大江調役繁興坰慮導江入浙必漂溺蘇秀因抗疏極言其害是役為寢徽宗下詔奬諭進秩一等纍遷至禮部侍郎皆有能聲顯仁太后回鑾坰為考訂儀注時以為宜後以敷文閣待制終生平篤意孝友在官得親庭書必冠帶跪讀遇恩奏補官率推及弟姪鄉里稱其賢施之先本出武進坰父南康公始徙居無錫至坰遂為無錫人坰弟垓有吏績紹興末纍持節終朝議大夫湖北運使宋費肅字懿恭無錫人少頴秀拔俗尤嗜學中大觀二年進士第復以薦除祕書正字紹興初大臣舉其賢行與簡齋陳與義同召赴行在時被召者三人獨肅抗節引辭不起子鍇亦中科第宋李端行字正達無錫人幼與弟尚行入太學俱有俊聲同賜大觀三年上舍第為太學博士髙麗遣子入學其禮不除朝廷患之丞相蔡京會議于學語及端行端行曰彼既遣子入學未有不成禮者當以國禮繩之遽趣賔贊引髙麗士即日成禮儀注悉裁于端行京與朝士服其得體後以作詩詆京之失出宰明之鄞縣發憤丐間終身不復仕進丞相吕頥浩嘗師學端行逮貴猶執弟子禮子霖隆興進士尚行字師尹風神秀偉賦性嚴憚兄弟同學易經深造淵妙日抄萬言筆不停手閉户讀書人罕覩其面登第後為文益進而名甚髙為越之蕭山治行顯著召為太博纍遷司農太常二少卿髙宗即位出知信州潘逵趙琦起饒州為盜攻入信境尚行平之髙宗親書詔命奬譽進直龍圗閣遷江南東道轉運使以言去職參政張守周葵待制董棻相與為忘形交皆一時名士宋沈松年字性仁無錫人大觀三年舉進士為潤之金壇縣以文學擢太博會靖康之難丐歸田里以圗史自娛有妹適洪忠宣公忠宣使金且久妹攜諸甥歸無錫松年力勉以學後皆中博學宏詞科適拜相遵至樞府邁再入翰苑名聞中外時語非松不能有甥若是三子自強日新有開日新亦由上舍中進士第宋蔣芾字子禮本義興人父及祖宣和中進士至朝請大夫知鎮江府祖瑎參政魏公之奇之孫元祐擢第大臣以經術薦為太博纍遷至郡守遭冦難徙無錫故芾為無錫人芾早以蔭入仕紹興間登進士第授建康理官秦檜欲羅致拒之檜怒終其世不召用及檜敗附檜者皆竄逐芾獨免芾嘗官東宫為莊文太子所知薦其賢于壽皇命權直舍人院因繳內侍梁珂語徹德壽宫上皇嘆其忠除簽書樞密院條奏邊防軍功甚悉孝宗尤極嘉奬拜右僕射同平章事上方鋭意恢復芾力陳天時人事未可舉兵凡二千餘言忤旨讒忌者乘之既而丁內艱去職朝廷起以左丞相不赴後判紹興奉祠以終宋陳篆字師文無錫人氣豪邁讀書一過不忘為文初若不經意下筆即翩翩不休語意俱到爭傳誦為楷式經學尤該明執弟子禮願學者逺近交至一出規矩皆為良士戴達先兄弟嘗師事之所造就尤多紹興間舉進士官止州縣而終子翥亦登進士第宋吕克成字世德無錫人有雋才學問精慤從逰者數百人與同邑陳師文友善兩浙士子稱師者必以世德師文為重以恩科第一人終蘄州教授宋尤袤字延之其先閩人本姓沈因避王審知諱去水姓尤來居無錫至袤遂為無錫人弱冠入太學魁監省登紹興進士第嘗從玉泉喻樗遊樗龜山先生髙弟也樗以所得龜山之學授之由是學益進紹興間宰泰興金人犯境士庶望風而遁袤獨堅守不去尋以薦除奉常時髙宗廟號未定方議升配公諏經訂古悉有根據平生博極羣書同貫古今時人號曰尤書厨當世推為人物之宗為內外制及內禪典册悉服其雅正官至禮部尚書袤形貌不逾人而丰度端凝孝宗嘗有短小精悍之褒晚益嗜書不倦所藏三萬卷為詩平淡楊誠齋嘗列之四詩將自號遂初居士光宗嘗書遂初二字賜之有遂初小藳等書數卷行于世卒諡文簡公子概孫焴三世相繼並登科第焴字伯晦以大父袤奏仕纍遷工部尚書闕學士提學祕書省提綱史事遍歷中外三十餘年而後抗疏丐間年八十三以疾終于家自號木闕居士云宋戴達先字子善世居無錫之東城父適里中尊為鄉先生紹興初建太學達先與弟幾先同中選經藝俱優每試必占前列士爭傳誦其文以為式號二戴格當時太學為之語曰二戴一王辟雍之光先有王戴後有陳蔡紹興間文體粹然為之一變者實自達先兄弟始以上舍射䇿賜第執政舉其賢髙宗召對擢為太博孝宗即位求直言達先條天下利害南北戰守宜以奏召試館職除正字遷校書郎知池州易江陰軍移袁州為政長者終年六十二達先心仁貌莊平居恂恂臧否不置口其友何稱每曰吾同舍所愛者三人芮燁劉苪及達先時因號四賢幾先字子微性端謹其學純正不雜少與兄俱馳聲太學登紹興十八年進士第丞相陳康伯深器之薦于朝召教諸王稍遷至國子司業對便殿論王安石蘇軾之學功利仁義差别上嘉之擢禮部侍郎兼侍講纍遷至直龍圗閣號錫谷居士自著生平行實為傳以終宋陳之茂字卓卿無錫人宣和初入太學紹興二年與張九成同登進士第廷對忤權臣黜之九成叩頭殿廷曰臣之學不如之茂臣不當得之茂能言人之所不敢言宜奬不宜黜上覽對悚然曰忠言也賜之茂同進士出身調休寧尉樞密王倫推其賢召見除祕書郎纍遷至知平江府以督相魏公舉升直顯謨閣知建康隆興兩府丞相洪公復薦召對擢吏部侍郎兼中書舍人直學士院終之茂稟性剛果立志英特議論宏逺深識治體壽皇初鋭意天下默察方正特立之士期致事功每深器待將倚大用及其沒縉紳惜之為詩清徑畫尤有法弟之淵字宗卿習左氏春秋與兄之茂同入太學時號二陳復聯中張九成榜教授臨安府擢祕書正字後為湖南運使召還與兄之茂同為吏部郎中朝士榮之終祕書閣修撰知宣州為人淵源溫粹識度沖曠文尤典縟立朝涖官不治資産淡泊自如未嘗以名位矜驕人服其厚德宋許德之字振叔無錫人也父希道為鄉之宿儒四子皆傳一經德之居長最頴悟紹興初登進士第為揚州法曹與眺詠之韓韶蘇象先同為掾俱有美名時號維揚四俊侍臣薦其才於徽宗召見便殿德之對治道無多術惟進賢退不肖有賢不能用與非賢而遽信雖勤不治上嘉納之擢司門郎中遷太常少卿以顯謨閣知婺州方臘起清溪為冦德之坐是得罪貶賔州髙宗即位復官奉祠石林葉夢得與德之友善人比之黃叔度徐孺子弟倜衍之伸皆登髙科有聞于時宋李祥字元德無錫人隆興初登進士第為太學博士遷國子祭酒時韓托胄用事逐趙忠定公朱文公祥為博士上疏爭之由是去國後托胄敗朝廷以祥為忠除直龍圖閣卒諡肅簡公自號小山宋蔣重珍字良貴世居無錫之富安鄉胡埭幼頴悟讀書一覽輒記嘉定十六年魁進士擢承事郎纍遷至僉書奉國軍召除祕書正字入對上七針三疏奏語剴切忤丞相史彌逺意遂謁告還家端平初上勵精更化召為祕書郎纍遷至集英修撰皆不就嘗築一梅堂萬竹亭聚書自娛天下髙之號實齋先生與魏了翁真德秀深相友愛其所講明皆聖賢正學後以刑部侍郎卒諡文忠公元虞志道字彥髙其先潤之丹陽人父薦發宋進士愛無錫溪山之勝遂徙居焉志道自幼頴悟家訓尤嚴弱冠以茂異起為校官其學専以明體適用為文章必本于理嘗教授湖學趙承旨深器重之與之為莫逆交後以嘉興尹致政為人踐履篤實愛親事長克盡誠敬撫弟姪若已出待後進如儕輩遇賢子弟詢詢引導之若不及遇人有急難雖傾産救之弗吝然于義利之辨甚明鄉里推尊為鄉先生云才賢之出由乎山川之間氣發而為英靈鍾而為秀特粹而為文章激而為忠義靡不由之然亦有風化之理焉無錫得山水之清氣故其發為文辭藴為德業自漢以來賢令迭出亦風教之有自也由漢而下著于邑者得二十有七人或以才顯或以行稱具述如上遺者闕焉亦盛矣哉後漢陸璯舊名銓字仲方毗陵人也操履清正明京氏易尚書曉風角星算貫其要妙以經術講授太守辟為主簿固辭以疾太守脅以威刑遂省事旬日謝疾而去避地會稽以典籍自娛視氛祲言災異公車拜徵皆以疾辭年八十卒吳朱治始仕漢建安中為九真太守扶義將軍以婁由拳無錫毗陵為奉邑黃武元年封毗陵侯陳張種字士苖厯侍中中書令太建初纍賜無錫嘉興縣秩宋湛茂之嘗為司徒右長史隱于無錫之惠山築草堂讀書其中與南平王劉鑠友善更以詩章唱酬留刻于石唐陸羽字鴻漸未知所生及長以易自筮得蹇之漸曰鴻漸于陸其羽可用為儀吉乃以陸為氏名羽而以鴻漸字之嗜茶著茶經三篇鬻茶者至陶羽形祀為茶神上元初隱居苕溪自稱桑苧翁又號竟陵子在隴西公幕府自號東園先生又號東岡子嘗品水味列無錫惠山泉第二至今稱為陸子泉泉上有祠祀羽畫像宋章誼字且叟丹陽人登崇寧五年進士第又中學官選誼學問淹博氣節凜然建炎間髙宗南渡始駐蹕行在會苖劉叛時誼倅杭州聞變越班而出正色叱賊黨賊為披靡上嘉其勇詔進三秩擢倉部郎中尋遷吏部侍郎攝兵部以龍圖閣學士充軍前奉表通問使使金與尼瑪哈烏珠論事酬應如響還南京為偽齊劉豫所留後誼以計求直于尼瑪哈使豫墮計中乃得返命上益嘉之拜刑部尚書復移户部除端明學士鎮金陵奉祠亳州薨諡忠恪其先本浦城人至誼既貴始由丹陽徙居無錫之斗城後葬于橫山八子駽駒駟驛馳騆駰宋胡珵字德輝本晉陵人建炎間以避地始居無錫之甘露宣和三年舉進士調開德府儀曺掾後遷至祕書正字布衣陳東上書攻六賊言者謂珵嘗潤色其書貶梧州嵗餘蒙恩自便紹興初召試館職復除正字遷著作郎兼史館校勘先是姦臣得志舊史蕪穢上命珵筆削貽執政怒出守嚴州未赴而卒珵性嗜學既第後嘗請事于南都劉器之器之曰子聰明能護以道當令成器珵遂以平日所得于器之者著為護道録并所述蒼梧志並行于世宋喻樗字子才始居東京開封之祥符從髙宗南渡徙居嚴之桐廬後至無錫遂定居焉建炎間以易經中進士纍官贈工部郎中少從龜山先生遊獨得其奧嘗著易義及玉泉講解語孟大學四書性理窟行于世當紹興之間力主正論為時師表天下稱之宋薛極字會之武進人後居無錫少讀書日記萬言以父蔭調上元主簿習詞學中科第為理官後守桐川嘉定初召入以參政樓鑰薦厯左右司樞密副都承旨時朝廷議更楮弊創安邊司極與謀焉纍遷至吏部尚書簽書樞密院事奉寧皇上陵使訖事入參大政除樞密使封和國公凡在朝三十餘年以觀文殿大學士終于家元孟潼字宗鎮世吳人宋信安郡王忠厚之五世孫信安有墓在無錫當惠山之西其先世嘗有别業在惠山下潼宦逰南北遂歸老焉潼始以茂異膺憲舉為文學掾纍遷至承直郎松江府判官致仕性謹厚平居恂恂未嘗少懈處家事若官政待家人必以禮遇童僕必以恩語人必忠信未嘗妄笑語為文一本於理致所厯官守率以亷能見稱在任雖無赫赫名逮去嘗有後思諺曰里仁為美處仁為智信夫自漢陸璯以下九人故非錫産或以封爵或以避囂其一時遊從皆髙世之士由是定居遂為邑人其處仁之謂乎始知斯言之不誣也晉華寶無錫人也父豪義熙末戍長安寶年八嵗臨别謂寶曰須我還冠汝長安陷寶年至七十不冠婚或問之輒號慟彌日不忍答也齊建元三年與同郡薛天生劉懷徹並表門閭事載南史南唐陳喬字子喬世居廬陵後徙居無錫喬遂為無錫人仕南唐為觀察判官烈祖頗器重之遷尚書郎拜中書舍人元宗既失淮甸恥其降號將授機務於太弟而陳覺之徒因有窺竊之計欲委國事于宋齊丘而取之喬排閣入諌元宗驚悟乃止于是引喬入見后及諸子指喬曰此忠臣也他日國家急難汝子母可託之我死無恨矣而齊丘黨亦由此以敗及元宗南遷留喬輔太子監國後主即位遷禮部侍郎翰林學士承旨門下侍郎兼樞密使遂總軍國事開寶中宋太祖遣使召後主入朝後主欲往喬曰陛下與臣俱受先帝顧命委以社稷大計今往而見留則國非已有悔將何及後主由是連年拒命皆喬為之謀也及城陷後主自為降欵俾喬與世子仲宇開門納之喬遽歸府投欵于承霤後主促之愈急喬入見曰自古豈有不亡之國乎降無益也臣請城下一戰而死後主執喬手泣曰盍與我北歸喬曰臣當大政而致國家如此非死無以報臣死而歸之以逆命之罪則陛下保無恙也掣手而去入視事堂自縊而死吏為徹榻瘞之宋既克南唐太祖以喬忠于所事詔以禮改葬宋袁植字材老無錫人也其父子安為鄉之碩儒植蚤承嚴父之訓獨刻意研詩崇寧三年擢進士第復中詞學兼茂科為監察御史金人南下陳邊防十三事以誅佞人為先不納引疾致仕建炎初召為左司諫直言忤宰臣黜守嶽州會敵騎大入叛臣李允文據鄂州大剽荆湖植條其姦上之允文中路得遞疏怒以兵趨嶽陽執植植正色詆賊不少懾遂見害于武昌朝廷知之追贈直龍圖閣録其後二人宋許九無錫人力田為業蚤喪父獨奉母以孝聞于鄉里淳化三年飢九往來城郭乞食飬其母人厭其數每每棄斥之九絶粒病數日時牟麥未登九刈青煮食強自扶持得起念母無以為給哀痛不忍誓欲終與母子俱全因持斧斷手取信斷之血不出人咸謂九孝感所致復丐乞入城市言有老母因取所斷手置杖頭示信於衆市人哀之莫不餽以盤飱其後母子果獲全于難進士孫浩以事聞於無錫令令以九傷毁肢體為不孝怒逐九浩還與俱去常州留飬于家九每與母出纍日不一至浩所浩問之曰丐幸有餘足以供母不欲數纍長者浩益憐九為置緇衣以衣之蓋取其不汙也居嵗餘母老以疾卒九服向所得緇衣漆其斷手口誦浮屠言與母俱死嗚呼孝為百行之先人子莫不各欲自盡也承平時雖士大夫孝行無所見於世嵗遇凶變苟有匹夫稚子能自力於一時亦足驚世駭俗深可敬哉昔歐陽公作五代史一行傳蓋有憫世之歎余從宋世中葉於是區區小邑得獲一孝子焉可與華寶並稱矣能不樂為之書以為世勸視四海謂秦無人得耶操青執彤者將不特一書而已嗚呼世有如許九數十輩風俗安得而不厚哉宋沈樗字斯年無錫人性純厚樂善家本饒資好施與人貸之或不償即折劵無靳色遇歉嵗傾廩賑惠常以金助軍匱數至萬緡州上其事於朝欲官以爵樗韜晦不願朝廷嘉之賜號達義處士嗚呼忠孝之義大矣能盡其道者古今幾何人哉余采是邑傳記所載自晉及今寥寥千載之下能盡孝者得二人焉能盡忠者亦得二人焉號稱達義者得一人焉特備書其始末可見忠孝之難得也唐僧若氷不詳其始來嘗寓無錫惠山之普利院惠山有洞出泉即今之第二泉也嵗久其洞堙塞氷披荆榛斸岩谷訪求得之即今所謂若氷洞也古洞既出新泉遂注故世稱惠山泉必本於氷氷能詩有題惠山泉五言四韻刻山中至今尚存世傳氷寓山寺時一日遊洞中不復出後人見于海上不知所終宋僧宗本無錫人也俗姓管氏性質直少緣飾貌豐碩年十九師事蘇州承天永安道升禪師升方道價重叢林歸慕本弊衣垢面操井臼以供給夜則入室參道升陰竒之又十年剃髮受具服勤三年乃辭升遊方初至池州景德謁義懷禪師言下契悟懷公徙住越之天衣常之薦福本皆從之治平初懷退居吳之吳江壽聖院部使者李公復圭過懷夜語曰瑞光法席虛願得有道衲子主之懷指本曰無踰此既至瑞光集衆擊鼓鼓輒墮圓轉震響識者以為法雷震地之兆自是法席日盛後住杭之淨慈九年還吳住穹隆闕時年六十三矣未幾神宗闢相國寺六十四闕禪二律召本主惠林既至遣使問勞三日詔闕於寺門翼日召對延和殿有司使習儀而後見既見賜坐盤足跏趺侍衛莫不驚駭本自若也上問受業何寺對曰承天永安上喜其真喻以方興禪宗宜善開導之旨既退上目送之謂左右曰真福慧僧也哲宗即位加號圓照禪師元祐元年求歸詔從其請元符二年十二月甲子將入滅沐浴而臥遂物故門弟子塔師全身于靈岩山閲世八十座五十二夏宋吕雲字山友無錫人也幼業儒為文甚敏一夕獲異夢覺有所悟遂去家如京師道録劉公奇之納為徒時劉為徽廟眷遇補為金壇郎將升以道秩非其志因入太行山遇至人留窮谷中辟穀危坐授以玄旨因有所得每入山多處幽邃所茹止草木果實而丰采充潤益光澤如童顔自此知名天下紹興間髙宗徵之詔三下始起入對太一宫髙士堂時入禁中談論莊老後乞歸山不允賜几杖以寵之壽皇眷遇尤厚雲能詩善鍊丹石往往忘形絶俗其學髙妙人莫能知乾道中一日宴坐自草遺表畢凝然而化宋錢道人逸其名無錫人顗之弟也隱惠山與東坡蘇軾遊東坡嘗有詩贈之稱為有道者云宋尤道元字浩光禮部尚書袤之族叔性尚孤介志慕沖曠先是方茂山登仙觀有錢道士嘗夏月汲水至八百丹井得氷如璧遽取食之遂發狂不復粒食周逰名山不知所終道元幼從錢遊亦復得氷食之不食者數年一日忽渴取水引飲自是復食顔如渥丹雙瞳凝碧宴坐一室凝塵滿几心常淡如不喜世俗事方外士爭稱之乾道間無疾而化異端之説嘗見闢於孟軻之門何取于斯自其教入中國殆非一朝一夕之故其所由來逺矣為其徒者茍能清虗寡欲寂滅妄想以事其教亦有不可沒者非有所取也無錫縣志卷三上欽定四庫全書無錫縣志卷三下州署三之三州署在州城之中即宋舊縣令廳也元前至元間改作之幕曺吏舍庫藏厨傳廏院獄室具完舊廳事後有堂曰明德明德堂後即不欺堂其西有堂曰平清堂今徙樹東嚮為幕官之署曰觀稼亭睡花亭九峯亭俱在州署後圃西北舊子城基上而麗譙之樓敞其前捕盜之官居其左譙樓外有亭三西曰宣詔曰閲武東曰頒春舊縣令廳之東即縣丞廳事內有堂曰哦松其西即主簿廳事縣丞廳之東縣尉廳事在焉內有燕居堂去縣尉廳事行二百步有駐麾亭俗稱行衙亭所以駐使臣今諸廨舍及亭傳皆廢唯縣令廳存改為州署亦非舊貫矣兹考古賢令及題名于石者得若干人具録如左宋劉道産為令有能名劉秀之為令著能聲梁張盾字士宣以謹重稱為無錫令後為湘東王記室死之日家無餘財唯文書千卷酒米數甕而已漢陶穀字秀實錢塘人有道藝當五代漢末來隱居五部湖時大旱蝗太守奉印綬請為無錫令穀退而嘆曰郡界有災安得懷道而不救之到城修六事行弭災之術三日雨蝗盡死穀乃遁去唐湛賁宋長史茂之十三代孫進士及第貞元十九年以江陰縣主簿權知無錫縣事有題祖宅二詩刻惠山寺中可考敬澄字深源為無錫令與陸羽同時嘗葺惠山寺獨孤及新泉記內稱之宋錢惟周景德元年太常寺太祝張廷偃景德元年尚書都官郎中劉龜從天禧二年太子中舍王周乾興元年大理寺丞宋禹臣天聖二年大理寺丞王晉卿乾興初闕聶厚載天聖九年彰信軍節度推官李景天聖六年太常博士孫從古景祐元年衛尉寺丞蘇紳明道二年殿中丞王周寶元二年尚書虞部員外郎李光卿景祐四年國子博士魯友益慶厯三年太子右贊善大夫鄭戡康定二年太子中舍楊寧皇祐二年祕書丞曺平慶厯五年殿中丞魏演皇祐五年太子中舍江揖皇祐三年大常博士程迪嘉祐四年祕書丞張詵至和二年祕書丞陳京太子中舍嘉祐七年劉慶孫尚書虞部員外郎嘉祐七年霍大備太子中書舍人治平三年陳知儉太子右