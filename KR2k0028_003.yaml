基下即通龍吻石渠渠中泉自龍吻中噴出洋溢下池然後分為二道其一道北入黿池漸流至金蓮花池金蓮花池者池中有金蓮花蔓生如荇開花黃色似蓮蘂半開而不實朵小如水仙甚香舊稱千葉云後有女子入池澡浴花遂省為五瓣傳説者有僧不知來自何方擕植于此是花天下凡有三種其一在華山方池中其一在廬山池內其一在此池皆是僧手植池上有石梁通惠山寺宋蘇舜欽嘗築亭寺前鑿石為流觴曲水疏泉脈為之泉自金蓮花池迂回過寺中香積池出寺涇達雙河合五瀉水越江陰界水同入于江其一道東入暗渠涓涓引流出錫山澗迤邐順流下梁溪合梁溪入太湖其餘旁支别𣲖斜分曲匯山民悉為溝畎𨗳流山下溉田可數頃無旱乾之憂唐陸鴻漸品水味二十等列此泉為天下第二故世稱第二泉以鴻漸所品故又名陸子泉緯略云李德裕好惠山泉置驛取水有僧言長安昊天觀水與惠山等雜他水試之僧獨指其二曰此惠山泉也文饒為罷水驛宋聶原載云雲山泉悉甘而斯泉勝諸泉者以其感錫之氣也惠山之東曰錫山實一支耳是泉罌缶挈致逺方必以山中石子置罌內雖厯數年水味不敗此尤佳也瑣碎録云惠山泉緣山中有錫止宜瀹茗若烹羊則色黑醖酒則味苦大凡井中投鉛久之則甘梅柚和鉛霜食之美因知錫能變甘是泉之味亦由是耳或云惠山舊無墳壠自唐末以來漸加封樹至今日益衆於是山之精靈頗弊于墾鑿而第二泉亦敗於潴穢矣邑人尤氏所記云宋徽宗時嘗取泉飲之揮去曰是水有尸氣不足之味也理或然耳又有龍縫泉在陸子泉之南相去六十餘步一名龍淵其泉出石穴中穴深廣可三尺謂之龍者以山之形肖故合而名之又有慧照泉在第二泉之下宋天聖間寺僧慧照得其形迹因以為名今失其所又有羅漢泉亦不知其處大率稱泉味皆與第二泉等要皆第二泉别脈古迹三之六無錫自太伯作都於前春申封國於後而髙人名士接武其間遺蹤古迹因人而在觀其樹猶可以想其人也太伯城毗陵志云在州東南四十里史記云太伯奔荆蠻荆蠻之徒從而歸之者千餘家立為吳太伯吳越春秋云太伯當殷之末恐中國侯王用兵以及荆蠻故起城周三里二百步外郭三百餘里在吳西北隅名曰故吳墟自太伯以下至王僚三十三君皆都於此吳公子光刺王僚即此都也寰宇記曰太伯城西去縣四十里平地髙三丈宋史云太伯始所居地名曰句吳城吳地記云吳築城梅李平墟城內有宅舊址及井猶存或名吳城闔閭城在州西富安鄉相去四十五里越絶書云伍員取利浦及黃瀆土築闔閭城吳地記云闔閭城周敬王六年伍員伐楚還運潤州利湖土築之不足又取吳地黃瀆土為大小二城當闔閭伐楚回故因號之若以越絶書利瀆為證恐非吳之大城自姑蘇至潤州四百餘里其取土不應如是之逺今按闔閭大城在姑蘇即今之平江是也小城在州之西北富安鄉閭堽其地邊湖其城猶在至今其處土人有城裏城外之稱州東梅李鄉有利浦并黃土瀆去州十里非潤州利湖也又按史記伍員傳云吳王夫差殺伍子胥取其尸盛鴟夷革浮之江中吳人憐之為立祠江上因命其山曰胥山長晏曰太湖邊去江不逺百里故云江上據今城之側有閭江閭江之側有胥山其證明矣厯厯可考范蠡城在州西十里吳地記云在厯山之西今謂之斗城城迹猶在輿地志云厯山西北有范蠡城越伐吳范蠡所築也黃城在州西十二里史記楚考烈王元年以黃歇為相封為春申君賜淮北地十二縣後十五嵗黃歇言於楚王曰淮北地邊齊其事急請以為郡便因并獻其地請封於江東考烈王許之春申君因城故吳墟以自為都邑寰宇記云黃城去縣十二里輿地志云楚考烈王賜黃歇淮北地十二縣以邊齊故更以江東故吳邑封之今厯山下有春申君祠去城三里故道自此通黃城其城與斗城相近俗呼為黃斗城是也鴨城在州東南太伯鄉去州二十五里輿地志云吳王牧鳬鴨之地今之梅李鄉亦有鴨城據輿地志所稱未知孰是麋城在州東南太伯鄉去州二十里載籍無可考恐與鴨城相類據輿地志鴨城吳王牧鳬鴨之城此城恐亦為豢麋鹿之所兼二城俱在縣之東南相去不逺龍尾陵道越絶書云春申君徙封開此道以屬本邑後漢書地里志無錫侯國注云縣西龍尾陵道春申君封吳時所造今在龍山其山嶺北尾上有路即是也華坡在惠山晉華寶所築御亭吳大帝所創在今望亭市去縣四十五里風土記云隋文帝至德元年置市并置堰閘號望亭堰寰宇記云開皇九年於望亭置驛十八年改為御亭驛李襲譽復改望亭驛宋天聖中改為鎮始置官署嘉祐八年開河通太湖遂廢堰閘元祐間復置閘後復廢輿地記云梁肩吾有詩云御亭一回望風塵千里昏即其地也其西有古壘東西六十步壘城厚三尺髙七尺晉成帝咸和中置晉顧揚監晉陵軍事嘗築壘于此進討賊將張健注云義興太守顧泉令行揚武將軍督護吳諸軍治柵於吳鄉御亭西以備蘇峻其壘先廢西施莊在水東四十里吳地記范蠡獻西施於吳故有是莊晉王右軍莊在今洛社市去州三十五里風土記云其地隋時一夕雲氣布集喧閧如市聲人潛窺之皆鬼神後乃置市蕭莊在縣東宅仁鄉梁蕭侍郎别墅今膠山寺址是甘露市去州東六十里延祥鄉風土記云吳太伯未至此時一夕有甘露降其地後乃置市陸墟市去縣西北四十七里富安鄉風土記及寰宇記云市東七十步有陽山出石堪作礲臼始民未知開鑿漢大夫陸端設肴醴以祭後取為器江東數州皆藉其用由是置市以端姓名之不忘本也竹塘市去縣西北六十里招義鄉風土記云晉天福六年十月置湛氏書院在惠山宋長史湛茂之元嘉中結草堂是山為讀書之所宋劉鑠及齊江淹皆有過湛長史厯山草堂詩按厯山即惠山也唐侍御史邱丹為茂之作舊居志并詩以記之同時韋夏卿輩皆有詩刻石今故址廢為浮圖不復知其處名存而實亡云李相書堂在惠山小徑縈紆有堂三楹中繪唐相李紳像紳未遇時常讀書是山堂即紳讀書之所錫麓書堂在錫山下宋文簡公尤袤讀書之處竒花異卉咸植於前春月邑人率往遊焉古墓三之七古之葬者棄之中野不封不樹後世易之以棺槨吾見封之若堂者矣見若坊者矣見若覆夏屋者矣見若斧者矣亦有為石郭三年而不成者矣陵谷變遷將何恃乎茲邑自吳太伯墓以下得古塜若干豈封植之固哉亦曰在人而已矣周吳太伯墓寰宇記云太伯墓在縣東三十九里吳地志云墓髙一丈四尺周回三十五步塜墓記云太伯墓在會稽吳地梅里聚去城十里按秦漢時毗陵嘗屬會稽郡南徐記云太伯宅東九里有皇山太伯所葬之地史記吳太伯世家注皇覽云太伯冡在會稽吳地梅李平墟去城十里吳地志又云九里有山太伯葬於梅李山平墟即此地也劉昭曰按縣東皇山有太伯塜墓十里有舊宅井猶存輿地志云太伯宅東九里為皇山卒葬南域南徐記云晉殷師為晉陵太守嘗表其墓復一戶以為守衛今州東南梅李鄉梅李有東皇即太伯城也又按皇山今名鴻山在延祥鄉到州五十里山下有太伯廟太伯墳在其山上周安陽侯周贇墓在縣西北二十五里髙一丈五尺周回一百二十步風土記云周武王封周章少子贇於無錫安陽鄉為安陽侯墓在安陽山下輿地志云子孫並葬於此七十餘墳墓前華表翁仲至今尚存吳荆州刺史顧容墓吳地志云顧容為荆州刺史墓在縣東南一十八里寰宇記云墓髙一丈八尺周回一百二十步輿地志云無錫東十八里有吳荆州刺史顧容墓人呼為顧墓當過往蘇州道側南去望亭二十七里宋王華墓新建縣侯琅琊王華也寰宇記云墓在縣西北二十五里髙一丈八尺周回一百二十步按南史王華傳華字子陵琅琊臨沂人父廞司徒左長史隆安初起兵討王恭恭遣劉牢之擊廞廞敗不知所在長子泰為恭所殺華年一十三在軍中與廞相失逃得免遇赦還武帝欲收其才乃發廞喪使華制服服闋武帝北伐辟華為徐州主簿文帝以華代張劭為司徒後遷為侍中右衛護軍兩將軍元嘉四年以誅徐羡之功追封新建縣侯舊云縣有琅琊王子陵墓又有宋新建縣侯王華墓説者以子陵名贇為王贇墓在州西北十里或以為子陵即華父廞字宋元嘉中厯散騎常侍按今州西北二十五里有王華墓亦有安陽侯周贇墓贇周章少子也不聞有王贇墓在州西北十里蓋傳寫之誤彼當為周贇墓此當為王華墓為正基墓要與王華墓相近姑辨其非以俟知者宋中書令王僧達墓按南史本傳僧達嘗為吳郡太守期嵗五遷後除太常卿益不得志上表解職坐以文旨不遜孝武帝時纍遷中書令與髙暗謀為亂收付廷尉獄賜死時年三十六墓在縣東四十里九域志云在膠山南嶺下大路北寰宇記亦同其墳髙一丈六尺周回二百步今按膠山西大路南有石翁仲在焉恐即其墳所在宋蕭侍郎墓在膠山寺門又云寺即舊宅宋蕭將軍墓諸史傳並不載按蕭思話傳思話南蘭陵人孝懿皇帝之弟子也父源之字君流厯徐兗二州刺史永和元年卒贈前將軍考當時贈官唯南陵蕭源之嘗贈此官晉元帝時嘗僑置南蘭陵郡於常州蕭源之為南蘭陵人則此墓為源之墓審矣或以謂前將軍蕭望之徵諸史傳望之雖嘗為是官乃東海蘭陵人非常州也又以其名皆有之遂指為望之墓實非也又按今州巷直南至將軍堰橋橋西北岸舊有巫樞密故居相傳其地是顧愷之將軍墓元至元年間巫氏子孫偶劚地得人骨甚長頭顱亦大據今將軍堰側有蕭將軍墓非顧愷之墓明矣况晉書顧愷之官至散騎常侍未嘗為將軍其墓為蕭源之所藏無疑不可不辨齊王琨墓左光祿大夫琅琊王琨也寰宇記云其墓在縣東北二十五里髙一丈八尺周回一百一十二步按南史本傳琨宋文帝時為吏部郎後出為吳郡及會稽太守順帝即位進右光祿大夫及帝遜位百僚陪列琨攀輪慟泣曰人以夀為歡老臣以夀為戚既不能先螻蟻頻見此事嗚咽不自勝百官人人雨淚齊高帝即位領武陵王師加侍中及髙帝崩琨步入宫朝士皆謂曰故宜待車有損國望琨曰今日奔赴皆自應爾遂得病卒贈光祿大夫年八十四琨為郡所居亷恪有遺愛當時人過其墓者莫不歔欷歎息九域志亦載其墓唐刺史滕邁墓在新橋門外半里荒莽間有二石獸刻云唐尚書刑部郎官睦州刺史滕公之墓按蘇文忠公志滕達道墓云十一代祖令琛為唐國子司業生太博翼翼生贈戶部侍郎抗抗生禮部侍郎蓋蓋生户部尚書珦珦生大中大夫睦州刺史即達道六世祖也宋淮海先生秦龍圗墓在惠山西南三里先生名觀字少遊一字太虛開封祥符人焦蹈榜登第初任泰州教授召試賢良除祕書正字後謫居英州移栁州復召除國史院編修建中靖國間貶藤州卒年四十三政和中以黨錮未解藁葬髙郵縣人稱為淮海先生子湛為常州通判遷葬於常之無錫開元鄉粲山子孫因家焉墓故有亭刻誥詞於石其墓後為里姓趙氏所據闕間虞薦發為縣文學白于令復其墓地以屬於學命掌教之官世祀之今祠于州學初先生未遭謫時嘗賦小詞有云醉卧古藤陰下杳不知南北後卒於藤州葬後塜上産紫藤一本圍數尺纒錯古松狀若偃蓋人傳以為朕兆宋秦少章覯墓在大壞山宋太師張循王墓在縣西三十五里布政鄉塘灣山即青山也王諱俊字伯英秦州三陽人其功勳始終具載國史本傳官至節度使封清河郡王拜太師薨年六十九追封循王諡忠烈賜一品禮服命內侍省押班張志為以紹興二十四年九月十一日奉敕護葬於是山紹熙元年詔配饗髙宗皇帝廟髙宗御書忠烈張循王神道路碑額兵部侍郎周麟之奉敕撰文吏部尚書賀允中奉敕書墓墓左建華藏寺以奉王祀宋唐郎中作求墓在開化鄉象山先是作求詔婺女許史君德之語曰明年永别知我莫若君願識吾墓及期而卒宋尤尚書袤墓在西孔山宋蔣侍郎重珍墓在湖埭宋尤端明焴墓在東孔山宋孟郡王忠厚墓在惠山西北孟灣陳賢良墓在州城都子巷砥戴墓在州城戴墓巷內並不知為何人亦不詳何代所葬祠宇三之八傳曰有功德于民者則報祀之太伯見祀于吳宜矣伍員春申君輩亦皆有功于民者也不然何以至今祠之不絶若夫老佛之徒出入中國琳宫梵剎遍滿天下豈其功德亦有被于生民者哉方之臯陶庭堅之不祀者不其忽諸吳太伯廟在州東南五里景雲鄉臨太伯瀆寰宇記云太伯開瀆以備旱潦百姓利之為立廟于瀆側鴻山梅里皆有太伯廟鴻山太伯所藏事具鴻山下梅里則太伯葬履其地元至順間有僧修廟廟梁忽躍出視之有書置梁中云世始知其詳伍相公祠即伍員子胥廟也子胥為夫差所殺投之江中吳人憐之為立祠焉今祠在縣西胥山下閭江上春申君祠在州西惠山下即楚公子黃歇也楚考烈王常以歇為相封于故吳邑歇後為李園所殺吳人遂立祠于其地以祀之唐垂拱間狄仁傑毁江東淫祀祠亦見廢今惠山下有土神祠即春申君也蓋為毁祠置故易其名耳徐偃王廟在州南開化鄉廟石塘山下臨廟塘不知何年所置或云徐子章禹嘗見執于吳徐之宗族子弟散之徐掦二州之間即其所居立先王之廟無錫在禹貢為掦州之域故世多徐偃王廟膠山鄉芙蓉山皆有偃王廟今並不存東海信郎王祠在縣東南一里不詳其始末虞孝恭南徐記云在無錫縣東今其祠廢不復䀶迹後邑人為立祠唐垂拱間為狄仁傑所毁後易以土祠為名今尚存祠前有河曰廟涇橋曰廟橋即古祠之遺基云宗郎王廟在州市倉橋北不詳其始末宋時廟已頽圮淳熙中縣尉錢萬頃作疏請修其祠有云惟神伯仲曰信曰宗在邑廟祠有興有廢是則信宗二王之廟其來久矣石城王祠在縣東三十五里不復考其始末亦稱為中信王或謂即宗郎王邑人語訛為中耳項王廟在州南開化鄉故老相傳云項羽避仇吳中嘗至其地故後人祠之吳許二長官廟在州南開化鄉去州二十五里俗傳云梁時晉陵無錫二令以陽湖水溢遂行湖堰水水勢大至俱溺死鄉人悼之立祠以祀云武烈帝廟在州內西南隋大將陳杲仁也其先頴川人十七世祖實為太邱令長家于長城遂為晉陵人杲仁破賊數有大功拜大司徒後為沈法興所害屠戮其家因舍故宅為寺事具載郡志此其别廟云三賢祠在惠山寺內泉亭上三賢為晉長史湛茂之唐相李紳桑苧翁陸羽也古洞陽觀在惠山西南去州九里唐陸鴻漸惠山記云古洞陽觀下有洞穴潛通包山在太湖內故名其觀創于梁天監中隋大業中遂廢不復興洞虛觀舊在縣東去縣三十里膠山鄉近道場巷梁大同時建本名青元今古基尚存嵗久觀廢遂徙置州市東宋祥符間敕賜今額元天厯間易稱宫云明陽觀在州西開元鄉燦山去州七里宋崇寧中道士盧至柔卓庵修行於上大觀間主茅山道士劉混康以至柔業行清苦具事上聞敕賜觀額觀有三清像鎔鐵所鑄至今尚存妙覺觀在縣北四十里梁大同中建女冠所居俗稱女貞觀後廢宋至道間徙入縣城賜今額崇安寺在州城內去州三百步建于東晉興寧二年始名興寧宋太平興國初賜今額寺有五輪大藏雕刻精緻機括工巧為邑竒觀宋紹興間僧義深所製或云寺本王右軍故宅比越戒珠寺同然無可考夀聖禪院在州城內倉橋下即古鳯光寺唐武德中建與鳯光橋同時後廢開寶間軍師施仁福為創浴室號浴室院寶元中復置招提始賜今額亦曰北禪寺元延祐間燬于火尋復創造云其寺有輪藏寺僧相傳藏下有石函置佛牙舍利之屬以為藏鎮福聖禪院在南城內近顧橋門寺創于梁太清之初號護國寺唐改為靈山寺宋賜今額按寺記宋雍熙中有僧持鉢而來忽失所在唯挂錫寺壁寺僧遂構亭駐錫既而鳩工聚財造為浮圗七級既成將設僧伽像于下有僧夢一人謂曰毋勞塑工僧伽泗州有三身在焉可往求之僧往果然先是一舟師嘗夢有紫衣僧告曰願附往無錫南禪寺既寤適僧擕僧伽像至遂載與俱來至今祀于浮圗之下由是俗稱為南禪寺云惠山普利院在州西惠山上宋湛長史故宅也梁大同問入于僧創招提號法雲禪院宋元徽中僧顯於此置華山精舍後廢于唐武宗垂拱間宣宗時寺復興宋至道中賜今額紹興間以寺賜信安郡王孟忠厚以奉孟后嵗祀改號旌忠薦福寺依惠山之麓得泉石之秀足以逰眺邑人以為行樂之地暮春之月遊者最盛至今為然山半有望湖閣李紳所建以望芙蓉湖今廢為半山亭旁有繡嶺軒嶺本名照山意者為昔人之墓宋光祿滕中元以其草木蓊鬱花卉繁逮若錦繡然遂以名山與亭寺有軒曰嘉蔭宋蘇舜欽所創又有挹翠翠麓擁翠等軒皆在寺中曲水亭在寺前陸羽惠山記云前有曲水亭一名憩亭以為逰人憩息之所其水九曲甃以文甓今基亦亡寺門外復有亭製作甚古號魯班亭去亭五十步有石幢二其一為唐乾符闕年立闕所書闕經在道之右寺中有殿名大同殿梁大同年間所置殿下有聽松石床唐李陽冰篆聽松於上床側有大松二不知何代所植唐寶厯二年敕造競渡牛尾舟將伐松為之是夕松忽哀鳴遂奏免及鳯檜亦不知植自何年又有長生檜宋蘇紳宰縣時植皆在殿前陽山翠微院在州北陽山梁太清初創號逺山寺中書舍人陸舉故宅宋太平興國間賜今額開利寺在州西北洛社市相傳為晉王右軍别墅梁太清初入于僧號興福寺宋嘉祐間賜今額普利院在州南長泰山梁大同間所建號長泰寺宋賜今額寺僧相傳以為僧伽留笠之所寺有留笠閣寺後有巨迹寺僧稱為羅漢迹甚雨尤顯殿壁畫貓捕一鷹世以為仙筆至今鳥雀不至其所興化寺在州東膠山上世稱為膠山寺創于梁太清之初號彌勒寺宋至道中賜今額建炎間丞相李綱得請以奉先世祀改稱崇親報德禪院與惠山皆稱名寺寺門逺為惠山寺門相當二寺僧稱以是相敵寺中有軒曰上方蘇紳宰縣時常題詠其上又有環翠聽松秀峯分翠等軒率皆新作舊寺蓋梁蕭侍郎舍因宅為之今之所存非故剎矣保寧寺在州北二十里興寧鄉梁大同年間所創至今稱其地為寺頭唐改為福愛寺宋淳化中賜今額舊傳為甘羅宅旁有甘蕩未足信也香山禪寺在州東懷仁鄉香山一名顧山又號顧山寺梁大同間所建祈陀崇教院在州東三十里梁大同二年邑人王建拾宅為浮屠後以寺名其村宋淳化間賜額崇教靜教禪寺在州東四十里上舍至今人目為上舍寺陳至德元年建名善寂隋開皇中吳郡刺史陳子邁徙家無錫東山出資囊創為招提宋太平興國間賜今額其寺屢廢非故剎矣圓通禪寺在州東七十里延祥鄉寺建于唐乾元因名乾元寺或以為唐里姓張氏之宅威惠夫人者舍為浮圗云宋景祐中賜今額廣濟院在州東甘露市創于唐乾符三年舊名甘露禪院宋太平興國間賜今額華藏寺在州西青山灣前面太湖宋太師循王張浚葬於是因建浮圗以奉嵗祀至今其地號華藏寺中有雲海惟玉二亭可望山氣善智尼寺在州南二十八里延祥鄉甘露市師姑橋側唐乾符元年建為比邱尼之所居或云在縣東九十里歸德鄉後不知何年月徙于州城東北隅第六箭河上災祥三之九妖由人興妖不自作况禎祥乎方晉之時何妖孽之多也區區小邑猶迭見焉信五行志之有作也無錫縣開元鄉錢氏墓有松二株一嵗松頂結蓋成毬其年孫安野預薦紹興間洪邁昆仲讀書外家沈氏墳廬是嵗復有松二結毬如前既而昆仲取博學宏詞亦木之祥也出夷堅志晉孝懷帝永嘉六年五月無錫縣有茱萸樹四株相樛而生狀若連理先是有鼯鼠出延陵羊祜令郭璞占曰此郡在明年當有妖樹生若瑞而非瑞辛螫之木也倘有此東西數百里必有作逆者及此木生其後徐馥果作亂亦草之妖也以為木不曲直晉安帝義熙七年無錫人趙未年八嵗一旦暴長八尺髭鬚蔚然三日而死並出晉書五行志無錫縣志卷三下
